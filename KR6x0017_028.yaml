body:
  text: 第二十八須萬那賓寶哈那品二七一須萬那賓寶哈尼耶黃金枕一己手持一食清淨吾施供亦為枕布施達最上義人二吾施黃金枕九十一劫間惡趣吾不知施枕此果報三六十三劫昔剎利名無等大力具七寶出為轉輪王四四種無礙解如是尊者須萬那賓寶哈尼耶長老宣唱此等偈二七二提拉穆提達耶迦胡麻一握布施一世間大導師了知吾心意彼以意生身神足來吾前二吾禮拜尊師人中之至尊吾喜心清淨一握胡麻施三彼時吾布施九十一劫間惡趣吾不知施佛此果報四十六劫往昔有王名歡喜大力具七寶出為轉輪王五四種無礙解如是尊者提拉穆提達耶迦長老宣唱此等偈二七三羌果達奇耶花籠一大川流近處彼住山峽間無欲隨意往吾施盛花籃二悉達多大仙愍一切有情吾施盛花籃一劫升天樂三彼時施花籃九十四劫間惡趣吾不知施籃此果報四四種無礙解如是尊者羌果達奇耶長老宣唱此等偈二七四阿槃奢那達耶迦塗膏布施一憍陳如世尊離欲如是人心寂如虛空無障得定人二彼離一切癡希利一切人兩足之王者吾施以塗膏三彼時施塗膏數經無量劫惡趣吾不知塗膏此果報四十五劫往昔王名奇拉巴大力具七寶出為轉輪王五四種無礙解如是尊者阿槃奢那達耶迦長老宣唱此等偈二七五耶康奢利耶一合掌一烏曇跋樹下住居樹葉席沙門一大仙吾施居住所二人中王帝沙世間稱救主敬虔吾合掌敷展鮮花席三布施花席故九十一劫間惡趣吾不知施席此果報四十四劫往昔吾為人統主名謂一合掌大力轉輪王五四種無礙解如是尊者耶康奢利耶長老宣唱此等偈二七六泡塔達耶迦塑料布施一大仙僧團中初聞尊師法塑料吾布施施於無上人二彼時行善業九十一劫間惡趣吾不知施料此果報三四種無礙解如是尊者泡塔達耶迦長老宣唱此等偈二七七質多伽普迦卡冢供養一羌達巴伽河沿流吾前行採七株葛花吾捧獻佛冢二供養佛冢故九十四劫間惡趣吾不知供佛冢果報三六十七劫昔其名喚扶養七人具七寶有為轉輪王四四種無礙解如是尊者質多伽普迦卡長老宣唱此等偈二七八阿魯瓦達耶迦阿魯瓦布施一雪山深谷中壯大信度河吾見離欲者宏偉具光輝二浸耽最上寂見彼吾心驚由己清信手吾施阿魯瓦草三彼時施草故三十一劫間惡趣吾不知施草此果報四四種無礙解如是尊者阿魯瓦達耶迦長老宣唱此等劫二七九耶康芬陀利迦一分陀利迦一時號羅瑪沙光輝自存者吾以清淨心供分陀利迦二彼時布施故九十四劫間惡趣吾不知施蓮華果報三四種無礙解如是尊者分陀利迦長老宣唱此等偈二八達拉尼耶濟渡一大道不平坦為作鋪道行由己清信手為渡世間人二吾為作鋪道九十一劫間惡趣吾不知鋪道此果報三五十五劫昔王名俱含大力具七寶出為轉輪王四四種無礙解如是尊者達拉尼耶長老宣唱此等偈攝頌須萬那提拉穆提羌果達阿槃奢那耶康奢利泡塔達質多迦馬拉耶康芬陀利濟渡十人共偈四十二第十一誦品

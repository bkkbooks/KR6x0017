body:
  text: 第三十四康度達迦品三三一康達脫毗耶香塔一悉達多佛陀吾施與香塔包以素馨花香塔佛相應二佛姿值黃金無上正覺尊光輝如水蓮焰燃如祭火三生尊似獅子壯如虎猛牛比丘衆隨坐沙門勝者佛四見己心清淨虔敬吾合掌禮敬佛之足指向北方去五彼時施香故九十四劫間惡趣吾不知供香此果報六四種無礙解如是尊者康達脫毗耶長老宣唱此等偈三三二普西陀康密耶撒業一毗婆尸佛陀世尊大牟尼與諸漏盡者於時住僧苑二世間大導師時由苑門出十萬更八萬漏盡者同出三吾身纏裘衣亦著樹皮衣持紅藍花水詣近佛之前四己心得清淨感動吾合掌紅藍花之水執以注撒佛五由此業故佛稱最上水草吾何讚行業隨欲即離去六勝者同供養花撒五千人二千與五百統領神世界七他之二千五同為轉輪王更以殘餘業達阿羅漢位八吾為諸天王亦為人間主唯以業為名呼為普西陀九吾為神之時亦即人間日撒花似降花周邊遍一尋一有結吾解脫燃盡諸煩惱消滅所有漏撒花此果報一一唯降旃檀雨恰如滿香氣香由吾身出滿半俱盧舍一二飄揚天上香因得福業故諸香普西陀來此衆人知一三枝花與灌木如草悉有香吾心隨意得瞬時香即到一四供養旃檀故十萬劫之間惡趣吾不知撒香之果報一五四種無礙解如是尊者普西陀康密耶長老宣唱此等偈三三三婆般伽羅光輝者一巴多穆塔拉世間居上首彼佛之支提山坡獸群居二禮拜佛支提無有敢行者灌木蔓草覆支提己崩壞三林中吾工作為父亡魂祭山坡蔓草中吾見崩塔婆四吾見佛塔婆頓發供奉心尊佛其塔婆崩壞森林中五知有德非德不適不相應佛塔未得清他業吾不從六掃清諸蔓草滋草與灌木八度禮支提屈身吾離去七既行此善業得依吾心願棄離此人身即往忉利天八宮殿華麗造黃金美光輝六十由旬高寬三十由旬九而吾三百度統領神世界更二十五度嘗為轉輪王一生生流回轉獲得衆多富富裕從不缺清掃之果報一一乘吉祥象背行走山斜坡何方吾歸命財寶到吾前一二樹株與茨草眼中無映物吾只結福業獨自出往行一三膿腫皮膚病癲癇與疥癬痳瘋皆不生清掃之果報一四清掃佛塔婆及他稀有事瘍腫與斑點吾生概不知一五清掃佛塔婆及他稀有事天界與人界二界吾輪回一六清掃之塔婆及他稀有事黃金色光輝到處吾照映一七清掃佛塔婆及他稀有事遠避不快事只近愈快事一八清掃佛塔婆及他稀有事此吾心更清安靜心鎮定一九清掃佛塔婆及他稀有事吾坐於一座達阿羅漢位二彼時吾行業十萬劫之間惡趣吾不知清掃之果報二一四種無礙解如是尊者婆般伽羅長老宣唱此等偈三三四提那庫提達耶迦草房室布施一盤頭摩帝市吾為人做傭吾行他人業吾倚他人食二時吾獨居坐意作如是思此世有佛出而吾無奉事三吾應趨淨所與我剎那時地獄苦感觸實為無福人四吾思所行業來至主人前吾請為一業入往山峽間五蔓草與灌木爾時吾採來置於三叉柱作一草房屋六吾將草房屋奉獻與僧團同日行此業即往主人前七吾為此善業於彼成草屋吾生忉利天造作華宮殿八百珠千箭柄飾旗黃金作十萬之宮殿出現有尖塔九神界或人間再生任何胎善辨吾心意具此諸宮殿一身毛不豎立恐怖與戰栗吾不知畏懼建草屋果報一一獅子與虎豹熊狼與鬣狗彼等皆避吾施草屋果報一二鬼神鳩槃荼蛇蝮與羅剎彼等皆避吾施草屋果報一三吾所見惡夢不曾有記憶吾今具正念施草屋果報一四布施草屋故吾享無虧樂親眼時見法稱瞿曇佛陀一五彼時行此業九十一劫間惡趣吾不知施草屋果報一六四種無礙解如是尊者提那庫提達耶迦長老宣唱此等偈三三五烏陀雷耶達耶迦上衣布施一漢薩瓦底市吾為婆羅門聖學書優越吾通三吠陀二生而積修習吾弟子等隨為作水灌頂時吾由市出三巴多穆塔拉彼通一切法漏盡者千人勝者來此市四吾見美容姿恰如無擾者羅漢衆多圍吾以淨化心五頭上吾合掌歸依有德人心清淨喜躍吾布施上衣六吾以兩手捧高舉獻上衣佛之諸隨衆為投上衣覆七衆多比丘衆共同出行乞為佛作覆蔭爾時吾微笑八吾自家中出見佛人中尊尊師立街上向吾示謝辭九心清淨喜躍向吾施衣者吾今讚其人傾耳聽吾言一從今三萬劫彼樂神世界神王五十度彼統神世界一一彼住神世界具福業之果周圍百由旬遍以布為覆一二三十六度王彼為轉輪王福量未得盡廣統諸國土一三生生彼流轉具福業果報一切諸意欲爾時皆常生一四憍賒耶之衣欽波羅之衣芻摩劫貝衣皆係高價值如是衆多布彼者皆獲得一五一切意欲者彼者皆有得無論任何時彼享有布果一六其後彼出家淨根所使故稱瞿曇佛陀親眼見其法一七大仙遍知者吾積諸善業實吾施一衣得至不死道一八居於無人家曼陀婆樹蔭吾為布覆翳周圍遍一尋一九不受親請物正受衣資具吾得飲食物施上衣果報二時吾行此業十萬劫之數惡趣吾不知施衣之果報二一四種無礙解如是尊者烏陀雷耶達耶迦長老宣唱此等偈三三六達摩薩瓦尼耶法聽一巴多穆塔拉通一切諸法佛說四諦法度化衆多人二爾時吾結髮威力苦行者時吾行空中搖擺樹皮衣三勝佛適居下吾行不能過恰如鳥觸岩爾時不得通四吾行斯空上如水中開目如斯害行動嘗作如斯事五偉大之人間坐於此下方吾向彼請問聆受其真義六吾由空降來耳聞尊師聲時說無常法佛法吾守持七持以無常想往去吾仙處壽命殊有限彼處吾死去八最後時到來憶持所聞法以此善業故吾趣忉利天九從此三萬劫吾樂神世界五十一度間統領神世界一七十一度間吾為轉輪王如是難量盡統御廣國土一一沙門制諸根坐吾父之家以偈為說示教示無常事一二吾憶持斯想生生數流轉未得終輪回寂滅永恆道一三諸行誠無常是為生滅法生而復向滅寂滅斯為樂一四此偈吾聽聞憶起昔日想時吾坐一座達阿羅漢位一五生年僅七歲吾為阿羅漢吾具眼知德佛為吾受具一六此吾尚年幼應作事已完釋迦之子教今日應何為一七彼時吾為業由此十萬劫惡趣吾不知聽正法之果一八四種無礙解如是尊者達摩薩瑪尼耶長老宣唱此等偈三三七烏奇陀婆多密耶投蓮華一漢薩瓦底市時吾作花鬘飛入蓮華池吾採七葉花二巴多穆塔拉一切之勝者教示諸人等鎮伏十萬心三彼等得清淨漏盡得六通人中尊者來索取吾之榮四吾見天中天世間自存者截莖七葉花吾時散向空五若為大雄者人中無上佛七葉花自來翳於佛頭上六世間居上首大雄心聚凝依佛之威力花翳於頭上七吾為此善業更依心所願棄去此人身吾往忉利天八彼處造宮殿名稱為七葉六十由旬高寬三十由旬九神王吾十度統御神世界七十五度間吾為轉輪王一此等量不盡吾統廣國土昔日己所為吾享善業果一一僅一蓮華故吾享無虧樂瞿曇佛教法吾親眼得見一二燃盡衆煩惱除去諸有結如斷縛龍象吾住成無漏一三供養彼花故從此十萬劫惡趣吾不知施一蓮花果一四四種無礙解如是尊者烏奇陀婆多密耶長老宣唱此等偈攝頌康度達迦普伽尼噴那伽耶卡多西普西陀婆般伽拉庫提達烏陀利雅薩瓦尼烏奇塔巴其偈一百四十四

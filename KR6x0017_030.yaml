body:
  text: 第三十質達伽普迦卡品二九一質達普迦卡塚供養一吾為婆羅門名謂阿侍多吾採各種花想作尊供奉二世緣尸棄師見其光輝塚吾持彼花往撒於其塚上三供養彼花故三十一劫間惡趣吾不知供佛此果報四二十七劫昔大力王七人其名謂善燃出為轉輪王五四種無礙解如是尊者質達普迦卡長老宣唱此等偈二九二普巴達拉迦持花一吾著樹皮衣上衣為鹿皮吾達五神通亦得摩觸月二毘婆尸佛陀指向吾方來波利夜恒羅吾持翳尊師三彼花吾持翳九十一劫間惡趣吾不知持翳此果報四八十七劫昔大力一君王其名稱徧持出為轉輪王五四種無礙解如是尊者普巴達拉迦長老宣唱此等偈二九三奢特達耶迦傘蓋布施一吾名曰普多出家著袈裟尊師達佛位供世人涅槃二吾為索己子吾往其後追吾往佛之塚偉大涅槃人三吾於彼塚場雙手合掌拜吾執純白傘彼時載塚上四以時供傘故九十四劫間惡趣吾不知布施傘蓋報五二十五劫昔大力王七人其名稱大價出為轉輪王六四種無礙解如是尊者奢特達耶迦長老宣唱此等偈二九四薩達薩尼耶迦音想一太陽初昇時光輝照大地此世之大仙勝佛之出現二彼處吾聞音卻不見聖形吾憶持佛想而吾死到來三彼時吾得想九十四劫間惡趣吾不知供佛此果報四四種無礙解如是尊者薩達薩尼耶迦長老宣唱此等偈二九五庫西薩尼啟巴牛頭擲一由苑生門出展牛頭旃檀吾沈浸己業前業此果報二信度產駿馬疾幾頭駿馬此等吾享受牛頭檀果報三實吾最上事為善種福田所作奉僧伽不值其他分四吾展牛頭檀九十四劫間惡趣猶不知敷物此果報五七十五劫昔其名稱安立大力大威力出為轉輪王六四種無礙解如是尊者庫西薩尼啟巴長老宣唱此等偈二九六巴達普迦卡足供養一雪山深谷中吾為緊那羅吾見離塵佛光輝如黃金二導師毘婆尸爾時吾親近既撒旃檀香復撒多伽羅格香三佛足吾供養九十一劫間惡趣吾不知撒香此果報四四種無礙解如是尊者巴達普迦卡長老宣唱此等偈二九七提薩乞提耶方土讚歎一烏婆薩拉伽吾為婆羅門走進繁茂林得見人中尊二佛受世供養吾頂禮佛足佛知吾淨心林中消逝形三吾由林中出猶憶持勝佛讚歎彼方土在天樂一劫四讚彼方土故九十二劫間惡趣吾不知是讚歎果報五四種無礙解如是尊者提薩乞提耶長老宣唱此等偈二九八薩拉那格瑪尼耶歸命一雪山深谷中時吾為獵人得見毘婆尸世界人中尊二吾盡諸所用奉侍正覺尊兩足之王者敬虔吾歸命三彼時歸命故九十一劫間惡趣吾不知歸命此果報四四種無礙解如是尊者薩拉那格瑪尼耶長老宣唱此等偈二九九菴婆頻提耶菴婆片一吾名羅瑪沙達那瓦為姓吾以菴婆片施毘婆尸佛二時施菴婆片九十一劫間惡趣吾不知施菴此婆果三四種無礙解如是尊者菴婆頻提耶長老宣唱此等偈三阿努薩薩瓦迦灌注一吾巡迴乞食得見毘婆尸兩足之王者施彼一匙食二吾心喜清淨爾時吾禮敬灌注於彼佛達最上之義三向佛灌注故九十一劫間惡趣吾不知灌佛此果報四四種無礙解如是尊者阿努薩薩瓦迦長老宣唱此等偈攝頌質達普伽普巴達奢持達與薩達薩庫西薩山達羅巴達巴提薩薩拉那菴婆薩薩瓦迦十人共偈四十七十品攝頌伽尼伽拉與哈提阿蘭巴那烏達伽脫瓦羅與脫瑪達巴多穆郁啟巴須萬那般那陀質達普迦前後十品共三十第三十品其偈數合計四百五十一三十品偈二千五更加七十二之數長老三百為譬喻見義人等為此數第三百人畢

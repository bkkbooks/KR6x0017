body:
  text: 第二十四烏達伽薩那達耶迦品二三一烏達伽薩那達耶伽水座布施一吾由苑門出鋪敷一跳板以水作奉仕達最上義人二彼時行此業三十一劫間惡趣吾不知布施水座果三十五劫往昔名謂勝金色大力具七寶出為轉輪王四四種無礙解如是尊者烏達伽薩那達耶伽長老宣唱此等二三二巴伽那達耶迦容器布施一盤頭摩帝市時吾造陶器保證將供應比丘僧容器二保證諸容器九十一劫間惡趣吾不知布施容器果三五十三劫昔名謂無限焰大力具七寶出為轉輪王四四種無礙解如是尊者巴伽那達耶迦長老宣唱此等偈二三三娑羅普毗耶娑羅花一阿魯那瓦提市時在糖果店門前過往者忽見尸棄佛二鎮時取佛鉢施豫沙羅花更以清淨心禮拜正行佛三並施佛固食三十一劫間惡趣吾不知布施此果報四十四劫往昔名謂無量水大力具七寶出為轉輪王五四種無礙解如是尊者娑羅普毗耶長老宣唱此等偈二三四奇蘭奢達耶迦席布施一低彌羅城市吾時製籠人悉達多佛光被衆淨信人二應供世救主衆人來索席彼等為供養故吾施衆席三彼時行此業九十四劫間惡趣吾不知施席此果報四七十七劫昔有王名持輝大力具七寶出為轉輪王五四種無礙解如是尊者奇蘭奢達耶迦長老宣唱此等偈二三五偉提耶達耶迦欄楯布施一最上菩提樹毗婆尸佛坐喜悅心清淨吾為作欄楯二以作欄楯故九十一劫間惡趣吾不知供佛此果報三十一劫往昔吾名太陽似大力具七寶出為轉輪王四四種無礙解如是尊者偉提耶達耶迦長老宣唱此等偈二三六萬那伽羅迦作繪具人一阿魯那瓦提市時吾作繪具布具供支提作諸美塗繪二爾時吾塗色三十一劫間惡趣吾不知施色此果報三二十三劫昔持名為月似大力具七寶出為轉輪王四四種無礙解如是尊者萬那伽羅迦長老宣唱此等偈二三七毗耶拉普毗耶毗耶拉花一往昔在森林吾曾做獵人見毗耶拉花採投得道人二供養其花故九十一劫間惡趣吾不知供佛此果報三四種無礙解如是尊者毗耶拉普毗耶長老宣唱此等偈二三八菴婆耶格達耶迦菴婆供物布施一己職不固執吾赴森林中見靜正覺尊吾施菴婆物二彼時吾布施九十一劫間惡趣吾不知供菴婆果報三四種無礙解如是尊者菴婆耶格達耶迦長老宣唱此等偈二三九伽格提伽羅迦作基壇人一阿塔達西佛將於涅槃時為佛最上塔吾為作基壇二彼時行此業一千八百劫惡趣吾不知布施基壇果三四種無礙解如是尊者伽格提伽羅迦長老宣唱此等偈二四瓦西達耶迦斧布施一低彌羅鬧市吾昔為鐵匠無敵自存者吾施斧一把二彼時吾施斧九十四劫間惡趣吾不知施斧之果報三四種無礙解如是尊者瓦西達耶迦長老宣唱此等偈攝頌烏達伽薩那巴伽那達娑羅普毗奇蘭奢達偉提耶萬那伽羅毗耶拉菴婆耶格達伽格提瓦西達耶十人共偈三十八

body:
  text: 第五優波離品四一優波離一漏盡者千人圍繞世導師彼尊樂孤獨獨棲遊四方二吾著鹿皮衣滿足三腳杖認明世導師比丘衆圍繞三皮衣袒右肩頭上吾合掌禮敬正覺尊讚歎世導師四卵生與濕生化生與胎生如鴉之有羽常翔於大空五有思或無想任何諸有情此等及一切盡含汝智中六雪山最頂峰凡屬有香者此等於汝戒豌豆不足較七此世與天界沈湎癡昏暗爾之智慧輝滅除其黑暗八太陽沈去時有情暗籠圍如佛不出世昏暗包世界九恰如太陽升常除諸黑暗爾佛亦如是常拂爾昏暗一人天世界佛勤奮汝專念淨業充滿故喜愛衆多人一一巴多穆塔拉雄者大牟尼喜樂聞一切如鵝王騰空一二巴多穆塔拉大仙騰於空尊師空中立以說如次偈一三以多喻聯綴讚歎吾智慧吾亦讚其人傾耳且聽說一四彼人十八度將為諸神王統治三百國住於大地上一五二十五度間彼為轉輪王此量未得盡統治廣國土一六從今十萬劫後生甘蔗族稱謂瞿曇姓出世為尊師一七從兜率天沒淨根所使故生而實卑賤其名優波離一八其後得出家揮祛一切惡諸漏皆正知無漏證涅槃一九釋族之聖子瞿曇佛歡喜彼為通律者置於最上位二淨信故出家無漏了所作諸漏皆正知吾住成無漏二一於律無不通受佛所慈愍己得滿足業吾住成無漏二二以戒為根本自制於五根如山出寶玉執持一切律二三無上之尊師了知吾此德比丘衆中坐置吾最上位二四四種無礙解以下與前偈相同如是尊者優波離長老宣唱此等偈四二拘利耶維薩二十億一阿諾瑪達西世間居上首漆灰作塗料吾作經行處二以種種色花撒放經行處天棚覆上空施食無上佛三吾向佛合掌虔誠敬禮彼爾時吾奉獻彼尊長屋舍四無上彼尊師了知吾心意彼佛具眼者慈愍垂納受五人天共布施彼佛悉接受比丘衆中坐為說如次偈六以喜雀躍心布施長屋舍吾將讚其人傾耳聽吾說七以具福業故此人當死時繫千頭馬車屆時侍候彼八爾乘其馬車趨赴神世界去至樂彼處諸神擁喜悅九以寶土塗飾豪華高貴殿優美樓臺閣安住其宮殿一歷時三萬劫享樂神世界二十五劫間彼將為神王一一七十有七度彼為轉輪王通稱唯一名謂耶輸多羅一二得享二種福吾見其積福二十八劫後彼為轉輪王一三亦有美宮殿毗首羯摩造具有十種聲安住此都城一四從今無量劫君王威力大得即王位者名稱甘蔗王一五侍女一萬六容姿皆優美尊貴彼王妃子生達九人一六九子出生後王妃各逝去青年之少女繼為第一妃一七甘蔗王滿足彼女受恩惠王妃受惠施驅逐群王子一八彼等皆出家前往山頂峰畏怖破血統與同棲妹等一九其妹有一人不幸為病侵吾等破血統王子埋彼女二一人剎帝利取彼女共信甘蔗家系譜自此有分裂二一彼等之後裔號稱拘利族彼處所擁持享有諸財富二二彼之身歿去往趣神世界於處心神適並見諸宮殿二三彼由天界歿淨根所使故再生來人間名字稱輸那二四意堅精力盛精勤於師教諸漏皆正知無漏證涅槃二五尊師視無邊釋族長瞿曇大雄知分別置吾最上位二六最上鍛克已心之指向善荷擔此一切證悟成無漏二七生尊如獅王大龍彼肢光比丘衆中坐置吾於最上二八四之無礙解如是尊者蘇那拘利耶維薩長老宣唱此等偈四三拔提拘利吾達耶弗多拘利吾達之子賢善一巴多穆塔拉慈心大牟尼世最上導師人人皆親近二麥粉作麵點供養飲食物彼等施尊師種無上福田三最尊無上佛僧團亦邀請如是天中天吾將作布施四吾遣諸人等邀請如來臨斯無上福田比丘僧團衆五座椅數十萬裝金敷毛毯毛褥敷為覆綿衣亞麻衣佛生適相應吾設高貴席六巴多穆塔拉人中之長者比丘衆圍繞來至吾家門七世間之救主吾出迎彼佛內喜心清淨導嚮至吾家八比丘數十萬世界大導師吾喜心清淨美食且豐盛九巴多穆塔拉納受尊供物比丘衆中坐以說如次偈一金椅敷毛毯布施此座者吾將讚其人傾耳聽吾說一一七十四度間統領神世界天女等所敬享受無顧樂一二諸國數一千安住大地上五十一度間彼為轉輪王一三任何投處生皆是高貴家淨根所使故其後得出家名稱為跋提尊師之弟子一四孤獨吾安居獨離臥牀住今日吾剃髮果報皆無缺一五一切知者師了知吾一切比丘衆中坐置吾於最上一六四之無礙解如是尊者者拔提拘利吾達耶弗多長老宣唱此等偈四四山尼達帕迦共積一山谷森林中吾造小屋住名聲有無得吾亦悉滿足二巴多穆塔拉接受尊供物十萬得道者相隨來吾前三親近大雄者最勝水中草吾設敷草席布施與尊師四內心清淨喜萆麻與飲物吾作清淨施施與端直人五爾時行此施從此十萬劫吾不知惡趣布施此果報六四十一劫昔阿林達瑪王七寶具大力吾為轉輪王七四之無礙解如是尊者山尼達帕迦宣唱此等偈四五潘奢哈提耶五手一須彌陀佛者彼來市場中寡言眼垂瞼慎慮制諸根二手取五蓮華吾為作花環虔誠以獻佛親手為供養三吾捧此蓮花為尊師覆蓋敬師如弟子傾注彼大龍四吾自供此花歷數三萬劫猶不知惡趣供佛此果報五古昔二千劫五人剎帝利大力哈提耶曾為轉輪王六四之無礙解如是尊者潘奢哈提耶長老宣唱此等偈四六巴多瑪奢達尼耶蓮翳一人中世救主毗婆尸涅槃吾執盛蓮華供荼毗柴堆二堆積荼毗柴上騰於高空遮翳柴堆上吾作遮日棚三時吾供鮮花歷九十一劫吾不知惡趣供佛此果報四四十七劫昔蓮華自在王夷平四方際壯力大輪王五四之無礙解如是尊者巴多瑪奢達尼耶長老宣唱此等偈四七薩耶那達耶迦褥施一悉達多佛陀慈心誠篤者吾施最上褥鋪覆布諸具二敷座舒適褥彼佛欣悅受佛由座升起勝者騰空去三爾時吾施褥歷九十四劫吾不知惡趣施褥此果報四五十一劫昔王名婆留那七寶具大力出為轉輪王五四之無礙解如是尊者薩耶那達耶迦長老宣唱如是偈畢四八羌伽瑪達耶迦經行處布施一阿塔達西佛世間居上首吾多積磚石造彼經行處二善造經行處高五拉他那適修心神爽一百肘之長三阿塔達西佛至人受布施手執淨砂粒為說如次偈四依所施砂粒為作經行處具足七種寶得享砂粒報五三劫於天上統領神世界天女等所敬享受無虧樂六來至人間界王位統治國三度為輪王彼住於地上七爾時積勝業十八劫之間吾不知惡趣經行處果報八四種無礙解如是尊者羌伽瑪達耶迦長老宣唱此等偈四九須跋陀好賢一巴多穆塔拉受尊供物者望高入涅槃搖撼衆人等二正覺尊涅槃震動十萬界爾時諸人等諸神皆來集三裝滿旃檀香伽羅末利迦心內喜雀躍吾塗於至人四無上彼尊師了知吾心意正覺尊安臥以說如次偈五當吾最後時覆香與花環吾亦讚其人傾耳聽吾說六此男從此沒兜率天界行統領彼世後赴樂變化天七至誠以此法布施盛花環至彼業報滿受享無虧樂八此男彼處沒再生兜率天復由彼世沒生來於人間九大龍釋族子人天界最勝令諸有情悟具眼者涅槃一淨根所使故彼意得出家以近正覺尊爾時發詢問一一世界之導師一切知者云了知前世業開啓真理門一二此問獲滿意喜悅意鎮靜禮敬於尊師請許為出家一三己業既滿足認得意清淨通曉最上法佛允彼出家一四此男勵精勤於正覺尊教諸漏皆正知無漏證涅槃第五誦品一五前業所縛故安靜鎮定心佛子由法生吾更善所作一六親近彼法王乃發最上問彼亦答吾問導吾於法耳一七了知佛之法喜住於佛教諸漏皆正知吾住成無漏一八十萬劫往昔最勝水中草如油盡燈火涅槃無繫縛一九寶玉造塔婆高有七由旬吉祥心悅豫於彼獻幢幡二迦葉正覺者提舍為高弟為我生其子為勝教後嗣二一以卑意向彼吾為不祥言依吾所業果最後會勝者二二娑羅最後牀施向彼牟尼利濟慈愍者佛許吾出家二三今實已出家並已具足戒今實兩足尊吾臨般涅槃二四四種無礙解如是尊者須跋陀長老宣唱此等偈五純陀瘦短一世間居上首悉達多佛陀尊花獻作供佳提為蔽覆二諸般辦置齊供獻於佛陀餘花執於手亦向佛奉獻三黃金般姿容世間大導師清淨吾心喜獻佛鮮花供四斷惑正覺尊隨渡瀑流人比丘衆中坐為說如次偈五供施鮮花物充滿天上香吾將讚其人傾耳聽吾說六彼男此世沒隨於諸天衆佳提花圍繞趣赴天世界七所居甚高聳黃金摩尼造纍積福業故幾多層宮殿八七十四度間統領神世界天女等所敬享受無虧樂九統治三百國住此大地上七十五度間彼為轉輪王一稱名為難勝為衆人國主其福彼享受依己所造業一一一度往惡趣彼生來人間黃金存多量積纍有百億一二彼生於此世者婆羅門族萬甘達之子賢明舍利子一三央祈羅娑教於彼求出家名周羅純陀為尊師弟子一四猶為沙彌時彼即成漏盡諸漏皆正知無漏證涅槃一五大雄善比丘及他吾奉事奉事於吾兄了達最上義一六奉事於吾兄身骨集吾鉢世間居上首親近正覺尊一七人天大覺者緊執吾兩腕示彼之身骨讚第一弟子一八此心吾解脫確立此信心諸漏皆正知吾住成無漏一九四之無礙解如是尊者純陀長老宣唱此等偈攝頌優波離輸那拔提山尼達巴哈提耶羌達薩耶羌伽瑪最後純陀須跋陀十人共偈百四十其上更有四偈存

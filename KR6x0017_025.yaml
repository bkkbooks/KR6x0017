body:
  text: 第二十五脫瓦羅達耶迦品二四一脫瓦羅達耶迦脫瓦羅布施一吾住森林中其昔為獵人吾取脫瓦拉布施與僧衆二彼時行布施九十一劫間惡趣猶不知是布施果報三四之無礙解如是尊者脫瓦羅達耶迦長老宣唱此等偈二四二那伽開薩利耶那伽花絲一爾時吾備弓深入森林中幽清花美麗那伽花絲垂二見而兩手採合掌於頭上吾捧獻與佛帝沙世緣者三供養其花故九十二劫間惡趣吾不知供佛此果報四從今七七劫昔名波伽拉大力具七寶出為轉輪王五四種無礙解如是尊者那伽開薩利耶長者宣唱此等偈二四三那利那開薩利耶那利那花絲一去湖正中央吾棲為水雞吾見天中天時直風路來二吾以清淨心嘴銜一花絲就此捧獻佛帝沙世緣者三彼花吾供養九十二劫間惡趣吾不知供佛此果報四七十三劫昔其名稱百葉大力具七寶出為轉輪王五四種無礙解如是尊者那利那開薩利耶長老宣唱此等偈二四四義拉瓦普毗耶義拉瓦花一漏盡千人隨世間大導師吾取義拉瓦捧獻與佛陀二彼花吾供養九十一劫間惡趣吾不知是供佛果報三四種無礙解如是尊者義拉瓦普毗耶長老宣唱此等偈二四五庫提多巴迦室薰一悉達多佛陀吾守護房室時時吾淨信己手馨房室二彼時行此業九十四劫間惡趣吾不知供佛此果報三四種無礙解如是尊者庫提多巴迦長老宣唱此等偈二四六鉢塔達耶迦鉢施一最上克己鍛悉達多大仙如是端直人吾為作鉢施二彼時行施故九十四劫間惡趣吾不知施鉢此果報三四種無礙解如是尊者鉢塔達耶迦長老宣唱此等偈二四七呪都普奢伽身骨供養一悉達多世尊救主涅槃時如是兩足王吾得一身骨二日種出佛陀身骨吾取得如佛居其處五歲吾奉祀三彼時供身骨九十四劫間惡趣吾不知供骨此果報四四種無礙解如是尊者呪都普奢伽長老宣唱此等偈二四八波吒釐普奢伽波吒釐供養一七朵波吒花爾時頭上戴毗舍浮至人捧獻彼佛陀二獻花供養故三十一劫間惡趣吾不知施花此果報三四種無礙解如是尊者波吒釐普奢伽長老宣唱此等偈二四九賓比伽利耶一巴多穆塔拉衆稱最勝者佛說四諦法宣示不死道二賓比伽利花爾時吾採來捧獻供施佛兩足尊王者三六十八劫昔四金伽花絲大力具七寶有為轉輪王四四種無礙解如是尊者賓比伽利耶長老宣唱此等偈二五鬱多羅達耶迦鬱陀羅花布施一伽庫達佛名世間自存人彼由林中出來至大河邊二吾取鬱陀羅供施自存人端直自制者令吾心意淨三鮮花吾供養三十一劫間惡趣吾不知施花此果報四四種無礙解如是尊者鬱多羅達耶迦長老宣唱此等偈攝頌脫瓦羅那伽那利那義拉瓦庫提多巴迦鉢達都都波吒釐賓比鬱多羅達迦十人供偈三十七

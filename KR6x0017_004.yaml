body:
  text: 第四軍頭波漠品三一軍頭波漠曲背達那一最上自存佛七日間宴默聖佛吾信樂奉事心內喜二巴多穆塔拉知佛起立時手執羊角樵往近大牟尼三世間之導師彼尊受其實大牟尼進食吾心得清淨四無上隊商長正覺尊垂食坐上於已座説示如次偈五集於此山中皆為夜叉居森林諸鬼神傾耳聽吾説六如獸王獅子若有奉佛者稱道於其人善聞吾示語七彼者十一度將為諸神王三十四度間又為轉輪王八十萬劫之後出生甘蔗族稱為瞿曇姓出世為尊師九彼等罵有德無漏之沙門其為惡業果如彼得其名一為師法後嗣由法生法子彼為師弟子名軍頭波漠一一耽浸於孤獨悅禪入禪思吾滿足彼師得住於無漏一二弟子等圍繞比丘衆尊敬比丘衆中坐勝者請執籌一三偏袒右肩衣禮敬世導師説於勝者前吾拔最初籌一四搖動萬世界佛知吾原故賜坐比丘中置座最上位一五精進如調牛運往安穩處等正覺者教得保最後身一六四種無礙解吾證八解脫亦得六神通吾行佛之教如是尊者軍頭波漠長老宣唱此等偈三二娑竭陀善來一名謂輸毗多時為婆羅門弟子等隨後吾往佛伽藍二佛恰於其時比丘衆隨從由伽藍門出至人遂停立三調御人等隨吾見調御佛己心遂清淨讚歎世導師四無論何種樹就地皆萌芽如具覺智者初生勝者教五有慧隊商長領導衆多人懇教以正道導得惡道出六禪思自調御調御悅禪者精勤志平靜圍繞斯人等七己為衆所飾圍繞汝光輝光明由汝放日出雲雷間八巴多穆塔拉吾生信樂心師立比丘中為説如次偈九稱我婆羅門令生微笑容十萬劫之間享樂神世界一從兜率天沒淨根故所使唯彼佛瞿曇教示彼出家一一求頻婆樹果得阿羅漢位名謂娑竭陀尊師之弟子一二身犯諸惡業捨之而出家亦棄口惡業得吾淨活命一三如斯吾止住通曉諸火境諸漏皆正知得住於無漏一四四種無礙解吾證八解脫亦得六神通吾行佛之教如是尊者娑竭陀長老宣唱此等偈三三摩訶迦旃廷大剪剔種之男一巴多穆塔拉於蓮及支提吾作獅子座支提塗黃金二寶石造傘蓋然手持拂子世界之緣者吾今捧獻佛三地上有諸神其時皆來集寶石造傘蓋佛語其果報四尊師所説語大衆皆聆聽等正覺者教吾等益生笑五上坐座黃金無上最勝者比丘衆圍繞以説如次偈六黃金寶所造若有施座者吾將稱其人傾耳聽吾言七神王三十度統領神世界四周百由旬威服以光輝八來至人間世生為轉輪王王名稱光耀威光殊大者九無晝亦無夜如百光陽升四周有八寶輝耀帝剎利一十萬劫之後生甘蔗族稱謂瞿曇姓世出大尊師一一從兜率天沒淨根所使故名謂迦旃延婆羅門種族一二其後彼出家成無漏羅漢光明靡世間瞿曇置被位一三詢以簡潔問彼為詳細説詳答彼所問所望得滿足一四吾生富有家吠陀婆羅門捨棄財寶穀出家成無家一五詢以簡潔問詳細為説明所望得滿足歡喜兩足尊一六人中自存者大雄彼歡喜比丘衆中坐置吾最上位一七四種無礙解五證八解脫亦得六神通吾行佛之教如是尊者摩訶迦旃延長老宣唱此等偈三四迦留陀夷時起一世間居上首巴多穆塔拉爾時在步行托鉢遊諸方二鉢頭摩華放吾持優鉢羅持來最上飯施與彼尊師三彼大雄攝受最佳美味食並納受諸花向諸人宣示四世之美愈愛水生無上花彼施此美花然所更難為五獻佛花與飯最勝施與者將稱讚於彼吾説傾耳聽六彼十與八度統領神世界上具優鉢羅具有摩利迦七由其福業報於彼具天香時常於空上持之並作覆八二十五度間彼為轉輪王統治五百國彼住大地上九十萬劫之後出生甘蔗族稱謂瞿曇姓世有尊師出一己滿所為業淨根所使故釋迦族人等歡喜其親族一一其後彼出家淨根之所使正知諸般漏無漏證涅槃一二彼達無礙解了脫所作為於世具緣者置彼於上位一三彼精勤專念心靜無執著名謂優陀夷尊師之弟子一四內心無繫縛憍慢偽善除正知諸般漏吾住於無漏一五賢善精勤者滿足等正覺佛對吾歡喜置吾於上位一六四種無礙解吾證八解脫亦得六神通吾行佛之教如是尊者者迦留陀夷長老宣唱此等偈三五謨賀囉惹癡王一無敵自存佛阿塔達西尊比丘衆圍繞而由步行來二弟子等周圍吾由家中出由家趨赴彼會見世導師三禮敬正覺尊合掌於頭上己心遂淨化讚嘆世導師四有情有形物無形無想者此等汝智慧一切攝其中五漁夫以巧網圍取水中物生物棲於水身陷於網中六有形及無形意思若有存汝於此等衆皆汝智慧攝七暗黑正彌漫汝傾濟此世爾法入耳聞彼度疑念流八無明圍世間亦為黑暗覆尊智燦光輝除掉真暗黑九一切爾智眼頓消大黑暗耳聞殊勝法衆多人涅槃一於今此壺中滿盛純精蜜至誠雙手執捧獻彼大仙一一大雄彼大仙援手受此供一切知者食上騰至高空一二阿塔達西佛尊師空上位吾心得清淨尊師説次偈一三讚歎吾智慧稱揚尊勝佛彼心若得淨終不墮惡趣一四或十或四度統領神世界彼住此地上並有八百國一五一百又五度當為轉輪王統治此大地乃至廣大國一六聖學書並勝亦通三吠陀彼佛瞿曇教聆受至出家一七甚深微妙法智慧究真義名謨賀囉惹為尊師弟子一八彼亦具三明無漏了所作隊商長瞿曇置彼於上位一九捨棄人繫縛斷去有束縛諸漏皆正知安住於無漏二四種無礙解吾證八解脫亦得六神通吾行佛之教如是尊者謨賀囉惹長老宣唱此等偈三六阿提目多解脫一阿塔達西佛至人寂滅時更以信樂心招請比丘衆二所請衆僧寶安靜無枉曲甘蔗曼陀婆無上施僧伽三諸神與人間吾生任何胎吾勝諸有情福業所果報四彼時吾布施由千八百劫終不知惡趣布施之果報五四種無礙解吾證八解脫亦得六神通吾行佛之教如是尊者阿提目多長老宣唱此等偈三七拉斯那達耶伽大蒜布施一鄰近雪山處爾時為行者吾生大蒜食大蒜為主食二佉梨大蒜豐吾赴僧伽藍向僧施大蒜雀躍心內喜三上人毗婆尸樂欣教僧衆布施大蒜報一劫樂天宮四彼時施大蒜九十一劫間吾不知惡趣布施大蒜果五四種無礙解吾證八解脫亦得六神通吾行佛之教如是尊者拉斯那達耶伽長老宣唱此等偈三八阿耶格達耶伽供器布施一言説者尸棄救世主寂滅雀躍心內喜吾拜無上塔二語告司財者其時與資金雀躍心內喜令之作供器三八劫於天上吾住無間絶餘劫住人天混世吾轉生四諸毒不得侵凶器不能殺入水不沉溺供器之果報五吾若望雲雨即有大雨降諸神隨吾意福業之果報六人間三十度具足七種寶無人輕蔑吾乃福業果報七令之作供器三十一劫間吾不知惡趣供器之果報八四種無礙解吾證八解脫亦得六神通吾行佛之教如是尊者阿耶格達耶雅伽長老宣唱此等偈三九單摩奢奇迦法輪一悉達多佛陀相對獅子座吾立彼法輪傑作賢者頌二勇牛共拖車歡欣色光輝時常相圍繞衆人多相隨三六萬種樂器常時繞身傍隨衆故輝煌福業之果報四吾豎立輪寶九十四劫間吾不知惡趣施法輪果報五十一劫往昔君主有八人薩哈薩拉迦具大力輪王六四種無礙解吾證八解脫亦得六神通吾行佛之教如是尊者單摩奢奇迦長老宣唱此等偈四卡巴魯奇耶劫樹一悉達多佛陀相對勝塔婆結繫美麗布吾為栽劫樹神樹二諸神與人間吾生任何胎吾家門庭輝劫樹常樹立三不論誰依吾乃至吾隨衆取其劫樹布吾等常著用四當時吾植樹從此九四劫吾不知惡趣植樹之果報五第七劫古昔蘇且羅八王大力具七寶吾為轉輪王六四種無礙解吾證八解脫亦得六神通吾行佛之教如是尊者卡巴魯奇耶長老宣唱此等偈攝頌軍頭娑竭陀迦旃延與優陀夷阿提目多與羅惹阿耶格與單摩奢卡巴魯奇共十人其唱偈百十二

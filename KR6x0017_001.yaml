body:
  text: 譬喻經歸依彼世尊應供等正覺第一佛陀品一佛陀之譬喻一佛說諸譬喻淨意且諦聽三十波羅密法王數難知二諸佛正菩提僧隨世導師合十示歸命禮拜頭觸地三佛國不知數見寶殊有限一切空及地致意吾運作四彼處白銀地吾於建樓閣幾重寶層階高聳入蒼穹五柱色映造法無從估其值門楣黃金造門傘美裝飾六琉璃第一層輝似無垢雲池中多水草滿地鋪黃金七珊瑚如其色何色映真紅胭脂色光輝映照遍四方八門庭善規劃大窗高尖塔四欄楯羅網香華鬘清爽九美侖樓閣具七寶所裝飾青黃復赤白亦有漆黑色一蓮花映耀色獸鳥現光輝諸宿之星群日月飾虛空一一黃金羅網覆結黃金鈴鐸隨風起鳴響黃金華鬘爽一二樓閣有緑窗紅赤與黃色幢柱結華鬘紛紜諸色彩一三白銀所造板紅玉摩尼造貓睛石所成種種數百多一四敷諸色美牀柔展迦尸衣欽婆羅黃麻織錦支那絲綿織與毛織勝色諸外衣一切種種覆致意吾設敷一五階上此彼處貴寶飾尖屋摩尼輝炬火支撑確樹立一六柱楹閃光輝美哉黃金門閻浮檀金色堅材白銀造一七連鎖幾多分扉閂著色彩左右多福瓶蓮花插青紅一八一切往昔佛率諸僧弟子世間真導師形以色所造一九佛率衆弟子聖者入其門黃金座椅上聖者坐一群二此世現住佛無上世幾多往昔有幾人上升於彼處二一自存無能勝幾百辟支佛往昔彼等在伴吾於彼處二二天上或人間衆多有劫樹一切衣棄捨吾今披三衣二三種種美味物飲食善調理摩尼造耀輝盛吾鉢行施二四吾捧天上衣彼等披淨衣更有甜砂糖油蜜與糖漿美食心歡悅彼等聖者群二五居蜜如獅子彼等入寶屋高貴座褥上暫為獅子臥二六彼等從座起正知跏趺坐攝佛一切食浸入定愈悅二七或為示諸法或享神足樂或達神通境耽於神通中其數幾百千復有弄姿者二八諸佛問諸佛執境一切智甚深微妙事彼等智慧悟二九弟子問諸佛諸佛問弟子彼等互起問相互作問答三諸佛辟支佛弟子與侍者如斯耽愈悅彼等樂樓閣三一黃金白銀網諸網相結造真珠網圍繞寶傘頭上罩三二有布遮陽光黃金五彩星散花色彩美一切掩頭頂三三花束散其上香束復輝映衣束亦分撒復以寶束飾三四撒花美艷麗更以良香薰捺香五指印黃金覆其上三五四方有蓮池紅蓮青蓮覆蓮花粉紛飛現出黃金姿三六一切樹花開沿邊繞樓閣諸花自散敷芳香注落上三七彼處孔雀舞天鵝演聖歌迦陵頻迦鳥處處鳥群歌三八天鼓響四方到處琵琶音吹奏諸天樂盡縈各樓閣三九佛土或鐵圍所居其上方各具大光輝寶成無裂罅四建立黃金臺燈明樹輝煌其數上萬炬依次皆並立四一歌娘與彩女舞踊天女群種種舞台現縈繞諸樓閣四二須彌山頂上山顛見樹梢幢幡吾所樹五種彩色美四三天龍乾闥婆諸神悉並臨合掌示歸依環繞諸樓閣四四不問何善業吾皆應所行上升於三天身口意皆善四五有想或無想一切諸有情吾所積福果皆可獲分享四六吾實為彼等尋致與福果彼等未留意神至使得知四七此世諸有情因食故有生美味由吾意得獲一切食四八吾意行布施吾意持淨信一切覺獨覺供養勝弟子四九依吾心所願修行諸善業捨棄此人身吾上往三天五天上與人界吾知此二界吾意所望果他界吾不知五一吾為神上首吾為治世主完具端美姿智慧亦無雙五二種種佳美食珍寶亦不鮮種種勝妙衣由空現吾前五三地山與空際或復水森處吾掌一伸展天食即現前五四地山或空際乃至水森處吾掌一伸展諸寶現吾前五五地山與空際或復水森處吾掌一伸展諸香即現前五六地山與空際或復水森處吾掌一伸展乘輿現吾前五七地山與空際或復水森處吾掌一伸展華鬘現吾前五八地山與空際或復水森處吾掌一伸展莊嚴具現前五九地山與空際或復水森處吾掌一伸展童女來吾前六地山與空際或復水森處吾掌一伸展糖蜜現吾前六一地山與空際或復水森處吾掌一伸展諸食現吾前六二漂泊無財者行人來乞者澄得正覺者吾行勝布施六三岩山大震撼轟動諸深山此世吾成佛神界普歡喜六四此世有十方運行無限際無論何方位佛國不知數六五吾輝映光明二道光運轉彼處與其間光焰大輝映六六如此多世界一切衆見吾一切心歡樂一切皆從吾六七更發優美音吾打不死鼓彼處與其間諸言傾耳聞六八法雲以降雨人皆成無漏彼處雖劣者亦達預流果六九布施應施物滿行戒無餘出離波羅蜜到達無上悟七質問賢者事行無上精進得忍波羅蜜到達無上悟七一真諦行加持滿諦波羅蜜得慈波羅蜜到達無上悟七二得不得樂苦尊敬與不敬到處皆平等到達無上悟七三見怠惰懷怖見精進得安勉勵行精進此為諸佛教七四見諍論懷怖見不諍得安親和共和合此為諸佛教七五見懈怠懷怖見不懈得安勵修八正道此為諸佛教七六多佛及羅漢遍集咸來聚對此佛羅漢禮敬應歸命七七諸佛不思議佛法越思議具有淨信者果更不思議如是世尊自己不斷修佛之行為說諸佛之譬喻及諸法門二辟支佛之譬喻諦聽辟支佛之譬喻一佛住祇多森林中鞞提訶牟尼那丹伽問彼世有辟支佛者耶彼等緣何如是賢二是日一切智者佛妙音說示阿難陀彼等奉事佛已盡未得解脫勝者說三彼等賢者希厭離雖無諸佛鋭智慧若有些少之所緣彼等將達辟支位四此世之中除吾外實則無能較獨覺彼大牟尼有住地吾宜說明彼階境五誠然自成偉大仙記取諸佛之善言些蜜希冀無上藥心淨諸人傾耳聽六幾多辟支佛來集彼等其語如得悟吾今繼傳其諸說徑含過患離欲事七愛欲諸事棄欲想欲樂世界斷樂心拼棄妄想克戰栗彼等就地即得悟八生者一切收拄杖其中一人亦無惱同情慈心深摯富應如犀角獨步行九生者一切收拄杖其中一人亦無惱不求子弟況求友應如犀角獨步行一接觸生處有愛執追逐愛執現苦趣觀由受執生過患應如犀角獨步行一一親者友者同情深心為所執致失利觀於親愛斯可怖應如犀角獨步行一二如蔓竹枝互錯綜宛若妻子愛著強如竹之梢無執者應如犀角獨步行一三恰如森中無縛鹿覓取餌食如意行賢人善觀本具性應如犀角獨步行一四友中糜集或住家行旅共語乞機緣善觀無貪本具性應如犀角獨步行一五友牛歡愈共遊戲面對子等大愛著起愛著者厭離別應如犀角獨步行一六不論何方住四方心常滿足無障礙縱臨險境無恐怖應如犀角獨步行一七或為出家難融和或為俗人有眷家他人子等不措意應如犀角獨步行一八俱毗陀羅樹葉斷在家所持標幟除勇者斷除家束縛應如犀角獨步行一九若得堅固之友情彼得正生得賢友戰勝一切諸危險俱行正念彼歡喜二不得堅固之友情彼正生不得賢友如王國土被征服棄位獨行如龍象二一友應讚諸德完具應交同等之善友如得斯友生無過應如犀角獨步行二二鐵工之子運匠心打造黃金二腕環兩腕共同見相擊應如犀角獨步行二三第二之者與吾共戲論之言執著生觀果畏怖於未來應如犀角獨步行二四愛欲艷麗甘美樂幾多變形撥擾心見諸愛欲有危險應如犀角獨步行二五𨂰疽厄事為吾患病苦毒箭為怖畏見諸愛欲畏其果應如犀角獨步行二六猶如寒暑與渴饑及風陽光虻與蛇克勝此等及一切應如犀角獨步行二七巨大斑象肩負盛猶如離卻彼象群如己之意住林中應如犀角獨步行二八雖然假得之解脫善社交者無是處日種之言深植心應如犀角獨步行二九拼棄牽強幾謬見立於正道始得悟常思自立吾生智應如犀角獨步行三不貪渴愛不行詐不犯惡德棄愚癡不欲世界相比並應如犀角獨步行三一邪惡之事思不利回避心惡之伴侶勿交追惡放逸者應如犀角獨步行三二博識偉大持正法親交友人富奇智知利以之斷疑惑應如犀角獨步行三三此世遊戲與愈樂不索愛戀心不滿遠避華美語真實應如犀角獨步行三四父母妻子諸眷屬財寶穀類緣者等彼等諸愛皆棄捨應如犀角獨步行三五執著於彼幸福鮮其處少味苦更多識者辨彼毒之箭應如犀角獨步行三六不論幾多破諸結猶如河魚突破網己燒之處火不返應如犀角獨步行三七不動貪心目下垂防制諸根須護意怒火不燒無煩惱應如犀角獨步行三八除去右家之標幟如摘晝度樹之葉身纏袈裟為出離應如犀角獨步行三九不貪諸味無煩擾次第乞食不養他於各家門心無執應如犀角獨步行四心之五蓋棄無遺一切煩惱除無餘無執棄捨愛之罪應如犀角獨步行四一捨棄一切樂與苦先去心中喜與憂領會清靜無苦樂應如犀角獨步行四二為得一義諦精進行無懈怠心無執具足體智勝精進應如犀角獨步行四三勿棄獨居與禪思常於諸法如法行於三界中悟過患應如犀角獨步行四四唯座滅愛常不懈賢明正智聖教通悟得正法聖道定應如犀角獨步行四五聞聲不驚如獅子以網難捕猶如風泥水不污如蓮華應如犀角獨步行四六獸王獅子牙堅強恰如威服諸獸狀遠離市集為住處應如犀角獨步行四七慈悲喜捨四等心解脫修行適機緣世界衆生皆無礙應如犀角獨步行四八拼棄貪欲與瞋癡不論破幾多諸結臨命終時無恐怖應如犀角獨步行四九人為趨利多奔勞不逐利養友難得見己利者不清淨應如犀角獨步行五持戒清淨智亦淨安靜覺醒唯專念勝觀須達法分別知達道支菩提分五一修習勝者諸佛教智慧與願如實相賢者彼等非弟子彼乃自存辟支佛五二體會多法偉大法統心渡越泛苦海第一義諦心高揚如彼獅子如犀角五三入定鎮意鎮諸根邊土衆生用深心他世此世燃燈火辟支佛等常利人五四彼等人王除覆障世界燈明固金輝祛疑應受世尊敬辟支佛等常利人五五辟支佛等善言辭人天界中諸人聞如實聞法不愚行彼等排徊諸苦界五六辟支佛等善言辭恰如少許甜蜜流如實聞法勵行者具足智慧悟真諦五七辟支佛等諸勝者諷頌幾偈讚出離人中獅子釋迦佛如法領解為此說五八此等數多辟支佛為憐世人多變化厭離執著增智慧自存獅子佛為說三長老之譬喻諦聽長老之譬喻一舍利弗鶖鷺子一距雪山不遠有藍博伽山彼處是仙境善造木葉菴二岸平有小川勝境心神寬岸多美砂洲處近吾菴居三平坦無瓦礫清爽無惡臭近處小川流裝點吾居境四宮毗羅摩竭有鰐亦有龜彼處小河流蜿蜒仙境居五波提那鮑薩猛伽羅喜他窪古拉樹蔓廣點吾仙處六河川兩岸邊諸樹放花果左右相垂覆廣飾吾仙處七菴婆蔻拉伽提拉伽三樹辛度瓦利他波吒釐二樹薰芳天上香花開吾仙處八旃簸迦尼帕薩拉拉那伽芬那迦樹花啓他佳諸花薰芳天上香花開吾仙處九阿奇姆達樹更有阿輸迦巴基民瑪拉更有安蔻拉頻毗伽拉樹花開吾仙處一啓他佳之花坎達犁之花台那斯利迦克布迦之花薰芳天上香花開吾仙處一一羯尼迦樹花牙皂花樹花阿薩那樹花黑漆樹諸花薰芳天上香廣飾吾仙處一二吉利芬那伽芬那伽樹花俱毗阮羅樹諸樹盡開花薰芳天上香廣飾吾仙處一三鬱陀羅樹花庫達迦樹花迦曇婆樹花窪古拉樹花薰芳天上香廣飾吾仙處一四依西姆茲迦或阿羅迦樹摩睹輪義樹或者迦達梨香水所滋育樹果實纍纍一五或有蓮花開花絲伸出外另有蓮蓓蕾池中時開放一六結實滿蓮蓬蓮莖水中洗辛伽提花葉展敷裝飾池一七菴婆之莖齎般豆時婆迦實高天上香池中時開放一八波提那鮑薩猛伽羅喜他瑪古拉魚群爾時棲池中一九宮毗羅與鰐坦提茨伽瓦水中動物或有諸羅剎或有奧加瓦水中動物阿奢伽拉蛇時亦棲池中二播羅縛多鳥拉威漢薩鵝拿第洽拉鵝斫迦羅婆迦鵝之一種尚有拘耆羅蘇伽與薩利如斯諸衆鳥來近湖中棲二一鴣鴣他佳鳥庫利拉迦鳥森林多鶴屬笛音第巴鳥蘇瓦波他鳥來近於湖中二二鵝鳥與蒼鷺尚有諸孔雀丹巴鶖拉迦亦有拘耆羅耆婆耆婆迦更有桑婆迦如斯諸衆鳥來近湖中棲二三婆達喜薩鳥更有諸梟鳥鶚鷹數亦多摩訶迦羅鳥如斯諸衆鳥來近湖中棲二四野豬及斑鹿豺狼數亦多蘇伽波塔獸又有羅喜迦如斯衆獸類來近湖邊棲二五獅子與虎豹熊狼與鬣狗更有諸大象發情三徵候如斯衆獸類來近湖邊棲二六或猿緊那羅林中常奔躍山野諸獵夫來近湖邊棲二七鎮頭迦果樹匹雅拉果樹末度迦果樹伽斯瑪利樹長青頻結果不遠吾仙處二八蔲孫芭尼帕薩拉拉三樹長青頻結果不遠吾仙處二九或有訶梨勒或有阿摩勒菴婆與閻浮更有毗醯勒棗與胡桃樹復有貝拉果三或有阿魯拉亦有伽藍芭或有他卡拉亦有毗拉莉或有吉瓦迦亦有薩哈迦如斯衆多樹不遠吾仙處三一仙處之鄰邊有池人造美水澄清且冷勝境心神清三二生長鉢頭摩亦生優鉢羅分陀利迦生曼陀羅華覆如是等諸華薰芳天上香三三如斯一切具林中花果實造作樂仙境彼時吾居住三四有德守禁戒常樂入禪思果達五神通苦行修樓脂三五弟子二萬四皆盡奉事吾彼等婆羅門門閥高榮譽三六善觀吉凶相亦知古傳說語彙式典通諸種文法明問答解釋秀通達法究竟三七或為豫占術或精觀相明地上與地中更亦觀空中明確示先兆是吾弟子等三八少欲且賢善食少而不貪得不得滿足常從吾身邊三九樂禪於禪思堅固心寂靜所望無一物常從吾身邊四神通波羅蜜乞食父祖地堅固步虛空常從吾身邊四一緊閉六根門無欲守諸根堅志不應酬近吾弟子難四二宴坐結跏趺起立則經行修行常徹夜近吾弟子難四三愛色不執著惡事亦不犯愚者不為愚近吾弟子難四四為驗其神足彼等常進行強烈震大地近於彼等難四五彼等弟子樂而樂於禪悅採果閻浮洲近吾弟子難四六或至瞿耶尼弗婆毗提訶或行鬱單越近吾弟子難四七致佉梨在前彼等尾隨後二萬四千人遮蔽空一面四八聖火燃不燃乳鉢持楊枝諸食以岩碎慣食如樹實四九彼等行水浴朝夕喜清潔淋注於頭上近吾弟子難五腋毛爪伸長頭穢齒成黃唯有戒芳香近吾弟子難五一朝夕螺髻者偉大行者集得不得宣畢爾時御空行五二此等人去時大地響震動如羚羊皮響諸神懷喜心五三仙人等空翔去此復往彼委身己之力彼等行隨意五四彼等震動地並行翔空際偉大力無勝如海動搖難五五或就地經行仙人如勢坐亦或就攝食近吾弟子難五六彼等修慈行望使諸物生皆稱讚無我無人輕彼等五七如無畏獅王威力猶象王難近如虎豹彼等來吾前五八諸神咒術者那伽乾闥婆羅剎鳩槃荼鬼魔陀那婆更有迦樓羅來近湖畔棲五九荷擔一佉梨身著美皮衣空翔螺髻者來近湖畔棲六彼時身相應相互致敬意其數二萬四竟無一咳音六一彼等足並足自制無聲響凡近吾邊者頂禮頭觸地六二行者等心寂弟子圍繞吾吾住彼仙境耽樂於禪思六三仙者戒芳香同於花芳香樹樹實芳香仙處遍馨芳六四晝夜吾不知吾遂無不快吾勉弟子等於吾愈愈悅六五花開散其香各各樹果香滿溢天上香仙處無限輝六六由深定起來精勤吾明智荷擔一佉梨行入森林中六七卜兆與占夢觀相更熟稔爾時吾步行誦念句真言六八阿諾瑪達西彼之佛世尊世界為上首人中之長者愛孤等覺者來到此雪山六九慈悲彼牟尼步入此雪山人中之尤者彼結跏趺坐七吾見此覺者光輝心神善宛如青睡蓮牟尼如火燃七一光輝似燭臺閃電雷雲間我見世導師如娑羅樹王七二大雄之龍象滅苦乃牟尼人能見此佛免除一切苦七三吾見天中天求瞻其身相彼為佛與否吾見具眼者七四足有千輻輪吾見此寶相得見其輪相判定為如來七五爾時手執四周吾清掃採來八枝花供養無上佛七六供養漏盡佛越渡瀑流佛皮衣袒右肩南無世導師七七漏盡等正覺依憑斯智慧智慧吾為宣請聞吾所言七八無量增自存汝來濟此世惟見汝姿形先渡疑念流七九生物之尊師幡幢與木樁依靠汝支拄兩足之尊者八以瓶可量海能知其水量一切知者智不能知其量八一稱盤置地上雖能得承持一切知者智不能知其量八二綱指測空間雖能知其量一切知者智不能知其量八三一切大海水所有諸大地與佛智相較不適比作譬八四天上人間界依汝智慧轉汝為具眼者懸掛智慧綱八五以彼之智慧可達最上悟一切知者智摧毀諸外道八六宣說幾偈竟苦行修樓脂敷展皮之衣彼坐於地上八七入於大海中八萬由旬餘聳高亦相同被稱諸峰王八八須彌山高聳長幅亦相同碎為微塵粉十萬俱胝數八九適用落叉數十萬可能數至盡一切知者智數不能盡量九以彼細目網若圍水中者無論何生物悉掛入網中九一彼實如大雄不問何外道跳入茂密見陷溺於執著九二洞悉見一切淨爾智慧故彼等懸於網汝不越網目智慧九三爾時彼世尊名聲高一切彼由入定起勝者眺四方九四彼之牟尼佛弟子尼薩巴數十萬寂心圍繞如彼者九五漏盡得清淨六通者圍繞彼知佛之心近世界導師九六彼等空中立以行右繞禮合掌念南無來臨佛陀前九七阿諾瑪達西牟尼彼世尊世間居上首人中之長者比丘衆中坐微笑彼勝者九八婆留那侍者遍袒衣右肩頂禮知者仙問訊世導師九九世尊今以何因緣尊師現微笑誠如無緣故若無現微笑一阿諾瑪達西牟尼彼世尊世間居上首人中之長者坐於衆當中彼為語此偈一一以花供養吾嘆不得智慧吾為斯者頌傾耳聽吾言一二聞知佛言語諸神皆來集聽聞佛正法親近正覺尊一三住於十世界威力優神群聽聞佛正法親近正覺尊一四象馬車諸兵步兵共四軍皆常圍繞彼供養佛果報一五具六萬樂器更有美飾鼓常侍彼左右供養佛果報一六一萬六千女盛粧婦人等美衣美飾具耳結摩尼環一七微笑長柳眉豐臀細腰女皆常圍繞彼供養佛果報一八其間十萬劫樂於神世界千度為神王統理神世界一九千度於此國成為轉輪王廣統諸國土不能盡其量一一逮至最後生應生於人間彼婆羅門女孕育舍利胎一一一依其母名姓得知為男性其名舍利弗鋭利智慧者一一二八十俱胝財捨棄成無物出家求寂靜倣徨此地上一一三計彼無量劫出生蔗王族呼為瞿曇姓出世為尊師一一四彼師法後嗣法子由法生其名舍利弗第一佛弟子一一五婆擬儸恆伽雪山水源量為滿彼大海注流入海中一一六如實舍利弗能具三通者達於究竟智彌滿諸生物一一七雪山及諸海更與大海較算數不能盡彼處砂數多一一八遍數無有餘其數亦能盡舍利弗智慧數算無際限一一九適用數落叉恆河沙可盡舍利弗智慧遍數無際限一二海神揚其波數算不能盡如實舍利弗智慧無限際一二一釋迦族之長無上等覺者喜彼之瞿曇達於究竟智佛之大弟子智慧屬第一一二二釋迦族之子依法轉法輪倣此正轉時普降正法雨一二三釋迦族之長瞿曇皆熟知比丘衆中坐置彼於上席一二四阿諾瑪達西奉侍為吾師吾實盡所事盡吾所事畢不問於何處能為波羅蜜一二五積業無量劫此處示其果吾脫箭疾之以滅吾煩惱一二六涅槃無限制吾求不動道尋檢諸異徒幾生吾流轉一二七恰似有病者應尋適藥草為令其病愈搜索森林中一二八涅槃無制限吾求不死道撒散五百金出家為仙人一二九頭梳螺髻荷吾著皮上衣神通得究竟吾行梵天界一三且置聖者教異徒非覺者任何覺智者能解勝者教一三一希財物無益爾時吾沉思尋索無所限徘徊隨異徒一三二恰如索髓人切破羊角樵彼為無髓樹其處不見髓一三三如世異徒群有種種異見非限制彼等羊角樵無髓一三四逮至最後生吾為婆羅門棄財百俱胝出家無家者第一誦品一三五殊勝聖學書亦通三吠陀刪闍耶淨者吾住於其邊一三六大雄爾弟子其名阿說示威嚴難親近爾時彼乞食一三七見彼智慧具聖者沐聖智大龍心寂靜恰似蓮華開一三八清意攝諸根氣高如雄牛吾見心思慕此是阿羅漢一三九意樂身形美彼行善自制鍊最上克己彼見不死人一四為滿心意足吾問最上義吾問彼應語爾時吾再問一四一彼人行乞食吾行隨其後應問不死道念得此機會一四二彼至道當中行近吾發問賢者姓為何汝身隨從誰一四三被問如獅子無怖彼說言佛出於此世從彼為弟子一四四如何大名聲可肖大雄者佛教與其法敬請為吾說一四五被問之所說深奧微妙道滅卻渴愛箭除去一切苦一四六諸法因緣生如來說其因諸法由緣滅大沙門斯說一四七說明吾此問而得第一果吾聞勝者教無穢亦無垢一四八吾聞聖者言吾見無上法吾浸此正法稱唱如次偈一四九若彼為真法往昔那由他多劫不得見今得無憂道一五然吾索諸法徘徊隨異徒今吾達目的不應懈怠時一五一說示不動道吾得喜滿足吾尋摯愛友吾行往仙處一五二遙見識吾來吾友學識深此友具威儀彼語如次言一五三顏淨眼清爽見而如聖者爾己得不死涅槃不動道一五四美姿汝今來如無妄念者鍊最上克己心靜婆羅門一五五吾得不死法除去憂悲箭爾欲得此法吾等往佛前一五六誠然學識深吾諾彼友言相互手執手往赴尊師前一五七釋迦族聖子吾等來汝邊蒙教出家法吾等住無漏一五八彼名拘離多具過人智慧具有神通秀相攜輝弘教一五九吾意不得遂徘徊隨異徒今得見爾師吾意心滿足一六地上生諸樹季節到花開薰芳天上香生物皆歡悅一六一如實大雄者釋迦族聖子吾立於汝教應綻放盛季一六二應開解脫花精進脫輪回令得解脫花萬物皆欣悅一六三佛國有限人偉大唯牟尼具眼者汝子智慧世無雙一六四從爾弟子等自制學行深鍊最上克己常圍繞爾前一六五賢者喜禪思寂靜心安寧聖者具智慧常圍繞爾前一六六少欲賢堅固食少心不貪滿足得不得常圍繞爾前一六七空間喜頭陀粗衣耽禪思賢者樂孤獨常圍繞爾前一六八勵行正道者立於道果者得成學處者已得道果者願最高義者常圍繞爾前一六九預流無垢者及得一來果不還阿羅漢常圍繞爾前一七善修七念處喜修覺支者數多弟子等常圍繞爾前一七一殊勝神足通喜修靜慮者勵行正道者常圍繞爾前一七二三明六通者神通波羅蜜滿智波羅蜜常圍繞爾前一七三如斯爾大雄學深弟子等難有近威嚴常圍繞爾前一七四想念積深行弟子等圍繞無怖如獸王爾光如明月一七五多羅尼魯樹地上茂密長伸展至極限始示其果實一七六釋迦族聖子爾為高名人爾與其地等凡從汝教者並得不死道一七七薩羅沙縛底羌達巴基河印度恆伽河舍牟浮摩企一七八此等河所流大海皆納受捨去前之名悉皆名為海一七九如實在汝邊四階級出家捨去前所名皆稱名佛子一八恰如月遍照運行天空上凡此諸星群如月輝最勝一八一大雄汝如此神人所圍繞統領佛之國爾常現光輝一八二深淵起巨波不能越岸行凡雖觸其岸紛碎而散去一八三外道實如是種種多異見希冀了解法不得適牟尼一八四反論具眼者縱令汝達彼汝近彼等邊即為被擊碎一八五如在水生長數多拘物頭曼陀羅花朵水污入泥淖一八六多人實如是來此世生育如拘物頭泥欲怒所煩惱一八七恰如鉢頭摩生育水當中污泥不能染花絲透清香一八八大雄汝如是此世大牟尼如水鉢頭摩不為世污染一八九如藍瑪迦月盛開水草花無月勝此月花開好季節一九釋族子如是汝開解脫花水生鉢頭摩無勝爾教者一九一娑羅樹王花滿溢天上香娑羅樹圍繞娑羅樹王輝一九二大雄汝如是佛智慧花開比丘衆圍繞如彼樹王輝一九三多岩彼雪山似生藥之物龍與阿修羅諸神棲其處一九四大雄亦如是猶如生藥物彼等有三明亦有六通者充滿彼等中神通波羅蜜一九五大雄依慈悲彼等被汝諭常浴法愈悅安住於汝教一九六恰如獸王獅走出其棲居四方巡眺望三度舉吼聲一九七獸王之吼聲驚倒諸獸類生為獸類尊常使獸驚懼一九八大雄爾之吼震撼此大地開覺者等覺惡魔衆戰栗一九九大牟尼爾吼異徒皆戰栗如獸怖獸王如鴉軍之迷二此世統衆者大呼為衆師繼紹承其法向衆廣宣說二一然爾大雄者得悟正諸諦覺已十四日不向情說法二二意志正偏向了解諸業果汝知人機根聲轟如雷雲二三洽卡瓦拉山世界人群坐彼抱各異見求汝為解疑二四心知一切人巧喻汝牟尼唯說一問答生物之疑解二五四方四維者世界此地滿彼等皆合掌頌世界導師二六彼等永稱頌讚歎幾頌歌無術尋知量如來不可量二七恰如依己力頌此大勝者常讚幾億劫斯讚實如斯二八不問神與人有諸學深者滿足若誘汝遂應得破滅二九釋迦族聖子高名立汝教滿智波羅蜜安住於無漏二一摧擊異道等吾轉聖者教釋迦族聖子今日吾法將二一一汝此為吾說業果不知數巧如射疾箭斷去吾煩惱二一二恰有人不問頭上常荷物苦於其所負負荷重之故二一三常為三火燒生生吾流轉吾負生存荷恰如舉山嶽二一四負荷既取去由吾除去生釋迦族聖子一切教吾為二一五只要佛國人除釋迦族長智慧吾第一無有等吾者二一六靜慮甚殊勝神足波羅蜜今日遂吾欲隨意善化友二一七修九次第定大牟尼通曉彼對吾說教滅除吾臥牀二一八清淨有天眼淨慮吾殊勝從正道精進吾樂修覺支二一九弟子得通達一切吾得為除世之導師不見等吾者二二吾善等至律疾得禪解脫樂修七覺支成就聲聞德二二一得達聲聞德恭敬最上尊心常幾梵行以淨信涵容二二二如拔毒之蛇如去角之牛無些許慢心敬意以近衆二二三若為有形者吾智遇富主阿諾瑪達西頌彼智果報二二四釋迦族聖子蒞世轉法輪吾今行正轉頌彼智果報二二五吾於任何時意怠無氣力少聞斯不行何處皆不俱二二六聰明與多聞守身正諸戒具有寂靜心吾立於衆首二二七來集此處人吾謂皆幸福少欲心滿足樂禪常禪思二二八最初吾得見無垢亦無穢吾師彼雄者佛子阿說示二二九今日因彼故吾為法將軍無論於何處充滿波羅蜜吾今得無漏而住於無漏二三佛子阿說示亦嘗為吾師何彼居方所吾頭常向住二三一瞿曇釋族長常憶吾所業令坐比丘中賜座據上席二三二四種無礙解及證八解脫吾得六神通吾行佛所教如斯舍利弗長老唱此等之偈已二摩訶目犍連大採菽一阿諾瑪達西彼之佛世尊世界之上首人中之長者神群常隨彼住於雪山中二爾時吾之名龍王婆留那隨欲變身形吾棲大水中三捨衆之集居吾具諸樂器彼時天女等圍繞佛吹奏四諸多樂器鳴神等亦吹奏聆聞兩音色佛亦得醒覺五邀請正覺尊吾行己世界而為佛設座時至吾告說六漏盡人幾千來世導師前諸方光輝映接近吾世界七大雄就寶座人長天中天比丘衆飲食爾時吾滿足八大雄自存人致謝最上者比丘衆中坐宣唱次諸偈九供養諸僧衆引導世間佛依其清淨心彼往神世界一七十有七度統領神世界住於大地上統領八百度一一五十有五度為作轉輪王彼生於其間富多數難量一二彼時無量劫出生甘蔗族彼姓稱瞿曇出世為尊師一三彼由地獄歿爾時生人間名喚拘離多婆羅門族者一四善根所迫故其後彼出家瞿曇世尊前為第二弟子一五力優意志堅神通達究竟正知凡諸漏無漏證涅槃一六為持惡友故亦為壓貪愛因而起惡心殺父與殺母一七地獄與人間皆為吾生處為持惡業人吾頭被切斷一八此為吾最後今立最後生如斯吾死時亦復仍如是一九孤獨吾浸居吾喜修靜慮正知凡諸漏吾住於無漏二更深復更厚此地亦難滅吾搖動拇指神通得究竟二一吾無高慢執慢心些許無沙彌等僧衆吾不失敬心二二吾勉勵業行由此無量劫吾達如上域直至諸漏滅二三四種無礙解及證八解脫吾得六神通吾行佛之教如是尊者摩訶目犍連長老稱唱此等偈三摩訶迦葉大飲光一巴多穆塔拉如是人中佛世界之上首救主入涅槃諸人歡愈悅供養為師尊二彼等畏怖生吾則且喜生親族知己集吾說如次語大雄今涅槃吾等盡供養三彼等皆首肯吾愈生笑意供養救主佛吾等得積福四備置高價供高立達百肘宮殿聳立空一百五十肘五多羅樹耀彩備高貴供品淨化己之心無上支提供六娑羅樹王花如空燃火焰支提四方輝猶如帝釋杖七人人心清淨吾為諸多善憶先世所業吾生三天上八吾立神車上繫馬千頭曳吾居所高聳聳立達七層九其數千樓閣一切黃金造己光輝映處照耀達諸方一赤玉之尖塔數多聳雲霄其塔放光輝遍照於四方一一樓閣建造美生來依福業光輝摩尼造周邊及十方一二映顯此等物光輝甚廣大凌駕一切神福業之果報一三六十劫往昔吾為轉輪王四海盡平夷吾住於地上一四而今此賢劫己所業已滿吾具偉大力三十度輪王一五具足七種寶吾為四洲長吾住居彼處聳如帝釋杖一六長度二十四廣十二由旬都城藍瑪迦城壁城門堅一七恰如三天都五百由旬長廣幅為其半為數多神居一八如針於針筒共二十五根爾時針筒滿相互為碰撞一九實如吾都城象馬車滿盈爾時人充滿無上之都城二彼處飲且食吾再生天上最後吾之生依家世幸福二一生婆羅門族積有數多寶八十俱胝金捨去吾出家二二四種無礙解及證八解脫吾得六神通吾行佛教法如是尊者摩訶迦葉長老宣唱此等偈四阿那律陀無滅一世間之上首人中之長者須彌陀佛陀住處近吾居吾見此佛陀世界之導師二親近須彌陀導世等覺者合掌禮恭敬吾請殊勝佛三大雄慈愛深世人之長者樹下蔭禪思吾施爾燈明四斯言我自存賢者示首肯爾時吾穿樹結成受燈臺五燈心施千個世界有緣佛燈明七日間燃而後止燃六依此得心淨然而依心願捨去人身後吾生於天宮七當吾生天後見有美造柱輝映無邊處施燈明果報八爾時吾輝煌四方一由旬吾勝一切神施燈明果報九吾統諸神國神王三十劫無人輕蔑吾施燈明果報一吾為轉輪王二十八度過爾時吾晝夜徹見一由旬一一吾立尊師教智見千世界吾今得天眼施燈明果報一二三萬劫之昔有須彌陀佛吾供施燈明更以清淨心一三四種無礙解及證八解脫吾得六神通吾行佛教法如是尊者阿那律陀長老宣唱此等偈五富樓那彌多羅尼子滿慈子一聖學書殊勝通達三吠陀受弟子尊敬吾得近至人二巴多穆塔拉善逝世間解彼為大牟尼堪受人供養說法甚簡潔為吾宣示業三其法吾聽已厚敬禮尊師至誠合兩掌站立指南方四吾聽簡潔法詳細為說教所說言於耳大衆弟子喜五彼等排異見持淨心對佛如吾詳細說亦猶簡潔說六吾論事清淨阿毗曇先導令一切者知吾住於無漏七五百劫之昔四人為善說具足七種寶彼為四洲長四大洲八四種無礙解及證八解脫亦得六神通吾行佛教法六優波離一漢薩瓦提市吾名蘇伽陀生為婆羅門八十俱胝財數多寶之財以及諸穀類二聖學書殊勝亦通三吠陀觀相如是語通曉正法者三時一遊行者結髻之出家瞿曇佛弟子彼苦行者等四名高婆羅門彼等圍繞吾衆人供養吾吾不供他人五爾時吾高慢不見值供養勝者未出世亦未言有佛六漫長晝夜過有世尊導師除去一切暗出世具眼者七其教行化處擴展衆人知爾時佛來近其市名鵝鳥八彼佛近他人說法具眼者周圍一由旬隨衆多無限九行者蘇難陀苦行受人敬爾時隨佛衆以諸花覆彼一美花曼陀婆佛為說四諦十萬俱胝人皆得法樞要一一七日之晝夜法雨降不止及至第八日勝稱蘇難陀一二神世及人世生生為流轉流轉幾世界勝於一切者一三十萬劫之後出生甘蔗族姓氏稱瞿曇出世為尊師一四彼師法後嗣從法生法子彌多羅尼子尊師之弟子一五爾時佛世尊稱讚蘇難陀常語一切人顯示己之力一六時人皆合掌南無蘇難陀向佛盡奉事己索應行道一七吾聞牟尼言吾心浮泛思如得見瞿曇吾將盡奉事一八如是吾心思思考吾應為吾應為吾業無上植福田一九一切稱歌讚歌讚佛之教比丘於精律吾將望其位二無限吾財寶似海難搖動吾以此財寶為佛建伽藍二一蘇巴那伽藍建立於市前吾費十萬金吾造此伽藍二二殿堂與樓閣更有曼陀婆禪窟修業處亦作經行處吾費十萬金吾造此伽藍二三溫室與火室圍繞以水濠吾造諸浴室施比丘僧伽二四小臺大座椅食物與容器伽藍之藥草此等吾皆施二五彼處備守護吾造堅牆垣如斯靜心者修行無惱亂二六吾以十萬金造彼僧伽藍完成止住處吾禮佛世尊二七吾建伽藍畢聖者請接受贈與大雄者具眼者請受二八巴多穆塔拉善逝世間解知吾意導師受此尊貴供二九一切知者佛吾知大仙受準備美食物告彼今食時三如是告知已導師率弟子漏盡之千人近至其伽藍三一吾知當坐時滿足以飲食食事終了後吾說次言語三二購以十萬金建此宏壯閣伽藍蘇巴那恭請聖者受三三布施此伽藍純依吾心願生生吾流轉望能達所願三四造此美伽藍請彼佛容受比丘衆中坐宣示次言語三五造此美伽藍若以施佛者吾將稱讚彼傾耳聽吾說三六象馬與車兵更有徒步兵四軍如斯常圍繞施伽藍果報三七六萬之樂器又有美飾鼓如斯常圍繞施伽藍報果三八八萬六千女美飾婦人等美衣與飾具結摩尼耳環三九微笑長柳眉細腰臀形美如斯常圍繞施伽藍果報四三萬劫之間樂享神世界千度為神王統領神世界四一依此達神王彼得獲一切享樂無缺憾統領神世界四二千度生此國成為轉輪王此量不能盡統治廣大國四三十萬劫之後出生甘蔗族姓氏稱瞿曇出世為尊師四四彼師法後嗣從法生法子其名優波離尊師之弟子四五於律達究竟無論處非處憶持勝者教彼住於無漏四六釋迦族之長此等皆熟知比丘衆中坐置彼最高位四七爾來無量歲希求爾聖教今達吾目的斷除一切縛四八恰如樁刺男為王刑杖脅只望得逃脫忘見此木樁四九大雄吾如是為有杖所脅被業樁所刺苦惱欲之痛五依此三火燒不見有之喜如受刑杖者尋索逃生路五一恰如服毒男為其毒所苦滅毒之方法即時索取藥五二速索滅毒藥彼即發現藥為彼脫毒故飲之可平安五三大雄吾如是吾如中毒人無明所苦故吾索教法藥五四因索法之藥吾見釋迦教勝殊一切藥滅一切欲箭五五吾飲法之藥消除一切毒不老亦不死寂靜見涅槃五六恰如鬼惱人苦於為鬼捉茲為逃脫鬼尋求驅鬼師五七尋索彼速見通驅鬼術者彼既為鬼苦滅鬼連根除五八大雄吾如是愚魅捕所苦茲為逃愚暗尋求智慧界五九吾見釋迦佛彼除煩惱暗為吾除愚暗即如驅鬼師六吾斷輪回流吾亦止愛流如驅鬼除根滅除一切有六一恰如金翅鳥食蛇飛衝下彼於大海周攪亂百由旬六二彼既捕執蛇頭下使其苦彼鳥如斯欲執蛇飛將去六三大雄吾如是強如金翅鳥求彼無為法洗去數多罪六四於無上寂處吾見最勝法吾往其所執如執蛇金鳥六五阿薩瓦提草美蔓草林生此草過千歲只生一果實六六其實難成故諸神皆崇愛如斯諸神喜最上之蔓草六七爾經十萬劫吾禮尊聖者朝夕念南無如神愛蔓草六八跪拜非不毛南無不徒空雖遙吾亦去剎那亦不失六九吾雖探此有不見有再生解脫不執著吾往心寧靜七恰如稱蓮草花放以陽光大雄吾如是花放因佛光七一恰如鶴鳥胎常不見雄鳥雷雲轟作時其鳥常受胎七二只要雷不轟其鳥久保胎雷雨降臨時彼如脫重荷七三巴多穆塔佛法之雷雲鳴依其法雲音吾孕法胎兒七四歷經十萬劫福胎常寄宿雷雲法不鳴重荷不得脫七五釋迦樂法雲迦維羅衛城時爾使其鳴吾得脫重荷七六彼空無相法非欲求住法四種沙門果一切吾解明第二誦品七七爾來無量歲希求聖者教吾今達目的見無上寂處七八吾達律究竟歌讚如仙者尊教吾憶持無有等吾者七九於律及犍度三斷或五戒言詞與文字其處吾無疑八懲戒或贖罪處非處通達求宥與復歸一切處究竟八一於律及犍度吾立腳其上由其二解明依真髓可解八二精巧於辭詞通曉義無義無有不知者殊勝師之教八三釋迦聖子教吾今為法官一切懷疑解斷除諸疑念八四詞句與疊句言辭與文字或窮極因緣一切吾通曉八五彼如有力王平夷苦他者占戰彼獲勝於彼造市鎮八六或城與壁濠乃及柱樓門種種之望樓造作多市鎮八七廣場交路園區劃好市場法庭決利害更作大會堂八八是為打倒敵知敵和不和軍勢守護王置彼將軍位八九其為守護財護財善巧者吾不失此財置彼護財位九希乞王繁榮若王所愛者斯友應治理賦與管國事九一生起諸兆相通達吉凶相聖學書殊勝置彼司祭官九二具斯諸部分稱彼剎帝利難覆如輪王人人常擁護九三大雄汝如是剎帝利破敵天界與人界人咸稱法王九四外道與惡魔夷平諸魔軍打破彼黑暗於此造法市九五彼處戒城壁樓門汝智慧賢者信為其支柱汝護禁戒門九六念處市望樓聖者智慧為廣場神足交路園美造法街路九七彼之修多羅毗曇毗奈耶九分佛聖言此即汝法堂九八空法無相法無欲求梵住無欲即苦滅此等汝法殿九九智慧居第一更精於辨說稱舍利弗者正法之將軍一通曉人死生神通得究竟名稱拘離多汝之司祭官一一憶持古傳統力壯大難近勝德頭陀者汝之司法官一二憶持法多聞諷誦一切教名稱阿難陀汝法護持者一三超越此一切世尊汝望吾於律任智者授吾以法庭一四佛子不論誰對律有發問於彼不考慮其義吾說明一五只要佛國人除彼大牟尼於律無如吾豈有更勝者一六比丘衆中坐瞿曇如是說於律於犍度無如優波離一七其中尊師教佛說有九分凡於律所說見律根本者一八釋族長瞿曇常憶吾所業比丘衆中坐置吾於最高一九爾來十萬劫吾達此地位今吾達目的吾於律究竟一一吾本釋迦族喜為理髮師吾捨族姓去為彼大仙子一一一往昔第二劫安伽薩王出名高力無限護國為大富一一二生為彼王子名喚羌達那剎帝利世家名望恃財富一一三十萬象之群發情三徵候一切莊嚴飾常此圍繞吾一一四軍勢共行進吾思往御苑乘象錫利佳爾時出市行一一五善攝六根門具足諸正行覺者提瓦拉由彼來吾方一一六策行錫利佳爾時吾犯佛如斯象發怒遂不揚其足一一七見象意不快吾向佛發怒惱煩正覺尊吾向御苑進一一八彼處不見愈恰如頭燃燒吾為熱燃故如捧供之魚一一九此地達海邊不見如吾燃吾往父之前向彼語次言一二恰如興怒蛇又如到火窟如醉大牙象吾犯自存佛一二一可畏偉勝者吾有犯覺者吾請牟尼恕吾等失市鎮一二二若彼自制者吾不得彼意不過第七日王國將破滅一二三彼蘇美伽拉拘舍悉伽瓦薩多迦犯罪軍遂墮惡趣一二四自制行梵行仙者等怒時天界與大海諸山共破滅一二五三千由旬間吾將集諸人請饒恕罪過吾近自存佛一二六清髮衣新衣諸人皆合掌投身佛足邊吾述如次言一二七大雄請恕我諸人皆求願使吾等去熱切勿亡此國一二八一切神與人羅剎陀那婆彼以鐵造斧可常裂吾頭一二九火不止水上岩上種不生藥上無毒蟲佛不生起怒一三恰如地不搖如海不可量如虛空無際斯佛不攪亂一三一大雄常恕人行者常堪忍恕人堪忍者無有敢報仇一三二正覺聞斯語為吾等除熱數多人之前爾時騰空際一三三吾因其業故下墮卑賤層行越此生涯吾入無畏市一三四爾時吾雖燃對此善忍耐吾得佛之恕為吾除其熱一三五今日吾復然三惡之火燃消我三惡火使吾至寂靜一三六若有人借耳吾言請傾聽吾觀如其道向汝說真義一三七離彼自存人安定寂靜者吾今以其業來生卑賤胎一三八汝勿失剎那過則人嘆惜剎那既與汝勤修理想地一三九或人有下劑或人有吐藥或人猛毒蛇或人有良藥一四下劑履聖道吐藥立聖果良藥得果者索得福田人一四一教人持敵意恰似猛毒蛇毒蛇齧毒者其人被燒盡一四二其猛毒立刻破滅彼生命教持敵意者燃燒俱胝劫一四三忍辱與無害以慈心持戒不持敵意者彼渡人天界一四四不執得不得不執敬有無等大地等佛於彼無敬意一四五提婆達多輩鴦窟摩羅賊達那羅睺羅牟尼為平等一四六對之無嫌惡對彼無怒心親子與惡徒佛皆為平等一四七路上見袈裟塗糞被拼棄合掌於頭上應禮仙者幢一四八過去與現在未來出佛等此幢為清淨南無向彼等一四九教令毗奈耶吾心應憶持南無毗奈耶安住不論時一五棲居毗奈耶為吾經行處生活之法則亦為吾主食一五一毗尼達究竟亦通寂靜心此之優波離禮拜尊師足一五二由村復至村徘徊街至街法之正覺尊南無其法性一五三煩惱被燒盡除去諸有結消滅一切漏今吾無後有一五四吾實今善來於殊勝佛前吾此得三明履行佛之教一五五四種無礙解及證八解脫吾證六神通吾行佛教法如是尊者優波離長老宣唱此等偈七阿若憍陳如了本際一巴多穆塔拉到達佛地佛世間居上首導師吾初見二一切諸夜叉菩提樹下集彼等合掌拜圍繞正覺尊三一切諸神喜交飛於虛空今逢佛出世除去世間暗四彼等喜笑聲虛空轟大響等正覺教法滅去吾煩惱五諸神以威嚴吾知其語言心之雀躍喜吾供最初食六彼無上世尊了知吾心意神之衆中坐宣說如次偈七出離經七日吾得無上覺護持梵行者此吾最初食八由兜率來此向吾獻供食彼者稱讚吾傾耳聽吾言九三萬劫中間統理神世界彼勝一切神住於三天上一後由神國沒彼生於人間千度轉輪王統御彼國疆一一十萬劫之後出生甘蔗族為瞿曇稱姓出世為尊師一二時沒於三天彼生於人間棄家往出家彼住共六年一三由彼第七年佛為說真理時名憍陳如最初彼開悟一四棄世效出離吾今為努力為滅諸煩惱出家成無家一五人天一切知唯彼親近佛鹿林為吾說叩不死法鼓一六吾今得無上不死寂靜道諸漏皆正知吾住於無漏一七四種無礙解及證八解脫吾得六神通吾行佛教法如是尊者阿若憍陳如長老宣唱此等偈八賓頭盧頗羅墮誓一巴多穆塔拉最上自存佛彼於雪山前其時住心峰二於彼現四足獸王無畏形耳聞吾吼聲諸人皆驚懼三吾採美蓮華吾近人中長佛由靜慮起吾表尊敬意四南無四方位南無佛至人己心得淨化吾發獅吼聲五善逝世間解接受人尊供坐於己座上宣說如次偈六知佛所述言一切諸神集言說之尤者吾等來聽法七諸神喜歡笑於世導師前牟尼見一切稱讚吾吼聲八施此美蓮華舉此獅子吼吾稱讚彼者吾言傾耳聽九從此八劫後彼為轉輪王具足七種寶尊為四州長一六十四方地彼為總君王其名鉢頭摩大力轉輪王一一十萬劫之後出生甘蔗族稱為瞿曇姓出世為尊師一二佛言宣述時彼為婆羅門由家出離去立刻彼出家一三努力彼專念心靜無執著諸漏皆正知無漏證涅槃一四肉食獸森林獨離彼臥牀諸漏皆正知無漏證涅槃一五四種無礙解及證八解脫吾得六神通吾行佛教法如是尊者賓頭盧頗羅墮誓長老唱說此等偈九朅地羅林之隸婆多一婆擬囉恆伽雪山發水量吾守彼渡場吾渡此方岸二巴多穆塔拉兩足世導師十萬得道者欲渡恆伽河三工匠巧造作集來數多舟吾為舟作覆奉事人中長四彼佛來此處乘坐所贈舟止住水當中宣說如次偈五渡運正覺尊無漏僧團者以其學心故彼樂神世界六彼生之處所舟形美宮殿空中有花覆常來覆彼上七五十八劫後剎利塔拉那平夷四方際彼為轉輪王八五十七劫後剎利旃簸迦其如旭日升有大力輝煌九十萬劫之後出生甘蔗族稱為瞿曇姓出世為尊師一三天沒去時彼生來人間名為隸婆多彼為婆羅門一一淨根所迫使彼由家離去受佛瞿曇教於是得出家一二彼既出家後勝觀專念勵諸漏皆正知無漏證涅槃一三精進吾調牛運行安穩處於等正覺教吾保最後身一四四種無礙解及證八解脫吾得六神通吾行佛教法如是尊朅地羅林之隸婆哆長老宣唱此等偈一阿難陀慶喜一巴多穆塔拉牟尼出苑門普降不死雨多人獲涅槃二十萬雄者等威力六神通如影隨其形圍繞正覺尊三時吾乘象背持最優白傘見彼清爽姿吾心生喜悅四吾由象背降親近人中長衆寶造傘蓋為佛遮頭上五世尊大牟尼了知吾心意法話一時止宣示如次偈六黃金為飾具白傘遮蓋者吾稱讚其人傾耳聽吾說七此男去此世往住兜率天天女等恭敬無虧樂沉浸八三十四度間統領神世界地上八百度住世統諸軍九五十八度間得為轉輪王廣大此地上統領諸國土一十萬劫之後生來甘蔗族稱為瞿曇姓出世為尊師一一釋迦族標幟為其親族者名為阿難陀彼為佛侍者一二精勤且賢善真諦深通曉順從不頑固諷誦一切教一三精勤於專念心靜無執著諸漏皆正知無漏證涅槃一四象群棲森林歲經年六十發情三徵候牙強如大鋤一五如斯大威力幾十萬賢者從者佛龍象不為外物驚一六吾於初中夜後夜亦南無清淨心內喜聖佛吾奉事一七精勤且賢善思慮注意深吾達預流果通有學諸地一八吾精勤業行數經十萬劫吾達如上域確立信大果一九吾實為善來奉事於佛前吾今得三明吾行佛教法二四種無礙解及證八解脫吾得六神通吾行佛教法如是尊者阿難陀長老宣唱此等偈攝頌尊佛以及諸緣覺舍利弗與拘離多迦葉更與阿那律隸婆多與阿難陀總共六百五十偈此為第一佛陀品

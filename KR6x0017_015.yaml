body:
  text: 第十五奢達品一四一阿第奢提耶上傘蓋一阿塔達西佛至其涅槃時傘蓋層層作奉獻塔婆上二時時常來此南無師塔婆吾於傘蓋上奉獻衆花覆三一千七百劫吾做諸神王供養塔婆果吾不生人世四四種無礙解如是尊者阿第奢提耶長老宣唱此等偈一四二單巴羅巴迦柱載一世間之救主單摩達西滅尊佛勝支提吾運載幡柱二並再作階梯登上勝塔婆吾採素馨花捧獻立柱上三諸佛並諸法尊師吾成滿惡趣吾不知供養塔婆果四九十四劫昔其名稱塔頂大力十六人有為轉輪王五四種無礙解如是尊者單巴羅巴迦長老宣唱此等偈一四三耶提伽羅迦欄楯造一世間之救主毗耶達西滅心淨吾欣喜為佛作欄楯二圍繞此摩尼吾為最上祭吾作欄楯祭當場吾死逝三諸神與人間吾生任何胎虛空持摩尼積福此果報四一千六百劫名喚摩尼光大力三十二出為轉輪王五四種無礙解如是尊者耶提伽羅迦長老宣唱此等偈一四四薩巴利瓦利耶有隨衆一巴多穆塔拉彼為最勝者如火塊熾燃正覺尊涅槃二大雄臨寂滅塔婆世廣聞尊佛身骨上人崇施塔婆三心淨吾欣喜吾作金欄楯香氣飄彌漫相應時塔婆四諸神與人間無論生何處依昔此果報不見下劣性五千五百劫昔其名喚成就其數有八人大力轉輪王六四種無礙解如是尊者薩巴利瓦利耶長老宣唱此等偈一四五溫瑪普毗耶亞麻花一尊貴彼世尊受尊供物人悉達多寂滅供佛大塔婆二悉達多大仙於時之葬祭吾持亞麻花奉獻至塔婆三依此獻花供九十四劫間吾不知惡趣供養塔婆果四第九劫往昔名蘇摩提婆八十五大力有為轉輪王五四種無礙解如是尊者溫瑪普毗耶長老宣唱此等偈一四六阿努樓瑪達耶迦相應布施一阿諾瑪達西作欄繞提樹吾以手作業布施泥灰漿二阿諾瑪達西注目此善業佛立僧衆中述説如次偈三依此泥漿業更依心意願享受無虧樂得致彼苦滅四面色既清淨安靜心鎮定等正覺者教吾保最後身五由今茲一劫無虧滿百劫名喚全堅塊大力轉輪王六四種無礙解如是尊者阿努樓瑪達耶迦長老宣唱此等偈一四七瑪格達耶迦道施一由河水中出具眼往森林嚴相悉達多吾見正覺者二執持鋤與籠其行道不平頂禮拜尊師己心得清淨三當時作此業九十四劫間惡趣吾不知施道此果報四五十七劫昔出世一人王其名謂善覺統人領導者五四種無礙解如是尊者瑪格達耶迦長老宣唱此等偈一四八巴羅伽達耶迦板布施一吾業製乘具巧明木工匠手作旃檀板布施世緣者二天宮黃金造佳構常輝耀象馬等座騎神之乘物具三轎輿高臺閣隨欲得生來寶玉吾無數施板此果報四吾之施此板九十一劫間惡趣吾不知布施板果報五五十七劫昔四人有化作大力具七寶出為轉輪王六四種無礙解如是巴羅伽達耶迦長老宣唱此等偈一四九瓦單薩奇耶頭飾一名稱須彌陀自存無敵者於委身孤獨行入大森林二香樹花開滿編結作頭飾指向世導師吾獻彼尊佛三捧獻彼花朵從此三萬劫吾不知惡趣供佛此果報四千九百劫昔化作十六人大力具七寶有為轉輪王五四種無礙解如是尊者瓦單薩奇耶長老宣唱此等偈一五巴蘭伽達耶迦座椅布施一世間居上首須彌陀世尊吾施其座椅座椅層層疊二請知吾心意爾時常為吾具有七種寶座椅為吾生三依此施座椅從此三萬劫惡趣吾不知施座椅果報四二萬劫往昔黃金光三人大力具七寶出為轉輪王五四種無礙解如是尊者巴蘭伽達耶迦長老宣唱此等偈攝頌奢達單巴與耶提巴利瓦羅溫瑪普毗耶阿努樓瑪瑪格達伊巴羅達伊瓦單薩迦巴蘭伽達耶十人説此五十六偈

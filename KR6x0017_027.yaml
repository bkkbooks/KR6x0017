body:
  text: 第二十七巴多穆開巴品二六一阿伽斯奇毗耶空投一金色悉達多來至市場中持二水草花來近人中尊二於尊佛足前投獻一朵花並將另一花投向空中去三施花捧獻佛九十四劫間惡趣吾不知施花此果報四三十二劫昔一國王大力其名空中行出為轉輪王五四種無礙解如是尊者阿伽斯奇毗耶長老宣唱此等偈二六二提拉瑪奇耶塗漆一悉達多佛陀人中涅槃時吾為菩提樹塗漆其欄楯二彼時塗漆故九十四劫間惡趣吾不知塗漆此果報三二十四劫昔有王名美膚大力具七寶出為轉輪王四四種無礙解如是尊者提拉瑪奇耶長老宣唱此等偈二六三阿達奢提耶一彼帝沙佛之最上菩提樹阿達奢達花布施向佛陀二捧獻供花故九十二劫間惡趣吾不知供養樹果報三二十五劫昔有王名天飲大力具七寶出為轉輪王四四種無礙解如是尊者阿達奢提耶長老宣唱此等偈二六四阿拉那提毗耶無諍燈一嘗生為神身降臨至地上心清淨己手布施五燈火二彼時施燈火九十四劫間吾不知惡趣施燈之果報三五十五劫昔大力一統主其名為遍眼出為轉輪王四四種無礙解如是尊者阿拉那提毗耶長老宣唱此等偈二六五比拉莉達耶迦比拉莉布施一雪山不遠處有山羅瑪莎沙門制諸根棲居其山麓二吾採比拉莉布施與沙門無敵自存者大雄彼心喜三更以清淨心施吾比拉莉不論再生處汝將生其果四吾施比拉莉九十四劫間惡趣吾不知布施之果報五四種無礙解如是尊者比拉莉達耶迦長老宣唱此等偈二六六瑪奢達耶迦魚布施一羌達巴格河爾時吾為鶚取得大魚來施與悉達多二彼時布施魚九十四劫間惡趣吾不知是施魚果報三四種無礙解如是尊者瑪奢達耶迦長老宣唱此等偈二六七伽瓦漢薩迦速鵝一羌達巴格河時吾住林中直行於風路吾見悉達多二敬虔致合掌眺望大牟尼己心為淨化禮拜世導師三吾拜人中長九十四劫間惡趣吾不知是禮拜果報四四種無礙解如是尊者伽瓦漢薩迦長老宣唱此等偈二六八薩拉拉普毗耶薩拉拉花一羌達巴格河吾為緊那羅佛光赫奕滿吾見毗婆尸二吾喜心清淨無上歡悅溢採薩拉拉花吾獻毗婆尸三施花供養故九十一劫間惡趣吾不知供佛之果報四四種無礙解如是尊者薩拉拉普毗耶長老宣唱此等偈二六九烏婆格達巴薩尼耶近至談語一雪山正當中有美觀湖泊吾為一羅剎俯首現怖形二慈愍慈愛深導師毗婆尸欲以撼吾心請來近吾前三天中天佛陀大雄信步來吾由棲居出禮拜至尊師四禮敬人中尊九十一劫間惡趣吾不知禮拜此果報五四種無礙解如是尊者烏婆格達巴薩尼耶長老宣唱此等偈二七達拉尼耶濟渡一施毗婆尸佛唯是黃金色比丘僧團隨尊師河邊立二彼處有大川不見渡河具吾由河中出吾渡世導師三濟渡人中尊九十一劫間惡趣吾不知濟渡此果報四四種無礙解如是尊者達拉尼耶長老宣唱此等偈攝頌阿伽斯奇提拉奢提阿拉那比拉莉達與瑪奢達伽瓦薩拉拉羅剎達拉那十人共偈三十一

body:
  text: 第三十六薩達薩尼耶迦品三四八薩達薩尼耶迦一昔吾為獵人倣徨茂林中吾見正覺尊諸天大衆隨二彼佛説四諦感動大衆心聆聞柔和語迦陵頻迦音三梵音尸棄佛世界具緣者聞聲內心淨吾遂至漏盡四時吾行此業三十一劫間惡趣吾不知淨信此果報五四種無礙解如是尊者薩達薩尼耶迦長老宣唱此等偈三四九耶瓦伽羅毗耶麥束一阿魯那瓦提城外吾割麥路見正覺尊即敷展麥束二慈愍慈愛深導師尸棄佛了知吾心意就坐於麥席三大定嚮導人無垢者著坐湧出無上喜即場吾死逝四時吾行此業三十一劫間惡趣吾不知施麥席果報五四種無礙解如是尊者耶瓦羅毗耶長老宣唱此等偈三五甄叔伽普迦卡甄叔迦供養一甄叔迦花放虔敬吾合掌憶悉達多佛供花撒上空二彼花吾供養九十四劫間惡趣吾不知供佛此果報三四種無礙解如是尊者甄叔迦普迦卡長老宣唱此等偈三五一薩庫達伽庫蘭達達耶迦持庫蘭達之端布施一尸棄佛世尊走來吾見足裘衣右遍袒禮拜尊佛足二吸水地生樹庫蘭樹花開採剪有端者供養足輪寶三時吾行此業三十一劫間惡趣吾不知供養足果報四四種無礙解如是尊者薩庫達伽庫蘭達達耶迦長老宣唱此等偈三五二壇達達耶迦杖布施一吾入茂林中時吾往伐竹以竹作支杖吾施與僧伽二內心具清淨虔敬有幸福布施支杖訖指向北方去三彼時施杖故九十四劫間惡趣吾不知杖施此果報四四種無礙解如是尊者壇達達耶迦長老宣唱此等偈三五三菴婆耶古達耶迦菴婆乳糜布施一薩塔蘭西佛自存正覺者彼由靜慮起乞食來吾前二吾見辟支佛供施菴婆糜以此清淨心清淨意行施三時吾行此業九十四劫間惡趣吾不知菴婆乳糜果四四種無礙解如是尊者菴婆耶古達耶迦長老宣唱此等偈三五四蘇普陀伽普迦卡善袋供養一導師毗婆尸彼由天居來乞食信步行來至吾面前二吾見大歡喜勝佛如是人吾施好鹽袋享樂天一劫三布施好袋故九十一劫間惡趣吾不知好袋此施果四四種無礙解如是尊者蘇普陀伽普伽卡長老宣唱此等偈三五五薩伽達耶迦銀布施一世間居上首毗婆尸世尊銀車與動物吾以淨心施二象馬等座騎神騎吾皆得銀車布施故吾達於漏盡三彼時施銀車九十一劫間惡趣吾不知供銀車果報四四種無礙解如是尊者薩伽達耶伽長老宣唱此等偈三五六沙羅那伽摩尼耶歸命一比丘與外道與吾同乘舟適逢舟破壞吾歸依比丘二彼時歸依故三十一劫間惡趣吾不知歸依此果報三四種無礙解如是尊者沙羅那伽摩尼耶長老宣唱此等偈三五七頻達婆提迦施食一帝沙正覺尊時住山峽間吾由兜率來此處布施食二禮敬正覺尊具大名聲者己心為淨化吾赴兜率天三彼時布施故九十二劫間惡趣吾不知是施食果報四四種無礙解如是尊者頻達婆提迦長老宣唱此等偈攝頌薩達薩耶瓦伽甄叔伽與庫蘭達壇達達菴婆耶古蘇普陀伽薩伽達沙羅那頻達婆提十人共為四十偈

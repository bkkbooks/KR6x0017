body:
  text: 第二十三阿蘭巴那達耶迦品二二一阿蘭巴那達耶迦支撑物布施一阿塔達西佛如是彼世尊世間居上首吾施支撑物二海空盡廣闊行進此地上生而為王者亦為大地王三燃盡眾煩惱除去諸有結通達於三明興作佛教已四六十二劫昔大力有三王其名稱一見出為轉輪王五四種無礙解如是尊者阿蘭巴那達耶迦長老宣唱此等偈二二二阿吉那達耶迦裘布施一三十劫往昔吾為作蓆工吾見離垢佛以受尊供物二世統尸棄佛吾施碎皮片吾由於此業兩足人中尊三吾享無顧樂燃盡眾煩惱等正覺者教吾保最後身四吾施此皮衣三十一劫間惡趣吾不知施皮衣果報五第五劫往昔有王名善施大力具七寶出為轉輪王六四種無礙解如是尊者阿吉那達耶迦長老宣唱此等偈二二三多衛羅達尼耶二寶一吾昔為獵人棲居於森林得見離垢佛受吾尊供物二毘婆尸大仙吾施以肉片人天諸世界吾為王統治三由肉片布施於吾生二寶此世有二寶為此世利益四吾享此等果肉片利益故吾以身體柔頭腦運思細五爾時吾施肉九十一劫間惡趣吾不知肉施此果報六第四劫往昔其名稱大赤大力一人王出為轉輪王七四種無礙解如是尊者多衛羅達尼耶長老宣唱此等偈第十誦品二二四阿拉迦達耶迦守護布施一悉達多佛陀吾為作欄楯善逝彼大仙行施以守護二因吾業之著恐怖戰慄無無論生何處吾更無所懼三為作欄楯故九十四劫間惡趣吾不知布施欄楯果四第六劫往昔稱名為倚依大力具七寶出為轉輪王五四種無礙解如是尊者阿拉迦達耶迦長老宣唱此等偈二二五阿烏耶底迦無病一於毘婆尸佛吾施與火室是病患所居溫水隨意取二行此善業故得身體健美吾不知疾病福業之報果三吾施彼之室九十一劫間惡趣吾不知布施火室果四第七劫往昔有王名無敗大力具七寶出為轉輪王五四種無礙解如是尊者阿烏耶底迦長老宣唱此等偈二二六羌庫拉普毘耶羌庫拉花一吾名那羅陀姓為迦葉波見第一沙門天敬毘婆尸二彼受尊供物具諸好佛陀吾採羌庫拉奉獻彼佛陀三供養鮮花故九十一劫間惡趣吾不知供佛此果報四七十四劫昔有王羅瑪莎華鬘所裝飾壯牛為拖車五四種無礙解如是尊者羌庫拉普毘耶長老宣唱此等偈二二七瓦單薩奇耶頭飾一吾由苑中出往見世導師造作黃金色手持貴頭飾二疾速由彼處即登象背行捧與世緣者毘婆尸佛陀三供養此鮮花三十一劫間惡趣吾不知供佛此果報四二十七劫昔出世一人王名謂大光輝大力轉輪王五四種無礙解如是尊者瓦單薩奇耶長老宣唱此等偈二二八明奢瓦單薩奇耶核頭飾一言說尸棄佛救主涅槃時吾撒眾頭飾供養菩提樹二其時供養故三十一劫間惡趣吾不知供養此果報三二十六劫昔其名稱雲聚大力具七寶出為轉輪王四四種無礙解如是尊者明奢瓦單薩奇耶長老宣唱此等偈二二九須伽陀威利耶巧作華鬘一吾名阿私陀時作華鬘人手持香華鬘行往捧獻王二尚未至王前吾見尸棄佛內心喜雀躍即此捧獻佛三供養此花故三十一劫間惡趣吾不知供佛此果報四二十五劫昔有大威力王大力名二荷出為轉輪王五四種無礙解如是尊者須伽陀威利耶長老宣唱此等偈二三耶迦萬第耶一禮一莊嚴大雄者毘舍浮佛陀吾喜心清淨禮拜殊勝佛二彼時行此業三十一劫間惡趣吾不知拜佛此果報三二十四劫昔名喚離歡喜大力具七寶出為轉輪王四四種無礙解如是尊者耶迦萬第耶長老宣唱此等偈攝頌阿蘭巴那阿吉那曼薩達與阿拉伽達耶迦阿烏耶底羌庫拉孫那明奢瓦單薩須伽陀威利耶耶迦萬第耶十人共偈五十五

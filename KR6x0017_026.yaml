body:
  text: 第二十六脫瑪達耶迦品二五一脫瑪達耶迦讚施一毗婆尸大仙止於神世界吾發此言辭吾喜聞教法二貴尊吾南無最尊吾歸依示宣不死道廣度餘諸人三彼時述此言九十一劫間惡趣吾不知讚歎此果報四四種無礙解如是尊者脫瑪達耶迦長老宣唱此等偈二五二耶迦薩那達耶迦一食布施一吾捨神形體同妻來此世望在佛教下希能為奉事二巴多穆塔拉弟子戴瓦拉以最清淨心施彼之聖食三彼時行此業十萬劫之間惡趣吾不知施食此果報四四種無礙解如是尊者耶迦薩那達耶迦長老宣唱此等偈二五三奇塔迦普奢迦冢供養一正覺阿難陀無敵自存人林中入涅槃茂密人不在二吾由天界來彼時吾作冢荼毗葬佛身吾盡供養事三彼時行此業九十一劫間惡趣吾不知供佛此果報四四種無礙解如是尊者奇塔伽普奢迦長老宣唱此等偈二五四提旃簸迦普毗耶三旃簸迦花一雪山路不遠有毗羯吒山沙門制諸根棲住此山中二吾見其寂靜更具清淨心採旃簸迦花三朵撒沙門三施花供養故九十一劫間惡趣吾不知供花此果報四四種無礙解如是尊者提旃簸迦普毗耶長老宣唱此等偈二五五薩塔波吒釐七波吒釐一輝如黃花樹靜坐山峽間七朵波吒釐鮮花捧獻佛二施花供養故九十四劫間惡趣吾不知是供佛果報三四種無礙解如是尊者薩塔波吒釐長老宣唱此等偈二五六烏婆哈那達耶迦履布施一正覺尊之子名號旃檀者吾施一雙履為汝進菩提二施履供養故九十一劫間惡趣吾不知施履此果報三四種無礙解如是尊者烏婆哈那達耶迦長老宣唱此等偈二五七曼奢利普奢伽曼奢利花供養一採得曼奢利吾往車道進比丘衆相隨見無上沙門二心欣喜清淨無上歡悅溢兩手吾採花捧獻與彼佛三施花供養故九十二劫間惡趣吾不知供花此果報四七十三劫昔出一國王人大力名光輝出為轉輪王五四種無礙解如是尊者曼奢利普奢伽長老宣唱此等偈二五八槃那達耶迦葉布施一雪山深谷中吾著樹皮衣食無鹽味葉修習衆多業二爾時取朝食悉達多佛來吾以清信手向佛行布施三彼時施其葉九十四劫間惡趣吾不知施此葉果報四二十七劫昔耶達提耶王大力具七寶出為轉輪王五四種無礙解如是尊者槃那達耶迦長老宣唱此等偈二五九庫提達耶迦房室布施一正覺森中行爾時住樹下吾作木葉庵施與無敵尊二布施葉房室九十一劫間惡趣吾不知布施房室果三三十八劫昔有王十六人何處普降雨稱為轉輪王四四種無礙解如是尊者庫提達耶迦長老宣唱此等偈二六阿格普毗耶阿格花一金色正覺者坐於山峽間尸棄佛光輝光耀如火焰二吾採阿格花親近最上人內喜心清淨吾捧獻供佛三供養彼花故三十一劫間惡趣吾不知供佛此果報四二十五劫昔有王阿彌陀大力具七寶出為轉輪王五四種無礙解如是尊者阿格普毗耶長老宣唱此等偈攝頌脫瑪迦比迦奇塔迦與旃簸迦薩塔波吒釐烏婆哈那曼奢利與槃那庫提達阿格普毗耶十人共偈四十一

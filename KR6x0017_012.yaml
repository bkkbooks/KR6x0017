body:
  text: 第十二摩訶巴利瓦羅品一一一摩訶巴利瓦羅大隨眾一世尊毘婆尸彼為世上首六萬八千眾入滿度摩市二出得城市來吾赴佛支提拜見離塵佛接受尊供物三吾近傍處有藥叉八萬四帝釋三天眾敬謹為侍居四爾時吾持布由彼聖處出跪拜並叩首供施與大仙五諸佛與諸法尊師皆成滿佛之大威力搖撼此大地六見此未曾有身毛皆豎立如是兩足尊佛使吾心淨七吾心為淨化施布與尊師吾向佛歸依諸臣侍衛同八彼時行此業九十一劫數吾不知惡趣供佛此果報九十五劫之昔乘輿十六人大力具七寶出為轉輪王一四種無礙解如是尊者摩訶巴利瓦羅長老宣唱此等偈一一二須曼伽羅善瑞祥一世間居上首阿塔達西佛彼由精舍出走近沐浴池二世尊飲水浴出池纏一衣世尊立彼處舉目望四方三走近至邊傍拜見世導師雀躍心內喜時吾手彈指四如百光盛燃輝耀如黃金五種歌復踊彈奏諸樂器五神界或人間任吾投何生勝於一切者吾之名聲大六吾南無貴尊最尊吾歸依己身自歡喜喜他聖牟尼七吾迎佛上坐微笑向有德奉事正覺尊得生兜率天八一千六百劫一考九十二大力具七寶出為轉輪王九四種無礙解如是尊者須曼伽羅長老宣唱此等偈一一三薩拉那伽瑪尼耶歸命一有二藥叉王彼此起戰鬥集合數多眾引起大騷動二巴多穆塔拉受尊供物人尊師立空中教導彼大眾三投棄鎧與劍一切諸神喜禮敬正覺尊爾時心靜寂四了知吾心意宣言滿威嚴世間解悲深鎮定其大眾五一人有惡心惱亂一有情彼依心之惡彼將墮惡趣六先陣有如象惱亂諸有情己心為清淨不常為殺害七二人藥叉王彼軍眾心挫彼等齊歸依世間上首師八具眼人教眾彼等心搖動藥叉等圍繞指向北方去九兩足之尊者最初吾歸依十萬劫之間終不墮惡趣一三萬劫往昔其名象牙師十六調御主出為轉輪王一一四種無礙解如是尊者薩羅那伽瑪尼耶長老宣唱此等偈一一四耶卡薩尼耶一座一名喚婆留那當時為神王壯牛共牽車吾奉正覺尊二阿塔達西佛尊師將寂滅手持諸樂器赴勝菩提樹三召集多面鼓舞蹈並歌誦奉事菩提樹恰如對佛陀四達拉尼魯哈奉彼提樹名於彼結跏趺忽然吾死逝五最勝菩提樹令吾心清淨己業已滿足生樂變化天六神界與人間生生常流轉六萬樂器數常圍繞面前七吾消三惡火除去諸有結等正覺者教得保最後身八五百劫往昔其名稱夥多具有七種寶三十四人王九四種無礙解如是尊者耶卡薩尼耶長老宣唱此等偈一一五須萬那普毘耶黃金花一世間居上首毘婆尸世尊眾多人中坐說示不死道二二足之尊者吾耳聞法話四瓣黃金花吾獻佛世尊三爾時所有眾上覆盡黃金佛光黃金光其光大輝映四高揚內心喜感動吾合掌吾生榮於彼吾齎此世福五正覺世尊喜禮敬有德人喜悅心湧出吾發己住居六居家正宴坐憶起最勝佛依吾清淨心上生兜率天七由吾供鮮花九十一劫間猶不知惡趣供佛此果報八四十三劫昔名喚輞所敬大力十六人出為轉輪王九四種無礙解如是尊者須萬那普毘耶長老宣唱此等偈一一六質多卡普奢卡塚供養一世緣尸棄佛彼佛涅槃時隨眾及高官皆在王居處二吾心喜清淨將赴佛之塚於彼處奏樂並撒香花鬘三供養佛之塚於佛塚禮敬欣喜心清淨吾赴己住居四居家正宴坐憶起塚供養其業兩足尊世之人中長五神界或人間得享無虧樂勝敗皆捨棄上達不動位六時由獻花故三十一劫間吾不知惡趣塚供養果報七二十九劫昔大力十六人其名稱上行出為轉輪王八四種無礙解如是尊者質多卡普奢卡長老宣唱此等偈一一七弗陀山尼耶伽佛想一無上婆尸佛將入涅槃時水周邊卷帶大地為震動二美哉頭裝飾撑展猶遮蓋佛其命盡時震動吾住居三家居震動時吾心起恐怖世界緣何故生出大光明四毘沙門天來鎮定此大眾生者勿生怖安靜且自制五諸佛與諸法吾等師成滿不論生何處大地常震動六吾讚佛威力昇天一劫樂其餘幾劫間吾積諸善業七彼時得佛想九十一劫數惡趣吾不知得想佛果報八十四劫之昔更有莊嚴王其名稱靜安大力轉輪王九四種無礙解如是尊者弗陀山尼耶伽長老宣唱此等偈一一八瑪格山尼耶迦道想一巴多穆塔拉遊森諸弟子迷路森林中動急如盲目二巴多穆塔拉世間大導師彼等佛弟子迷路念彼佛三吾由住處來將往比丘邊吾教彼等道並施諸食物四其業兩足尊人中之長者生年僅七歲吾達羅漢位五五百劫之昔其名稱具眼七寶十二人出為轉輪王六四種無礙解如是尊者瑪格山尼耶迦長老宣唱此等偈一一九拔秋拔達那山尼耶迦侍奉一阿塔達西佛善逝寂滅後吾生為夜叉爾時有名聲二具眼者涅槃實吾之不幸吾雖多富有力萎難得光三娑伽羅弟子見吾此心意行來至面前令吾心搖動四何憂勿恐怖賢者汝行法依佛所與教一切幸福種五導師悉達多供養彼佛者入滅佛身骨供養芥粒許六同為心清淨亦同持大福汝為作塔婆供養勝者骨七聞娑伽羅言吾立佛塔婆吾奉牟尼塔供侍達五年八其業兩足尊人中之長者吾享無虧福以達羅漢位九七百劫之昔宏智有四人大力具七寶出為轉輪王一四種無礙解如是尊者拔秋拔達那山尼耶迦長老宣唱此等偈一二奢提普奢卡素馨供養一毘婆尸佛生煌耀大光輝海山皆與共大地為震動二觀相人說明佛出此世間眾生之最上眾人皆躍動三吾依相者言具素馨供養如說素馨供斯者非供養四累積諸善事己心得清淨行素馨供養即時吾死逝五諸神與人間不論生何胎吾勝諸有情供素馨果報六隨心所泛動乳母等事吾彼女不煩擾是供素馨果七依此所供養九十一劫間吾不知惡趣供此素馨果八於今第三劫統主三十四其名善奉事大力轉輪王九四種無礙解如是尊者奢提普奢卡長老宣唱此等偈攝頌巴利瓦羅須曼伽羅薩拉那與阿卡薩那一座須萬那普毘耶質多普奢弗陀山瑪格拔秋拔達那奢提普奢為最末賢者長老共十人說偈達有九十頌

body:
  text: 第十須陀品九一須陀頻第耶漆食塊一跳越障礙墻渡過憂悲海彼佛值供養及其弟子等二供養斯人等涅槃無畏者布施得大福誰亦不能量三假令四大洲統主挑戰鬥不值斯供養十六分之一四人中之勝者悉達多佛陀支提崩壞處修復為供養更以清淨心吾施以漆喰五依時所作業九十四劫間吾不知惡趣修復此果報六三十劫之昔名稱作修復七寶十三人出為轉輪王七四種無礙解如是尊者須陀頻第耶長老宣唱此等偈九二須欽提陀善考一救主帝沙佛吾嘗施座椅佛出於日種雀躍心歡喜二三十八劫昔做大滿足王其富甚宏大亦有多座褥三更以清淨心布施佛座椅嘗自積善業自享己業果四彼時施椅子九十二劫間吾不知惡趣施椅此果報五三十八劫昔轉輪王三人滿足近滿足言稱大滿足六四種無礙解如是尊者斯欽提陀長老宣唱此等偈九三阿達佉拉迦折半衣一吾達最悲心身為惡臭纏於帝沙尊佛吾施折半布二既施折半布於天一劫樂其餘幾數劫善業吾成就三彼時行布施九十二劫間吾不知惡趣施布此果報四四十九劫昔轉輪王示現人王三十二其名為乳糜五四種無礙解如是尊者阿達佉拉迦長老宣唱此等偈九四斯質多耶迦針布施一最上親惠城吾昔職鐵工毗婆尸大仙吾行針布施二如斯善業故智慧比金剛解脫無貪欲達至諸漏盡三既已過去世乃至未來世吾以智慧識施針此果報四九十一劫昔金剛似七人大力具七寶出為轉輪王五四種無礙解如是尊者斯質多耶迦長老宣唱此等偈九五康達瑪利耶香華鬘一覆以素馨花適於佛香塔為佛悉達多吾建香塔婆二姿容值黃金世間大導師光輝如睡蓮盛燃如祭火三壯如虎牡牛生尊猛獅子比丘衆隨坐沙門之勝者吾禮敬其足指向北方去四由施香華鬘九十四劫間吾應可成佛為果故至明惡趣吾不知供養佛果報五三十九劫昔有十六人王稱名為天香出為轉輪王六四種無礙解如是尊者康達瑪利耶長老宣唱此等偈九六提普毗耶三花一吾住於森林往昔為獵人吾見波吒釐覆撒三瓣花二其時七落葉向外吾擲去內外身清淨無漏心解脫三世間之導師正覺毗婆尸禮拜波吒釐當場即息絶四供養供養樹九十一劫間惡趣吾不知供樹此果報五三十三劫昔一切處愈悅大力十三人出為轉輪王六四種無礙解如是尊者提普毗耶長老宣唱此等偈九七瑪多頻底迦蜜塊一吾見深林中音靜不搖動悉達多佛陀接受尊供物二恰如大象鎮及壯牛駿馬亦如月光輝諸神皈敬彼爾時吾心喜智慧湧出生三佛由禪定起施蜜於尊師禮敬尊師足指向東方去四三十四劫昔須陀蘇那王爾時蜜由蓮由吾食流出蜜雨從空降嘗為此業報五彼時布施蜜九十四劫間惡趣吾不知施蜜此果報六三十四劫昔王者有四人大力具七寶出為轉輪王七四種無礙解如是尊者瑪多頻底迦長老宣唱此等偈九八勢那薩那達耶迦坐臥具布施一悉達多佛尊吾施樹葉席四遍為奉事撒庫斯瑪花二如宮殿樂洞享豪華物樂高貴鮮花朵雨花落臥牀三幾朵美花敷散落吾臥牀爾時牀鋪上雨花紛紛降四吾施樹葉席九十四劫間惡趣吾不知施席此果報五第五劫往昔名稱堅固席人王有七人出為轉輪王六四種無礙解如是尊者塞那薩那達耶迦長老宣唱此等偈九九威耶瓦奢迦奉事一毗婆尸佛陀復有數多衆吾時為使役盡奉諸所用二善逝大仙尊吾無布施物謹以清淨心吾禮尊師足三彼時為奉事九十一劫間吾不知惡趣奉事此果報四第八劫往昔名稱善考王大力具七寶出為轉輪王五四種無礙解如是尊者威耶瓦奢迦長老宣唱此等偈一弗多帕他迦奉事佛一毗婆尸佛前吾吹螺貝者善逝大仙傍吾盡執奉事二世間之救主果報盡奉事七萬種樂器常此圍繞吾三大仙吾奉事九十一劫間吾不知惡趣奉事此果報四九十四劫昔其名稱大響大力十六人出為轉輪王五四種無礙解如是尊者弗多帕他迦長老宣唱此等偈攝頌須陀頻達彼佉拉堪瑪拉與甘達瑪提普庇耶與瑪多勢那與威耶瓦奢丹瑪迦末共十人偈整七十此品宣十品攝頌開始佛陀品第一西哈薩那須菩提軍頭波漠優波離維伽尼與薩伽質塔尼耶那伽薩瑪羅提蜜羅第十須陀品共偈一千四百首更有五十有五偈佛陀品十組第一之百人終

body:
  text: 第十三世雷耶迦品一二一世雷耶迦世雷耶伽花一聖學書殊勝兼通三吠陀適在戶外立得見世導師二恰似行森獅巍默如虎王發情三徵候大仙如大象三勢雷耶迦花採摘投入空即以佛威力圍繞諸人眾四導師一切知佛陀凝注心此世人中長散花徧大地五內莖外花瓣敷花作如是作覆七日間體形自消逝六不可思議事見者毛骨悚世尊師善逝於佛淨吾心七依此心清淨是淨根所使十萬劫之間吾不生惡趣八一萬五千劫大力有五王奇那瑪拉名出為轉輪王九四種無礙解如是尊者世雷耶迦長老宣唱此等偈一二二普帕脫毘耶花塔一雪山不遠處有山庫庫羅通聖婆羅門住於此山中二五千弟子等平時常圍繞彼等忠實事聖書無不通三世間有佛出是吾等所尊八十隨形好勝相三十二勝者光一尋恰如陽光輝四通聖婆羅門耳聞弟子言由其仙處出所詢應往方大雄所在地世界導師住五見佛即南無禮佛無雙者心中揚歡喜吾供養如來六吾輩弟子等趨往見如來頂禮尊師足聽聞勝者教七大眾皆出行吾獨患疾病為病苦所惱娑羅樹蔭臥八吾集弟子等如是吾作問世無上救主佛德為如何九彼等聽所問明知說如是忠實禮勝佛放眼顧四周一吾聞彼等言己心得清淨持花造塔婆當場即死逝一一吾身荼毘後彼等赴佛前深敬為合掌大眾拜尊師一二持花造塔婆為大仙善逝十萬劫之間吾不生惡趣一三四萬劫往昔有王十六人呼名喚火者大力轉輪王一四二萬劫之昔轉輪王出世其名稱聖火有王三十八一五四種無礙解如是尊者普帕脫毘耶長老宣唱此等偈一二三巴耶薩達耶迦乳糜布施一三十一相具佛陀黃金色比丘眾等隨山傾斜出來二手持青銅鉢吾備辦乳糜思及尊供奉吾捧供物去三其時彼世尊人中之長者乘風路空上昇於經行處四不可思議事見已豎汗毛吾置青銅鉢禮敬毘婆尸五汝佛神或人及一切知者牟尼慈愍故受吾此乳糜六世間大導師知吾之用意牟尼一切知受吾乳糜供七彼時所布施九十一劫間吾不知惡趣施乳此果報八四十一劫昔世有佛陀王大力具七寶出為轉輪王九四種無礙解如是尊者巴耶薩達耶迦長老宣唱此等偈一二四康豆達奇耶香水一吾坐佳樓閣見毘婆尸佛如迦休樹輝漏盡一切知二樓閣附近處世界導師來彼如日落時放射紅光輝三吾手持香水散灑於佛身於心得清淨當場吾死逝四因吾灑香水九十一劫間吾不知惡趣供佛此果報五三十一劫昔有芳香之王大力具七寶出為轉輪王六四種無礙解如是尊者康豆達奇耶長老宣唱此等偈一二五山穆伽塔義迦面前讚一毘婆尸佛生預言其瑞兆眾多人得淨佛將出此世二有人出生時一千界地震世尊為尊師具眼者說法三有人出生時出現大光明世尊為尊師具眼者說法四有人出生時河流水停止世尊為尊師具眼者說法五有人出生時阿鼻地獄燃世尊為尊師六有人出生時翼眾不交飛世尊為尊師七有人出生時風層遂不吹世尊為尊師八有人出生時一切寶生輝世尊為尊師九有人出生時舉足行七步世尊為尊師一無論生與否佛眺見諸方言宣滿威嚴此為諸佛法一一吾啟動眾人讚歎世導師禮敬正覺尊指向東方去一二自吾稱讚佛九十一劫間惡趣吾不知讚佛此果報一三九十劫之昔名喚面前讚大力具七寶出為轉輪王一四八十九劫昔其名喚地鼓大力具七寶出為轉輪王一五八十八劫昔其名喚光思大力具七寶出為轉輪王一六八十七劫昔薩利他達達大力一七八十六劫昔其名喚火消大力一八八十五劫昔名喚王風似大力一九八十四劫昔其名謂趣斷大力二八十三劫昔其名謂寶焰大力二一八十二劫昔其名謂足步大力二二八十一劫昔名謂王省察大力二三八十劫之昔其名謂恥髓七寶具足二四四種無礙解如是尊者山穆伽塔義迦長老宣唱此等偈一二六庫斯瑪薩尼耶花座一爾時於穀市吾為婆羅門語彙儀式通吉凶古傳說二文法答釋明亦熟知占術通曉三吠陀弟子唱真言三時持五青蓮置於吾頭上父母相會處吾為尊供祭四毘婆尸佛陀比丘眾等隨人中長者來諸方耀光輝五吾設置座席邀請大牟尼吾敷花朵後導入己家中六家居既備辦吾為眾攝食自具清淨心向佛行布施七知為進食時吾於單手伸佛示意稱謝指北方而去八彼時布施花九十一劫間吾不知惡趣布施花果報九由今一劫前有王曰勝見大力具七寶出為轉輪王一四種無礙解如是尊者庫斯瑪薩尼耶長老宣唱此等偈一二七巴羅大耶迦果施一精聖學聖書亦通三吠陀雪山不遠處仙處吾住居二分陀利樹果垂吊樹梢頂吾於祭火時落入吾袋中三巴多穆塔拉受人尊供物搖動啟吾心乞食近至前四清淨心內喜吾向佛施果使吾生光榮齎來世幸福五受人尊供物金色正覺尊尊師立空中說示次一偈六布施此樹果更依心中願十萬劫之間彼不墮惡趣七依此清淨根吾享無虧福勝敗皆捨棄達於不動位八七百劫之昔王名善瑞祥大力具七寶出為轉輪王九四種無礙解如是尊者巴羅大耶迦長老宣唱此等偈一二八尼耶那山尼耶迦智想一雪山之山中吾住山峽谷時見光輝砂歸命殊勝佛二智慧無等倫無以尊師鬥了知一切法佛以智解脫三貴尊吾南無吾歸依最尊於最勝智慧無有等齊者四淨心於佛智一劫得天樂其餘幾劫間得積諸善業五智慧所想得由此九一劫吾不知惡趣智想此果報六七十三劫昔一人名砂花大力具七寶出為轉輪王七四種無礙解如是尊者尼耶那山尼耶迦長老宣唱此等偈一二九康提普毘耶甘提花一應施毘婆尸佛身黃金色弟子等隨後由其僧苑出二徧知漏盡者吾見此勝佛喜悅心清淨供養康提花三兩尊如是人依此心清淨雀躍心內喜吾再禮如來四彼時吾捧花九十一劫間吾不知惡趣是供佛果報五四十一劫昔有王婆留那大力具七寶出為轉輪王六四種無礙解如是尊者康提普毘耶長老宣唱此等偈一三鉢頭摩普奢迦赤蓮華供養一雪山不遠處有名瞿曇山眾樹多蔽覆群鬼所住居二即此處當中化作有仙處吾住其仙處眾多弟子隨三弟子等出去採來鉢頭摩吾等以供佛兩足如是人四彼等應諾然採集鉢頭摩如實吾占卜捧此以獻佛五爾時弟子集了知吾所諭汝等切勿懈不懈於造福六如是謙虛言曉諭弟子等勤此不懈德彼時吾死逝七依此捧花供九十一劫間吾不知惡趣供佛此果報八五十一劫昔有王最勝水大力具七寶出為轉輪王九四種無礙解如是尊者鉢頭摩普奢迦長老宣唱此等偈攝頌世雷耶伽普帕脫巴耶薩與康達奇多瑪薩與阿薩尼巴羅山尼康提鉢頭摩普奢見真義人說此百零五偈

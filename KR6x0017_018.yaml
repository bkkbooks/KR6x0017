body:
  text: 第十八拘物頭品一七一拘物頭瑪利耶白蓮之華鬘一雪山深谷中有大自然湖吾生為羅剎怖形持大力二拘物頭花開花大如車輪爾時手折花拆破其所集三兩足尊王者阿塔他西佛見花被揉潰來至吾眼邊四天中天佛陀正覺尊駕臨吾手捧花束供獻彼佛陀五只要雪山在不問居何處具備盛花蓋如來自往彼六由捧此花供十八劫之間惡趣吾不知供佛此果報七十五劫往昔統主有七人其名稱千車大力轉輪王八四種無礙解如是尊者拘物頭瑪利耶長老宣唱此等偈一七二尼闍尼達耶迦梯布施一世間居上首佛名憍陳如吾為造登梯彼登殿堂上二吾心清淨故享樂幾多福等覺者之教吾保最後身三從今三萬劫一千劫往昔三人轉輪王巴哈山報羅四四種無礙解如是尊者尼闍尼達耶迦長老宣唱此等偈一七三拉提普庇耶拉提花一於此森林中吾昔為獵夫吾見毗婆尸天中天之佛二忽見拉提花庫達等花開吾採花與根獻與彼大仙三依捧獻花故九十一劫間吾不知惡趣施花此果報四第八劫往昔名喚善淨信大力具七寶其出而為王五四種無礙解如是尊者拉提普庇耶長老宣唱此等偈一七四烏達巴那達耶迦水井布施一毗婆尸佛陀吾為作水井向佛施供食爾時並勸説二時作此善業九十一劫間惡趣吾不知水井施果報三四種無礙解如是尊者烏達巴那達耶迦長老宣唱此等偈一七五西哈薩那達耶迦獅子座布施一巴多穆塔拉世主將涅槃吾心清淨喜布施獅子座二以多香華鬘齎福來此世於彼施供養衆人多入滅三吾心清淨喜禮拜菩提樹十萬劫之間吾不墮惡趣四一萬五千劫其名喚積戒彼等有八人出為轉輪王五四種無礙解如是尊者西哈薩那達耶迦長老宣唱此等偈一七六瑪格達提迦道布施一兩足人中尊阿諾瑪達西齎福來此世步行水滿處二舉足幾花迹頭上耀光輝清淨吾心喜禮拜撒散花三二萬劫往昔其名謂花蓋五人有大力出為轉輪王四四種無礙解如是尊者瑪格達提迦長老宣唱此等偈一七七耶迦提毗耶一燈一巴多穆塔拉無上菩提樹清淨吾心喜燈火施一座二不論生何處只要有積福惡趣吾不知施燈此果報三一萬六千劫其名稱月光四人有大力出為轉輪王四四種無礙解如是尊者耶迦第毗耶長老宣唱此等偈第九誦品一七八瑪尼普奢伽摩尼供養一雪山之麓下河水有源發彼處多水源自存者所居二佳景心氣爽持造摩尼椅清淨吾心喜獻施豫佛陀三依施摩尼故九十四劫間惡趣吾不知供佛此果報四十二劫往昔其名稱百光大力有八人出為轉輪王五四種無礙解如是尊者瑪尼普奢伽長老宣唱此等偈一七九提乞奢迦三困苦一盤頭摩帝市吾時為良醫諸人陷苦病齎福豫多衆二明知展戒具猶見沙門病清淨心內喜當時吾施藥三沙門制諸根彼病得痊愈毗婆尸侍者其名稱無憂四施與醫藥故九十一劫間惡趣吾不知施藥此果報五第八劫往昔名謂一切藥大力具七寶出為轉輪王六四種無礙解如是尊者提乞奢迦長老宣唱此等偈一八山古泊達伽近侍僧團一毗舍浮佛前吾為僧苑僕清淨心內喜事無上僧團二爾時積業故二十一劫間惡趣吾不知近侍此果報三第七劫往昔七人名展被大力具七寶有為轉輪王四四種無礙解如是尊者山古泊達伽長老宣唱此等劫攝頌拘物頭與尼闍尼拉提普與烏達巴西哈薩與瑪格達耶迦提庇瑪尼普提乞奢迦古帕達十人共偈四十九

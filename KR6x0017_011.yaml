body:
  text: 第十一比伽達以品一一比伽達耶迦聖食布施一金色正覺者受尊供物人出離愛之森愛至無愛佛二靜安智慧深彼為大雄者悉達多大仙以柄杓施食三淨化眾生佛吾隨從接踵佛出於日種饗食吾歡喜四彼時行布施九十四劫間惡趣吾不知聖食布施果五八十七劫昔其名稱大塵七人具七寶出為轉輪王六四種無礙解如是尊者比伽達耶迦長老宣唱此等偈一二尼耶那山尼耶迦智想一似壯牛駿馬金色正覺尊大仙如大象發情三徵候二恰如月滿圓四方照無邊車道信步來佛陀大牟尼三以智淨化心於此吾合掌內喜心清淨禮敬悉達佛四彼時行此業九十四劫間惡趣吾不知智想此果報五七十三劫昔人王十六人大力具七寶出為轉輪王六四種無礙解如是尊者尼耶那山尼耶迦宣唱此等偈一三鬱婆拉哈提耶優鉢羅持一吾住帝彌羅爾時作花鬘吾見離塵佛受供悉達多二清淨吾心喜手持花布施乘此善業故不論生何處三往昔作善業吾享福果報美花常圍繞善想此果報四今吾獻此花九十四劫間惡趣吾不知供佛此果報五今生且暫置九十四劫間名稱諸河似彼有五百王六四種無礙解如是尊者鬱婆拉提耶長老宣唱此等偈一四帕達普奢卡足供養一尊悉達多彼吾施肉豆蔲足下生七花佛笑從座起二今依其業故吾勝諸人天等正覺者教得保最後身三謹此獻花供九十四劫間吾不知惡趣供花此果報四第五劫往昔輪王十三人其名稱徧香統主平四方五四種無礙解如是尊者帕達普奢卡長老宣唱此等偈一五穆提普毘耶穆提花一吾為花鬘匠須陀蘇那名吾見離塵佛世間居上首二巴多穆塔拉吾施肉豆蔲喜獲眼清淨得達天眼通三依此佛供養復依吾心願十萬劫之間吾不生惡趣四三十六劫昔名稱天中勝大力十六人轉輪王出世五四種無礙解如是尊者穆提普毘耶長老宣唱此等偈一六烏達伽普奢卡水供養一如聖火光輝如祭火熾燃金色正覺尊直由風路來二掌中吾取水潑水向空中大雄憐憫吾受此水供養三巴多穆塔拉彼師空中立佛知吾心意為說次一偈四依此水供養更依心生喜十萬劫之間彼不墜惡趣五吾乘此業故兩足尊人長勝敗皆捨棄吾達不動位六六十五劫昔三人轉輪王其名稱千王統主平四方七四種無礙解如是尊者烏達奢普伽卡長老宣唱此等偈一七那拉瑪利耶蘆束一巴多穆塔拉世界上首佛坐於草坪間禪定如是人二吾手持蘆束結為一團扇兩尊如是人吾獻與世尊三導師受團扇一切徧知者知吾心懷意為說此一偈四吾身入涅槃不見苦與熱誠如由三火汝心得解脫五凡棲樹間者諸神皆來集佛語令微笑吾聽施者言六世尊彼處坐諸神群眾隨彼喜吾施供為說如次偈七依此團扇施復由汝心願其名稱敬虔當為轉輪王八餘留此殘業淨根所使故其名稱微風或為轉輪王九由團扇布施依其大敬意十萬劫之間彼不生惡趣一三萬劫往昔敬虔八人王二萬九千劫微風有八人一一四種無礙解如是尊者那拉瑪利耶長老宣唱此等偈第七誦品一八阿薩努帕塔耶迦座奉侍一靜寞無煩擾入於深叢林阿塔達西佛吾施獅子座二手並持華鬘右繞禮佛陀吾拜世尊師指向北方去三是業兩足尊世人中之長己心得清淨除去諸有結四彼時所布施一千八百劫吾不知惡趣施座此果報五七百劫之昔世有淨化王大力具七寶出為轉輪王六四種無礙解如是尊者阿薩努帕塔耶迦長老宣唱此等偈一九畢拉莉達耶迦畢拉莉布施一無雪山之遠吾住樹葉蓆當時貪食欲且以為素性二人人挖球根阿魯卡蘭芭畢拉莉以及塔卡拉等根大棗與胡桃白拉果作食三巴多穆塔拉受尊供物人佛知吾心意信步至吾處四來近彼大龍彼為天中天吾持畢拉莉散置於鉢內五爾時佛心喜彼大雄受食智者進食訖為吾說一偈六汝心具淨化施吾畢拉莉一萬劫之間汝不墮惡趣七至吾最後生除去諸有結等正覺者教得保最後身八五十四劫昔其名稱善帶大力具七寶出為轉輪王九四種無礙解如是尊者畢拉莉達耶迦長老宣唱此等偈一一黎努普奢卡花粉供養一黃金色佛陀猶如百光輝恰似滿圓月四方照無邊二弟子等圍繞如環大地海吾捧獻花粉供養毘婆尸三由此花粉供九十一劫間惡趣吾不知供佛此果報四四十五劫昔名喚花粉王大力具七寶出為轉輪王五四種無礙解如是尊者黎努普奢卡長老宣唱此等偈攝頌比伽達威尼耶那哈提亞與帕達普穆提普毘烏達伽那拉瑪利尼瓦薩畢拉莉達威黎努十人共偈六十六

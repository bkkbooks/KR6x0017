body:
  text: 第八那伽薩瑪羅品七一那伽薩瑪拉有華鬘象一阿波他利花棄路吾拾遺以供世緣者尸棄佛塔婆二彼時作是業三十一劫間吾不知惡趣供養塔婆果三十五劫之昔剎帝利名地大力具七寶出為轉輪王四四種無礙解如是尊者那伽薩瑪拉長者宣唱此等偈七二帕達山尼耶迦足想一日種帝沙佛吾見踏足來雀躍內心喜其足吾起信二爾時得足想九十二劫間吾不知惡趣足想此果報三第七劫之昔剎利須彌陀大力具七寶出為轉輪王四四種無礙解如是尊者帕達山尼耶迦長者宣唱此等偈七三山尼耶迦想一佛之糞掃衣見其掛樹梢於此吾合掌禮拜糞掃衣二彼時作其業九十二劫間吾不知惡趣想佛此果報三第四劫之昔剎利名樹精大力夷四方出為轉輪王四四種無礙解如是尊者山尼耶迦長者宣唱此等偈七四比薩魯瓦達耶迦鬚根塊莖布施一踏入森林中吾住不毛處見毘婆尸佛接受尊供物二吾施嗽手水鬚根與塊莖頭面接足禮指向北方去三時行此布施九十一劫間吾不知惡趣福業此果報四第三劫之昔剎利崇鬚根大力具七寶出為轉輪王五四種無礙解如是尊者比薩魯瓦達耶迦長老宣唱此等偈第六誦品七五耶伽山尼耶迦一想一侍毘婆尸佛騫荼大弟子彼受世供物吾施彼一食二人中兩足尊吾心生淨信吾不知惡趣一食施果報三四十劫之昔剎利婆留那大力具七寶出為轉輪王四四種無礙解如是尊者耶伽山尼耶迦長老宣唱此等偈七六提那山塔拉達耶迦草敷具布施一雪山路不遠更有一大湖幾百之葉覆花開多鳥群二彼處浴飲水吾住不遠處直風迎面來吾見勝沙門三無上彼尊師了知吾心意由雲中降臨彼時立地上四以角刈取草吾施為坐具導師帝沙佛世尊坐其處五己心為淨化吾拜世導師沈思大牟尼屈身吾折回六吾心依淨信赴樂變化天吾不知惡趣布施敷具果七第二劫之昔剎利名鹿敬大力具七寶出為轉輪王八四種無礙解如是尊者提那山塔拉迦長老宣唱此等偈七七斯質達耶迦針布施一三萬劫往昔三十二相具名號須彌陀世界之導師二彼映黃金色兩足之尊者為佛縫綴衣吾施五根針三依其針布施勝觀微妙義銳速心神爽於此生智慧四燃盡幾煩惱除去諸有結等正覺者教吾保最後身五稱名二足主世有四人王大力具七寶出為轉輪王六四種無礙解如是尊者斯質達耶迦長老宣唱此等偈七八波吒釐普毘耶波吒釐花一容姿值黃金三十二相具走進市場間黃金色佛陀二時吾豪商子柔和耽欲樂波吒釐之花吾採為堆積三雀躍內心喜以花為供養南無帝沙佛救主世間解四彼時行其業九十二劫間吾不知惡趣供花此果報五六十三劫昔稱名為勝敬大力具七寶出為轉輪王六四種無礙解如是尊者波吒釐普毘耶長老宣唱此等偈七九提坦伽利耶立合掌一吾於森林中追獸為獵師見彼帝沙佛莊嚴世導師二指向西方去於彼吾合掌樹葉結蓆上佛坐處不遠三爾時吾頭上雷電忽大作如是吾臨死再度為合掌四彼時之合掌九十二劫間吾不知惡趣合掌此果報五五十四劫昔名喚作獸旗大力具七寶出為轉輪王六四種無礙解如是尊者提坦伽利耶長老宣唱此等偈八提尼帕多密耶三蓮華一巴多穆塔拉通曉一切法彼為最勝者自制人等隨自制人等圍彼等由市出二漢薩瓦底市吾為製花人盛花開放時三花持吾手三吾見離塵佛折返市場中吾見正覺尊彼時如是思四此等花獻王吾持奉如何村田耕千金吾得又如何五賢明制不制生物有幸運供養救世主吾得不死富六如斯心思惟己心為淨化手執三赤花爾時拋空中七拋向空中去其花忽擴展莖上花瓣下彼處停頭上八見者任何人皆揚感歎聲諸神於空中拍手為喝采九尊佛於此故生起稀有事吾等施花故得聞一切法一巴多穆塔拉接受尊供人尊師街頭立為說如次偈一一彼時以赤蓮供養佛之物吾將讚此人傾耳聽吾說一二三萬劫昔間享樂於天界神王三十劫統領神世界一三爾時有宮殿稱名為大福三百由旬高二百五十廣一四四十萬劫後建造有尖塔嚴具勝樓閣完具大臥牀一五十萬俱胝數天女等圍繞音樂與歌舞彼女巧右繞一六滿集天女群於此盛宮殿其色為赤神天常降花雨一七門扉之把手象牙壁上釘赤蓮花垂下花朵車輪大一八於此宮殿中花葉覆幾重天女臥其中內中多寬展一九四周百由旬圍繞其住處此等赤淨蓮滿放神馨味二七十五度間彼為轉輪王統治廣國土不能測其量二一幸享二無虧安泰無危害將屆臨終時彼得見涅槃二二吾常見佛耶為善交易耶供養三蓮華吾享三成就二三今日吾達法諸垢得解脫人人花開頂翳遮赤蓮華二四巴多穆尊師說吾以往業七千現生者於法作現觀二五得供養彼佛十萬劫之間惡趣吾不知三蓮花果報二六煩惱令燒盡除去諸有結消滅諸有漏吾今無後有二七四種無礙解如是尊者提尼帕多密耶長老宣唱此等偈攝頌薩瑪拉帕達山尼山尼耶迦阿魯瓦達耶伽桑尼提那山斯質達耶波吒釐提坦伽利提尼帕多十人共偈七十五偈

body:
  text: 第十六槃多吉瓦迦品一五一槃多吉瓦迦一淨如無垢月清淨無煩擾一切愛樂盡超越世執著二以淨眾人等渡之並再度森林佛思惟安靜心鎮定三槃多吉瓦迦花朶蔓多奢奉獻尸棄佛世界具緣者四爾時作斯業三十一劫間惡趣吾不知供佛此果報五從今百劫苦名高而為王其名稱徧眼大力轉輪王六四種無礙解如是尊者槃多吉瓦迦長老寅唱此等偈一五二單巴普毘耶赤銅色花一吾為犯罪者勞動只為他戰慄懷怖畏奔竄林野境二奔走見花朶團簇美嬌艷採得赤銅花撒向菩提樹三波吒釐花美淨掃菩提樹於菩提樹下吾結跏趺坐四吾往覓林徑人眾來身邊彼處見彼等攝心向菩提五吾心獲清淨禮拜菩提樹山嶮徑恐怖墮落數陀羅六自吾獻花供九十一劫間惡趣吾不知供樹此果報七第三劫往昔有王名觸者大力具七寶出為轉輪王八四種無礙解如是尊者單巴普毘耶長老宣唱此等偈一五三義提山瑪奢迦清掃道一光輝如朝日黃金光閃耀如月十五夜世間導師出二六萬八千人一切漏盡者兩足人中長圍繞正覺尊三世之導師出吾掃淨其道更以清淨心彼處樹幢幡四吾獻此幢幡九十一劫間惡趣吾不知布施幡果報五第四劫往昔吾為大力王望高呼善幡吾常具此名六四種無礙解如是尊者義提山瑪奢伽長老宣唱此等偈一五四格迦魯普奢伽格迦魯供養一生為神之子供奉尸棄佛採得迦魯花捧獻彼佛陀二吾獻彼花朶三十一劫間惡趣吾不知供佛此果報三第九劫往昔最勝有情王大力具七寶出為轉輪王四四種無礙解如是尊者格迦魯普奢伽長老宣唱此等偈一五五曼陀羅瓦普伽奢曼陀羅花供養一生為神之子供養尸棄佛以曼陀羅花捧獻彼佛陀二七日如來前常敷天花鬘諸人皆來集南無彼如來三自吾供此花三十一劫間惡趣吾不知供佛此果報四第十劫之昔名喚輝持王大力具七寶出為轉輪王五四種無礙解如是尊者曼陀羅瓦普奢伽宣唱此等偈一五六迦單巴普毘耶迦曇婆花一雪山不遠處有山屈屈吒屈屈吒山麓住有彼七佛二迦曇婆花放如明王陽昇吾採置兩掌散撒彼七佛三吾供此花朶九十四劫間惡趣吾不知供佛此果報四九十二劫昔七人花嚮導大力具七寶出為轉輪王五四種無礙解如是尊者迦單巴普庇耶長老宣唱此等偈一五七提那斯羅迦提那斯拉花一雪山不遠處普達格那山彼處住勝者去縛自存人二提那斯拉花吾捧獻供佛九萬九千劫吾不墮惡趣三於昔十一劫有王達尼哈大力七寶具出為轉輪王四四種無礙解如是尊者提那斯羅迦長老宣唱此等偈一五八那伽普毘耶犬死出花一其名謂善犢吠陀婆羅門住於山狹間弟子眾隨後二巴多穆塔拉接受尊供物為搖撼吾心走近吾住居三上空佛經行恰如燃燈明認知吾心笑指向東方去四其不可思議身毛即豎立吾取犬死花撒向佛去路五由吾散此花從此十萬劫吾心為清淨永不生惡趣六三千百劫昔有王名大車大力具七寶出為轉輪王七四種無礙解如是尊者那伽普毘耶長老宣唱此等偈一五九芬那伽普毘耶芬那伽花一入深於叢林吾獵人居住噴那伽花開吾念勝佛陀二芳香馨郁馥手折美艷花砂丘作塔婆捧花供養佛三自吾供鮮花九十二劫間惡趣吾不知供佛此果報四九十一劫昔一王名驅闇大力具七寶出為轉輪王五四種無礙解如是尊者芬那迦普毘耶長老宣唱此等偈一六拘物無陀達耶迦拘物頭布施一雪山不遠處彼處有大湖鉢頭摩鉢羅分陀利迦廣二爾時於彼處吾為鷄冠鳥有德守業戒明曉福非福三巴多穆塔拉受尊供養物於湖不遠處過彼大單尼四水採拘物頭捧獻彼大仙彼知吾心意牟尼受供養五吾行此布施淨根所使故十萬劫之間不生於惡趣六一千六百劫婆留那八人彼等具七寶大力轉輪王七四種無礙解如是尊者拘無陀達耶迦長老宣唱此等偈攝頌槃多吉單巴普毘義提格迦魯普庇耶曼陀羅與迦單巴斯羅迦那伽普毘耶芬那伽與拘無陀十人宣偈五十六

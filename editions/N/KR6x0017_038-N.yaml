body:
  text: 第三十八菩提萬達迦品三六八菩提萬達迦菩提樹禮拜一綠色波吒釐由足吸水生虔敬示合掌禮拜向彼樹二虔敬吾合掌意中施禮敬內外皆清淨漏盡正解脫三世敬毘婆尸悲智海世尊吾拜波吒釐如對正覺尊四吾拜菩提樹九十一劫間惡趣吾不知禮拜此果報五四種無礙解如是尊者菩提萬達迦長老宣唱此等偈三六九波吒釐普毘耶波吒釐花一毘婆尸世尊自存最上人弟子等隨後走進盤頭摩二波吒花三朶裝入圍裙中為洗吾之頭走往河浴場三吾見世導師盤頭摩帝來佛如水蓮輝又如祭火燃四生如尊貴獅猶似虎壯牛沙門勝者佛比丘眾隨從五善逝吾淨信滌穢煩惱人吾手執三花供養勝佛陀六供養鮮花故九十一劫間惡趣吾不知供養佛果報七四種無礙解如是尊者波吒釐普毘耶長老宣唱此等偈三七提努鉢羅摩利耶三優鉢羅花鬘一羌達巴迦河吾為岸邊猿得見離塵佛坐於山峽間二婆羅樹花開十方皆光輝三十二隨好見已心歡喜三心喜悅高揚歡喜心跳躍採優鉢羅花三朶捧頭上四將此作供養普沙彼大仙深摯敬佛已指向北方去五更以清淨心屈身信步行岩間吾墮落壽命至而終六以行善業故更依心所願捨棄前之生吾往忉利天七其後三百度統領神世界又經五百度成為轉輪王八供奉三花故九十二劫間惡趣吾不知供養佛果報九四種無礙解如是尊者提努婆羅摩利耶長老宣唱此等偈三七一波提普毘耶葉花一巴多穆塔拉正覺尊涅槃諸人皆集聚運搬佛舍利二鼓樂響行進運送佛舍利心內喜清淨葉花獻供養三以供花葉故從此十萬劫惡趣吾不知供養舍利果四實吾適其時來至尊佛前即此得三明遵行佛之教五燃盡眾煩惱除去諸有結如龍象斷縛安住成無漏六四種無礙解如是尊者波提普毘耶長老宣唱此等偈三七二娑陀般尼耶七葉樹一蘇摩那正覺世間大導師內喜心喜淨供養七葉樹二既供七葉已從此十萬劫惡趣吾不知供樹之果報三吾實善其時來至勝佛前即此得三明遵行佛之教四燃盡眾煩惱除去諸有結如龍象斷縛安住成無漏五四種無礙解如是尊者娑陀般尼耶長老宣唱此等偈三七三康達穆提耶香一握一既作佛之塚種種薰香集吾心喜清淨供養一握香二供養佛塚故從此十萬劫惡趣吾不知供佛塚果報三吾實適其時來至佛座前即此得三明遵行佛之教四燃盡眾煩惱五四種無礙解如是尊者康達穆提耶長老宣唱此等偈三七四質陀普伽卡塚供養一稱最上水草彼佛入涅槃其塚積成時吾供娑羅花二獻供娑花故從此十萬劫惡趣吾不知供塚此養果三吾實適其時來至尊佛前即此得三明遵行佛之教四燃盡眾煩惱五四種無礙解如是尊者質陀普伽卡長老宣唱此等偈三七五須摩那陀羅萬提耶素馨團扇一彼佛悉達多吾供施團扇覆以素馨花再翳以團扇二布施團扇故九十四劫間惡趣吾不知施團扇果報三吾實適其時來至尊佛前即此得三明四燃盡眾煩惱五四種無礙解如是尊者須摩那陀羅萬提耶長老宣唱此等偈三七六須摩那達摩達耶迦素馨花環布施一悉達多佛陀水浴苦行者作得馨花環捧獻立佛前二吾捧獻花環從此九四劫惡趣吾不知施花環果報三吾實適其時來至尊佛前即此得三明四燃盡眾煩惱五四種無礙解如是尊者須摩那達摩達耶迦長老宣唱此等偈三七七伽斯摩利婆羅達耶迦伽斯摩拉果布施一輝如黃花樹坐於山峽間世尊大牟尼吾見離塵佛二吾心喜清淨合掌於頭上伽斯摩利果吾施尊勝佛三布施其果故三十一劫間惡趣吾不知供樹此果報四吾實適其時五燃盡眾煩惱六四種無礙解如是尊者伽斯瑪利婆羅達耶迦長老宣唱此等偈攝頌菩提波吒釐普毘優鉢羅波提普毘娑陀般康達穆提質陀須摩那陀羅須摩那伽斯摩利十人共偈五十九

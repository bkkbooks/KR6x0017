body:
  text: 第三十三溫瑪普毘耶品三二一溫瑪普毘耶亞麻花一無敵悉達多已達心安靜吾見人中尊彼由靜慮起二吾採亞麻花獻與彼佛陀莖上花頭下一切花頭齊三如空中美色停留花蓆上吾心得清淨再生兜率天四供養彼花故九十四劫間惡趣吾不知供佛此果報五五十五劫昔出世一君王其名喚徧蓋出為轉輪王六四種無礙解如是尊者溫瑪普毘耶長老宣唱此等偈三二二普利那普迦卡砂布施一如壯牛駿馬如鷄冠光輝人中稱長者如月光映照二虔敬吾合掌吾禮拜尊師以己業滿足讚歎彼尊師三吾取清淨砂撒其行道上吾手執圍裙面向毘婆尸四吾取砂之半更以清淨心兩足之王者致注其晝居五吾向彼注砂九十一劫間惡趣吾不知供砂此果報六四種無礙解如是尊者普利那普伽卡長老宣唱此等偈三二三哈薩伽那迦生笑一佛之糞掃衣見其懸樹梢虔敬吾合掌內心愈高揚二認見距吾遠笑聲自湧出吾再示合掌此心愈清淨三彼時吾得想九十一劫間惡趣吾不知得想此果報四四種無礙解如是尊者哈薩伽那迦長老宣唱此等偈三二四薩尼耶薩密迦想所持一生年僅七歲通達諸聖書為保家系譜執行生贄祭二家畜八萬四時常為吾贄禮物更與高貴物備為贄祭用三如鍊鐵火爐似朅地羅炭如太陽東昇恰似滿圓月四適宜三界教悉達諸義成正覺尊近來佛如是宣說五勿害諸生物公子吾歡汝犯盜與醉酒祛離斯為善六彼喜寂靜者殊多真實知此世與彼世應讚此諸法七身修此諸法喜利情非情向佛淨化心善修最上道八世間居上首一切徧知者如斯說示吾而後騰空去九其上吾清心其後心淨化此心正淨化再生兜率天一彼時心淨故九十四劫間惡趣吾不知得想此果報一一四種無礙解如是尊者薩尼耶薩密迦長老宣唱此等偈三二五尼密達薩尼耶迦相想一羌達巴迦河岸邊仙處住茂林時步行見黃金色鹿二見鹿心淨化吾憶正覺尊更憶他之佛如心得清淨三既己寂滅佛及住世如來誠如是光輝吾心如鹿王四彼時吾得想九十四劫間惡趣吾不知得想此果報五二十七劫昔出世一君王名喚森有情大力轉輪王六四種無礙解如是尊者尼密達薩尼耶長老宣唱此等偈三二六安那薩薩瓦迦注食一金色正覺尊行往市場中姿態黃金值三十二相具二無擾無敵者悉達諸義成吾禮正覺尊施食彼牟尼三牟尼愍世深彼時吾光輝吾向佛心淨吾樂天一劫四彼時行布施九十四劫間惡趣吾不知施聖食果報五四種無礙解如是尊者安那薩薩瓦迦長老宣唱此等偈三二七尼軍提普毘耶尼軍提花一天界壽命盡一神當消逝彼等諸神喜出響有三聲二由此往善趣交往彼諸人善法生為人獲得無上信三其信張汝根確立堅汝身善宣諸善法不動生命限四善持身與語行眾多善業更以意為善慈愍無執著五再行以布施積再生因福更令他人等為善勵梵行六諸神以慈愍賢者天中天喜彼既離去汝將幾度轉七爾時諸神集吾心起煩擾即今由此沒吾生如何胎八制根一沙門知吾之厭離彼欲搖吾心來至吾面前九其名須摩那彼為佛弟子教吾義與法彼搖吾之心第一二誦品一吾聞彼之言向佛吾淨心禮敬大雄者忽然即死逝一一淨根之所使當場吾再生吾止於母胎再受母保護一二由此身沒去再生三天上爾時於彼處吾未見不快一三由三天沒去吾入母之胎吾由胎中出吾辨黑與白一四生年僅七歲走往入林苑是人釋族子釋迦彼世尊一五教使眾人知其言徧四方尊師比丘眾亦見為說教一六舍衛城市中有拘薩羅王乘龍象曳車無上菩提樹一七吾見彼龍象憶出往昔業虔敬吾合掌吾赴眾人前一八生年僅七歲出家為無家有名阿難陀弟子侍佛者一九正行勇氣滿正念且多聞淨化王之心賦與大光輝二吾聞彼說法憶起昔行業彼處依然立達阿羅漢位二一吾袒右肩衣合掌於頭上禮敬正覺尊吾宣次言辭二二巴多穆塔拉兩足之王者吾採尼軍提置花獅子座二三世間居上首人中稱長者勝敗皆棄捨吾達不動位二四二萬五千劫諸人有統主濁垢各八人有王名滅濁二五四種無礙解如是尊者尼軍提普毘耶長老宣唱此等偈三二八須摩那威利耶須摩那花環一毘舍浮佛陀世間居上首一切人眾等共赴大供養二以灰漿作塊須磨那花環爾時捧獻佛獅子寶座前三眾人齊來集索求最上花既得此鮮花如何捧獻佛四捧花心清淨再生樂化天己昔所行善得享業之果五神界或人間再生任何胎慈愛一切人供花此果報六身口意三者吾不知惡語自制苦行者懇期為侍者七依吾行善業滿依吾心願供養一切物無惡語之果八吾供養花故三十一劫間惡趣吾不知供佛此果報九十及一劫昔有王名千輻大力具七寶出為轉輪王一四種無礙解如是尊者須磨那威利耶長老宣唱此等偈三二九普婆佉提耶花繖蓋一悉達多世尊世間居上首說真令生類向佛具清淨二心悅意清爽採來百水草吾作花繖蓋以此捧獻佛三受尊供物人善逝世間解師立比丘中為說次一偈四具心清淨者作花繖蓋人如即心清淨不往惡趣行五世間大導師語斯正覺尊令去諸眾人騰上高空去六上昇人天時白繖蓋亦昇於尊佛座前展無上繖蓋七捧獻繖蓋故九十四劫間惡趣吾不知花繖蓋果報八七十四劫昔八人名水頂大力具七寶出為轉輪王九四種無礙解如是尊者普婆佉提耶長老宣唱此等偈三三薩婆利瓦羅佉陀達耶迦有隨眾傘蓋布施一巴多穆塔他受尊供物人如從空降雨世尊降法兩二說示不死道仰見正覺尊己心得清淨既離吾之家三手執美飾傘親近人中尊雀躍內心喜投傘向空中四更如善御車亦如上弟子既往佛座前佛立佛頂上五慈愍慈愛深世間大導師比丘眾中坐為說如次偈六美飾心地善布施此傘者既得心清淨亦不墮惡趣七七度往天界將為諸天王更三十四度應為轉輪王八從此十萬劫生來甘蔗族其名稱瞿曇世出有尊師九嗣法於彼師法子依法生諸漏皆正知無漏證涅槃一言說滿威嚴悟得佛所言心清淨歡喜其上更生輝一一棄離人間胎更至神之胎心適意氣爽生最上宮殿一二出得宮殿來時為白傘翳時懷得佛想乃昔業果報一三自神界沒逝即歸人間界七百劫之間輪王三十四一四吾身得沒逝即赴三天都輪迴且流轉再歸來人間一五吾入母之胎眾人翳白傘生年僅七歲出家為無家一六通聖婆羅門名謂須難陀手持破傘來施最勝弟子一七大雄大說者舍利弗致謝吾聞其謝言憶起昔所業一八虔敬吾合掌己心為淨化憶起往昔業達阿羅漢位一九即時由座起合掌於頭上禮敬正覺尊吾宣如次語二十萬劫往昔此世無上佛巴多穆塔拉彼受尊供物二一吾施美飾傘捧獻與彼佛最上自存者執傘以雙手二二如實諸佛法吾等師成滿布施一傘蓋不生於惡趣二三燃盡眾煩惱除去諸有結諸漏皆正知吾住成無漏二四四種無礙解如是尊者薩婆利瓦羅佉陀達耶迦長老宣唱此等偈攝頌溫瑪普婆普利那哈薩薩尼耶薩密尼密達伽薩薩瓦尼軍提與須摩那普婆薩婆利瓦羅十人共有百七偈

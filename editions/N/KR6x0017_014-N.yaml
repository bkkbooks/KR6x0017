body:
  text: 第十四輸毘多品一三一輸毘多眾寶莊嚴一巴多穆塔拉彼為最勝者眾多人群繞說示不死法二佛之威嚴滿吾聞宣說言深敬示合掌時吾心鎮靜三大洋海之雄須彌山之最如實其意動不如佛智慧五慈愍之仙者於法置恒規比丘眾中坐為說如次偈六世間大導師若有讚智慧十萬劫之間彼不墮惡趣七燒盡眾煩惱心鎮而安靜名喚輸毘多為尊師弟子八煩惱吾燒盡除去諸有結吾達於三明吾行佛教法九五萬劫之昔薩穆伽七人大力具七寶出為轉輪王一四種無礙解如是尊者輸毘多長老宣唱此等偈一三二須陀蘇那善見一廣闊河岸邊有無花果樹吾索其果樹得見世導師二花開現金色時將截其莖供獻世緣者尸棄佛彼之三永恒不死道汝須智慧達吾崇大智慧殊勝牟尼佛四崇敬佛智慧施供無花果吾今得其想崇尚智果報五彼時吾獻花三十一劫間吾不知惡趣是崇智果報六十三劫昔十二伽魯伽達大力具七寶出為轉輪王七四種無礙解如是尊者須陀蘇那長老宣唱此等偈一三三栴檀普奢迦旃檀供養一羌達帕迦河時為緊那羅吾是食花者身著多花衣二世間居上首阿塔達西佛如鵞王翔空傾斜山峽出三吾南無貴尊聖心更清明臉色既清淨諸根亦清悅四博識且宏智由空佛端降外衣展敷地結跏而趺坐五手持旃檀香吾往勝者前清淨心內喜以此捧獻佛六世間居上首禮敬正覺尊湧出歡喜心指向北方去七施旃檀供養因此十八劫惡趣吾不知供佛此果報八十四劫往昔其名喚赤牛大力有三人出為轉輪王九四種無礙解如是尊者旃檀普奢迦長老宣唱此等偈第八誦品一三四普巴奢達尼耶花繖蓋一呼名為善喜聖書婆羅門學殊犧牲祭及行蘇摩祭二巴多穆塔拉慈者彼大仙憐愍諸人群爾時空經行三世導一切智正覺尊經行彼滿無執著慈心無量眾四聖書婆羅門時切幾花莖弟子等聚來散花向空上五城市盡其限散花成繖蓋依佛威力故七日不消失六誠淨根所致吾享無虧樂諸漏皆正知超越世執著七十一劫往昔三十五人王大力具七寶出為轉輪王八四種無礙解如是尊者普巴奢達尼耶長老宣唱此等偈一三五羅睺山尼耶迦孤獨想一雪山不遠處有山婆娑婆於彼山之麓營造有仙處二吾為婆羅門施教三千年吾坐一邊述弟子等傾聽三如斯一邊坐聖書婆羅門常慕佛容姿智慧以淨心四於彼吾心淨坐於樹葉蓆結跏趺端坐當場吾死逝五彼時吾得想三十一劫間吾不知惡趣智慧此想果六二十七劫昔王名吉祥持大力具七寶出為轉輪王七四種無礙解如是尊者羅睺山尼耶迦長老宣唱此等偈一三六旃簸迦普毘耶旃簸迦花一佛坐山峽間光輝如黃花如曙曉明星照耀諸方所二吾具諸巧藝弟子有三人持荷一佉梨彼等隨吾後三苦行者袋中有裝七莖花取花為智慧獻毘舍浮佛四時吾獻花供三十一劫間惡趣吾不知智慧供養果五二十九劫昔其名喚殺光大力具七寶出為轉輪王六四種無礙解如是尊者旃簸迦普毘耶長老宣唱此等偈一三七阿塔山達薩諭義一廣大公堂坐智力者漏盡比丘眾等隨吾見世導師二三明六通具大威十萬人圍繞正覺尊誰見不起信三人天世智慧無與倫比者智慧正覺尊誰見不起信四如玉出礦山喻法身光明他物無能穢誰見不起信五巴多穆他拉依此等三偈稱頌彼不敗去那羅陀市六由此心清淨且依讚佛德十萬劫之間吾不知惡趣七三十劫往昔名喚善投王大力具七寶有為轉輪王八四種無礙解如是尊者阿塔山達薩伽長老宣唱此等偈一三八耶伽蘭薩尼耶一光一吾名那羅陀美髮賢者稱尋求善不善赴往佛座前二阿塔達西佛慈愍慈心深說法具眼者牟尼慰眾生三己心得清淨合掌於頭上尊師吾禮敬指向東方去四十七劫往昔有王統大地其名無敵住輪王偉大力五四種無礙解如是尊者耶伽蘭薩尼耶長老宣唱此等偈一三九娑羅普巴達耶迦娑羅花布施一時吾為獸王生為尊獅子覓求山險路得見世導師二此人誠大雄人天中長者令悟數多人然吾尊崇彼三手折娑羅枝取來諸枝花走近正覺尊布施最勝花四依獻此花供九十一劫間惡趣吾不知施花此果報五第九劫之昔微盧者那名三王有大力有為轉輪王六四種無礙解如是尊者娑羅普巴達尼耶長老宣唱此等偈一四巴羅大耶迦果施一吾時為獵人狙殺他生物近尸棄佛處居臥吾山洞二世間大導師朝夕吾得見兩足尊是人吾無布施物三毘耶羅樹果採摘往佛前世間居上首佛受吾供養四更採他種果奉事嚮導人如是心淨化當場吾死逝五依布施此果三十一劫間吾不知惡趣施果此果報六十五劫往昔三王瑪羅毘大力具七寶出為轉輪王七四種無礙解如是巴羅大耶迦長老宣唱此等偈攝頌輸毘與須陀蘇那旃檀普巴奢達那羅睺旃簸迦普庇又阿塔山達薩伽耶伽蘭西娑羅達達第十巴羅大耶迦此為賢人等之數共說其偈七十二

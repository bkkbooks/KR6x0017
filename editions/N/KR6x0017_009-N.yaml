body:
  text: 第九提蜜羅普毘耶品八一提蜜羅普毘耶提蜜拉花一羌達巴伽河時吾沿岸行清幽無煩擾吾見沙門坐二此心既得淨爾時自思惟能渡彼將渡能制彼將制三得慰彼使慰能鎮彼將鎮能脫彼使脫彼使得涅槃四世間之覺者悉達多大仙手採提蜜拉布撒其頭上五雙手吾合掌更作右繞禮吾禮尊師足指向西方去六既去不久間鹿王追逐我直往懸崖行遂墜於彼處七自吾供獻花九十四劫間吾不知惡趣供佛此果報八五十六劫昔名高者七人大力具七寶出為轉輪王九四種無礙解如是尊者提蜜羅普毘耶長老宣唱此等偈八二格達山尼耶迦逝想一生年僅七歲出家吾無家更以清淨心吾禮尊師足二難格黑奇花七朶投上空正覺帝沙佛如大海無際三善逝蹈聖道心躍吾供養爾時吾具信以己掌合掌四依此所作業九十二劫間惡趣吾不知供佛此果報五第八劫之昔三人名火焰大力具七寶出為轉輪王六四種無礙解如是尊者格達山尼耶迦長老宣唱此等偈八三潘難迦利迦臥合掌一時吾患重病吾坐於樹蔭就此森林中悲心最高深二慈愍帝沙佛挨近彼尊師吾就原臥處合掌於頭上三清淨吾心喜人間最上佛禮敬正覺尊當場吾息絕四禮拜人中尊九十二劫間惡趣吾不知禮敬此果報五第五劫之昔五人大光焰大力具七寶出為轉輪王六四種無礙解如是尊者潘難伽利迦長老宣唱此等偈畢八四阿多普毘耶山下花一毘浮尸棄佛一弟子比丘威力具三明以往彼雪山二時吾住雪山悅適住仙處修四量神足以成為仙人三生如空飛鳥性淨唯樂山吾摘山中花再返至山處四手執花七朶撒彼頭頂上大雄注視中指東立而去五到達仙居處返抵己住所持荷一佉梨行往山峽去六可怖大力蟒纏捲押殺吾憶及往昔業當場吾息絕七自吾捧花供三十一劫間惡趣吾不知供花此果報八四種無礙解如是尊者阿多普毘耶宣唱此等偈八五藍西山尼迦光想一於彼雪山中吾自嘗營住身著皮之衣住於山峽間二佛如黃金色似百光輝耀花開如娑羅得見森林間三大仙毘婆尸光輝淨吾心合掌為禮敬頭面行接足四由此善業故九十一劫間惡趣吾不知光想此果報五四種無礙解如是尊者藍西山尼迦長老宣唱此等偈八六藍西山尼耶迦光想一住於雪山中吾著樹皮衣上行經行處面向東方坐二具時為禪樂於山見普薩合掌向彼光吾心為清淨三依時得光想九十二劫間惡趣吾不知光想此果報四四種無礙解如是尊者藍西山尼耶迦長老宣唱此等偈八七帕拉達耶伽果施一時於雪山中吾身著粗裘見普薩勝者吾持樹果施二更以清淨心吾施樹果實不論再生處必現樹果實三吾施樹果實九十二劫間惡趣吾不知施樹實果報四四種無礙解如是尊者帕拉達耶迦長老宣唱此等偈八八薩達山尼耶迦聲想一時在雪山中吾居樹葉蓆聲聞普薩法吾心得清淨二依時所作業九十二劫間惡趣吾不知福業此果報三四種無礙解如是尊者薩達山尼耶迦長老宣唱此等偈八九菩提山尼耶迦菩提樹想一彼佛毘婆尸大菩提樹祭既為出家身吾亦赴祭會二以庫斯瑪水灌注菩提樹應脫者解脫使彼得涅槃三灌注菩提樹九十一劫間惡趣吾不知樹想此果報四三十三劫昔諸人統主出其名喚灌水八人轉輪王五四種無礙解如是尊者菩提山尼耶迦長者宣唱此等偈九鉢頭磨普毘耶蓮花一分入茂蓮中吾食鉢頭摩吾見佛普薩三十二相具二採鉢頭摩花上拋入空中吾行此清淨出家為無家三此身既出家此意亦善制捨棄口惡業吾行清淨活四自吾獻此花九十二劫間惡趣吾不知花供佛果報五名稱為蓮語有君王十八從今十八劫有四十八人六四種無礙解如是尊者鉢頭摩普毘耶長老宣唱此等偈攝頌提蜜羅與楠伽里羅普毘潘難伽利迦阿多普庇耶二藍西山帕拉達薩達山尼塞瓦拉最後鉢頭磨普毘十人說偈六十五

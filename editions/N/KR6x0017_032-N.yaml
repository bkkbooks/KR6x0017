body:
  text: 第三十二阿羅伽達耶品三一一阿羅迦達耶迦守護布施一丹瑪達西佛吾為彼作垣兩足之王者供施守護物二彼時行此業千八百劫間如業所餘故吾已達漏盡三四種無礙解如是尊者阿羅伽達耶迦長老宣唱此等偈三一二寶伽那達耶伽食布施一娑羅幼芽萌索般伽那樹空因陀羅杖勝者常映照二大仙毘舍浮世尊天中天吾以清淨心布施彼食事三自存無敵者於吾示謝忱不論再生處爾將生其果四彼時布施故三十一劫間惡趣吾不知施食此果報五二十五劫昔王名非友光大力具七寶出為轉輪王六四種無礙解如是尊者寶伽那達耶迦長老宣唱此等偈三一三伽達薩尼耶伽行想一太空直風道於空無有道吾見悉達多三天隨行眾二等正覺上衣吾見為風靡彼牟尼之行爾時吾生喜三彼時吾得想九十四劫間惡趣吾不知佛想此果報四四種無礙解如是尊者伽達薩尼耶迦長老宣唱此等偈三一四薩達婆多密尼耶七葉蓮華一吾住河之堤薩達婆羅門吾以百葉花淨掃諸仙處二黃金色佛陀導師悉達多見彼林中行向吾示微笑三趨前迎彼佛人中稱長者引導至仙處撒最上水草四彼時供養花九十四劫間惡趣吾不知佛想此果報五第七劫之昔四人名良樹大力具七寶有為轉輪王六四種無礙解如是尊者薩達婆多密尼耶長老宣唱此等偈三一五普婆薩尼耶花座一光輝如太陽黃金色佛陀無敵悉達多遙見行不遠二吾出迎彼佛導入此仙處更以清淨心施以鮮花座三爾時心感動虔敬示合掌清淨心向佛此業吾迴向四無敵自存人唯積諸福業依此一切善聞教得無垢五時施花座故九十四劫間惡趣吾不知施花座果報六四種無礙解如是尊者普婆薩尼耶長老宣唱此等偈三一六阿薩那達威迦座稱讚一世緣尸棄佛具最上支提時吾為盲者彷徨不毛地二恰由茂林出識見獅子座吾即袒右肩讚世間導師三鎮日吾稱讚此世大導師心喜而雀躍抒發如次語四歸依尊貴者歸命最勝尊一切徧知者世間人中尊五為其好相引吾讚尸棄佛吾禮拜佛座指向北方去六吾讚言說者三十一劫間惡趣吾不知讚歎之果報七二十七劫昔七人名無比大力具七寶有為轉輪王八四種無礙解如是尊者阿薩那達威迦長老宣唱此等偈三一七薩達薩尼耶迦音想一嚴相大雄者說示不死道弟子等圍繞住居最上家二示柔和言語攝世間大眾為諸人天眾響徹大地音三悉達多佛陀吾聞其音響淨心持淨信禮拜世導師四彼時吾得想九十四劫間惡趣吾不知是得想果報五四種無礙解如是尊者薩達薩尼耶長老宣唱此等偈三一八提蘭西耶三光一如善生花絲亦如大火山光輝充十方悉達佛山峽二恰如彼陽光亦似彼月光吾見佛光輝湧示出喜悅三得見有三光沙門之最上吾為袒右肩稱讚世導師四此世放三光除世界諸闇彼為日與月更為世導師五吾引譬喻示讚彼大牟尼稱讚佛相好在天享一劫六彼時吾讚佛九十四劫間惡趣吾不知讚佛此果報七六十一劫昔一人名知持大力具七寶出為轉輪王八四種無礙解如是尊者提蘭西耶長老宣唱此等偈三一九康達莉普毘耶康達利花一信度河岸邊時吾為耕人辛勤為人業亦賴他人食二沿信度河行吾見悉達多時佛坐入定如百葉蓮花三吾採康達利切作七花莖佛由日種出吾獻頭頂上四佛身黃金色相好鎮其心發情三徵候如象難馴近五賢明制諸根得親近彼佛虔敬吾合掌禮拜世尊師六彼時供養花九十四劫間惡趣吾不知是供佛果報七四種無礙解如是尊者康達莉普毘耶長老宣唱此等偈三二拘物頭瑪利耶拘物頭花鬘一壯牛勝雄者大仙勝利人善生如花絲毘婆尸大雄二由車道前來納受尊供人拘物頭花鬘採取撒與佛三彼花吾供養九十一劫間惡趣吾不知供佛此果報四四種無礙解如是尊者拘物頭瑪利耶長老宣唱此等偈攝頌阿羅伽與寶伽那伽達薩尼薩達婆普婆薩尼阿薩那薩達薩提蘭西耶康達莉與拘物頭十人共偈五十七

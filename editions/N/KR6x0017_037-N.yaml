body:
  text: 第三十七曼陀羅普毘耶品三五八耶康曼陀利耶一曼陀羅一吾來忉利天曼伽羅少年手持曼陀羅供毘婆尸佛二佛正坐靜慮花翳佛頭上先後翳七日吾去神世界三吾為供佛故九十一劫間惡趣吾不知供佛此果報四四種無礙解如是尊者耶康曼陀利耶長老宣唱此等偈三五九克伽魯普毘耶克伽魯花一夜摩天來此吉祥牛瞿曇採克伽魯花捧獻供養佛二行此供養佛九十二劫間惡趣吾不知供養佛果報三四種無礙解如是尊者克伽魯普毘耶長老宣唱此等偈三六比沙穆羅羅達耶迦蓮根蓮莖布施一普沙正覺者通一切諸法智者愛孤獨前來吾所在二勝者大慈愛吾心得淨化吾採蓮根莖布施與勝佛三彼時施蓮根九十二劫間惡趣吾不知是施蓮果報四四種無礙解如是尊者比沙穆羅羅達耶迦長老宣唱此等偈三六一克薩羅普毘耶開薩羅花一雪山山谷中吾為持明者離塵佛名大吾見彼經行二吾採克薩羅三花載頭上毘舍浮世尊吾捧花近彼三時吾行此業三十一劫間惡趣吾不知供佛此果報四四種無礙解如是尊者克薩羅普毗毘耶長老宣唱此等偈三六二安庫拉普毘耶安庫拉花一鉢頭摩覺者奇塔庫陀住佛陀自存人吾見趨近前二吾見安庫拉剪採此盛花正覺尊走近供養鉢頭摩三供養彼花故三十一劫間惡趣吾不知供養佛果報四四種無礙解如是尊者安庫拉普毘耶長老宣唱此等偈三六三迦曇婆普毘耶迦曇婆花一容貌值黃金三十二相勝黃金色佛陀走來市場間二宮殿門開放吾見世導師吾採迦曇婆供毘婆尸佛三供養彼花故九十一劫間惡趣吾不知供養佛果報四四種無礙解如是迦曇婆普毘耶長老宣唱此等偈三六四烏陀羅普毘耶烏陀羅花一阿那陀覺者住於恒伽岸吾採烏陀羅供養無敵者二供養彼花故三十一劫間惡趣吾不知供養佛果報三四種無礙解如是尊者烏陀羅普毘耶長老宣唱此等偈三六五耶康旃簸迦普庇雅一旃簸迦花一寂靜正覺尊住居山峽間手捧旃簸迦走近人中尊二吾喜心清淨雙手捧獻花供養無敵者無上辟支佛三供養彼花故三十一劫間惡趣吾不知供養佛果報四四種無礙解如是尊者耶卡旃簸迦普毘耶長老宣唱此等偈三六六提密羅普毘耶提密羅花一羌達巴迦河沿岸吾行進婆羅樹花放吾見離塵佛二吾心喜清淨辟支大牟尼採提密羅花散撒佛頭上三供養彼花故九十一劫間惡趣吾不知供養佛果報四四種無礙解如是尊者提密羅普毘耶長老宣唱此等偈三六七沙羅羅普毘耶沙羅羅花一羌達巴迦河吾為緊那羅吾見佛經行人長天中天二採沙羅羅花敬向佛布施大雄彼世尊嗅花天香味三世界稱導師正覺毘婆尸吾為常注視大雄彼嗅知四吾心喜清淨禮敬兩足尊虔敬示合掌並再登山行五供養彼花故九十一劫間惡趣吾不知供養佛果報六四種無礙解如是沙羅羅普毘耶長老宣唱此等偈攝頌曼陀羅與克伽魯比沙克薩羅普毘耶安庫拉與迦曇婆烏陀羅與旃簸迦提密羅與沙羅羅十人共偈為四十

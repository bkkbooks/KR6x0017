body:
  text: 第十九屈塔奢普毗耶品一八一屈塔奢普毗耶屈塔奢花一黃金色佛陀如朝日初升巡回眺四方直向來風路二屈塔奢花蔓識認擴伸展手折其花根捧獻普沙佛三依獻其花故九十二劫間惡趣吾不知供佛此果報四十七劫往昔三王名開花大力具七寶出為轉輪王五四種無礙解如是尊者屈塔奢普毗耶長老宣唱此等偈一八二槃豆時瓦迦一悉達多佛陀嚴身自存者深思入靜慮坐於山谷間二吾往湖最上索取水草花最後見盛花槃豆時瓦迦三兩手吾捧花拜見大牟尼清淨吾心喜捧獻悉達多四捧獻其花故九十四劫間惡趣吾不知供花此果報五十四劫往昔統主有一人其名稱海似大力轉輪王六四種無礙解如是尊者槃豆時瓦迦長老宣唱此等偈一八三庫頓巴利耶一輝如黃花樹佛坐山峽間如海洋難量如地不搖動二諸神群參拜壯牛駿馬如至人吾親近雀躍心歡喜三吾採七朵花裝花滿衣裳供獻尸棄佛世間具緣者四捧獻其花故三十一劫間惡趣吾不知供佛此果報五二十劫往昔名喚大無過大力大威力出為轉輪王六四種無礙解如是尊者庫頓巴利耶長老宣唱此等偈一八四槃奢哈提耶五手一世間居上首無上帝沙佛弟子衆隨後信步車道來二手持優鉢羅五花置四朵以施供祭物遂行為沈默三黃金色尊佛遙見來過市佛身滿光輝供養兩足尊四吾布施其花九十二劫間惡趣吾不知供佛此果報五十三劫往昔其名謂堂認大力具七寶出為轉輪王六四種無礙解如是尊者槃奢哈提耶長老宣唱此等偈一八五依西穆伽達他耶迦依西穆迦布施一升輝如朝日光明如太陽巴多穆塔拉如迦休樹光二蜜少不紺青蜜集依西果恰如高樓立吾施世緣者三彼佛弟子隨數有八十萬吾滿彼等鉢再施更多果四以心清淨故淨根所使故十萬劫之間吾不生惡趣五四萬劫往昔彼等八人王大力名地遍有為轉輪王六四種無礙解如是尊者依西穆伽達耶迦長老宣唱此等偈一八六菩提烏婆塔耶迦奉事菩提樹一蘭瑪瓦提市吾名稱小鼓無上菩提樹常作奉侍事二朝夕盡奉事淨根所使故一千八百劫吾不生惡趣三千五百劫昔吾為衆人王其名稱調御大力轉輪王四四種無礙解如是尊者菩提烏婆塔耶迦長老宣唱此等偈一八七耶伽欽提陀一思一當一神消逝壽命盡天界彼等諸神喜三聲隨口響二尊身往善趣結交彼諸人生人為善法獲得無上信三信植汝善根確立汝身堅善宣諸善法盡身命無搖四更以身善語遂行衆多善再以意為善慈愍無執著五更多行布施積福再生因激勵衆人等善法與梵行六諸神以慈愍賢如天中天彼等喜尊者幾度汝為神七爾時吾來集心擾諸神中由此吾將沒吾生何胎中八制根一沙門取知吾厭離彼欲搖吾心來至吾所居九其名須摩那巴多穆塔拉教吾義與法其時吾動搖一聆聞彼言語向佛吾心淨禮敬彼聖賢忽然吾死逝一一立地吾再生淨根所使故十萬劫往間吾不墮惡趣一二四種無礙解如是尊者耶伽欽提陀長老宣唱此等偈一八八提康尼普毗耶提康尼花一時吾生為神圍繞天女群想起前生業憶起勝佛陀二提康尼花朵手執己心淨捧獻毗婆尸人中稱長者三吾捧獻供花九十一劫間吾不知惡趣供佛此果報四七十三劫昔四人為明王大力具七寶有為轉輪王五四種無礙解如是尊者提康尼普毗耶長老宣唱此等偈一八九耶迦奢利耶一行一時三十三天轟然大聲響吾等為欲縛佛出於此世二彼等生厭離如為悲箭刺吾恃於己力赴往佛陀前三化作茲整備手持曼陀羅於其涅槃時以此捧獻佛四諸神並天女爾時向吾謝十萬劫之間吾不生惡趣五六萬劫往昔大力十六人名喚大力士出為轉輪王六四種無礙解如是尊者耶迦奢利耶長老宣唱此等偈一九提萬提普毗耶提萬提花一上座調伏者彼等作思惟大衆來吾前均非苦熱生二丹瑪達西佛彼尊之弟子名喚須難陀彼亦來吾所三事吾隨從等爾時與吾花吾手執其花獻與佛弟子四立地吾死逝不為再生來一千八百劫猶不生惡趣五千三百劫昔八人煙標幟大力具七寶出為轉輪王六四種無礙解如是尊者提萬提普毗耶長老宣唱此等偈攝頌屈塔奢與槃豆特伊庫頓巴利哈提耶依西穆伽與菩提耶伽欽提提康尼耶迦奢利提萬提十人説偈六十二

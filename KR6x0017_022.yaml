body:
  text: 第二十二哈提品二一一哈提達耶迦象施一悉達多佛陀二足尊王者吾施佛壯象牙強如大鋤二身諦最上義至無上寂處希世所有利布施佛第一三彼時行布施九十四劫間吾不知惡趣象施此果報四七十八劫昔呼為薩曼他大力十六人出為轉輪王五四種無礙解如是尊者哈提達耶迦長老宣唱此等偈二一二巴那第達耶迦草履布施一仙人棲森林長久苦行人年老積修業吾施與草履二世間居上首人中稱長者得享諸乘輿前業此果報三彼時吾行業九十一劫間惡趣吾不知草履布施果四七十七劫昔剎利八人出大力名善乘出為轉輪王五四種無礙解如是尊者巴那第達耶迦長老宣唱此等偈二一三薩奢山薩尼耶迦諦想一毗舍浮佛陀隨諸比丘衆清淨數多衆宣説諸聖諦二吾達上悲心亦赴其集會吾坐於彼處聆聞佛教法三聽取其法誡旋赴神世界天界三十劫居住彼都處四彼時吾得想三十一劫間惡趣吾不知諦想此果報五二十四劫昔大力一人王名謂一雨滴出為轉輪王六四種無礙解如是尊者薩奢山薩尼耶迦長老宣唱此等偈二一四耶迦薩尼耶迦一想一佛之糞掃衣見其挂樹梢吾敬虔合掌拜彼糞掃衣二彼時得佛想三十一劫間惡趣吾不知供佛此果報三二十五劫昔出世一人王阿彌陀大力出為轉輪王四四之無礙解如是尊者耶伽薩尼耶迦長老唱此等之偈畢二一五蘭西薩尼耶迦光線想一如朝日升輝如黃金光耀生立山峽間如猛虎壯牛二彼佛之偉大輝照山峽間於光線心淨於天樂一劫三餘經幾多劫得遂行善業吾心得淨化念佛常不斷四彼時得佛想由三萬劫數吾不知惡趣佛想此果報五五十七劫昔出世一人王大力名善生出為轉輪王六四種無礙解如是尊者蘭西薩尼耶迦長老宣唱此等偈二一六薩提陀確立一緑輝阿説他善生菩提樹就佛只一想既得思慮深二彼時得佛想三十一劫間惡趣吾不知佛想此果報三十三劫往昔有王名財求大力具七寶出為轉輪王四四種無礙解如是尊者薩提陀長老宣唱此等偈二一七達拉萬塔達耶迦團扇施一日種出帝沙吾施彼佛扇為其消暑熱亦為止火熱二消除吾貪火更消除瞋火癡火亦得消布施團扇果三燃盡幾煩惱除去所有結等正覺者教吾保最後身四彼時行此業九十二劫間惡趣吾不知施佛此果報五六十三劫昔有名為大歡大力具七寶出為轉輪王六四種無礙解如是尊者達拉萬塔達耶迦宣唱此等偈二一八阿康達薩尼耶迦步想一往昔為和尚吾持施捨衣聖書吾步習己達章區分二最上象帝沙健壯如牡牛彼受尊供物吾見離垢佛三吾展施捨衣至人信步來大雄似日升世上人中長四亦似彼明月無污照世界更以清淨心吾禮尊師足五吾施捨彼衣九十四劫間惡趣吾不知施衣此果報六三十七劫昔出世一人王名謂善歡喜大力轉輪王七四種無礙解如是尊者阿康塔薩尼耶迦長老宣唱此等偈二一九薩毗達耶迦酥布施一端坐華宮殿少女群相隨忽見病沙門引導至吾家二彼為天中天吾侍彼大雄大仙悉達多吾施彼酥油三顏面諸根淨見佛靜來車吾禮尊師足酥油灌其鉢四見佛吾心淨彼得神足通大雄騰空去行空如鵝王五彼時吾布施九十四劫間惡趣吾不知布施酥油果六十七劫往昔其名謂輝天大力具七寶出為轉輪王七四種無礙解如是尊者薩毗達耶迦長老宣唱此等偈二二巴巴尼瓦利耶抑惡一毗耶達西佛吾清經行處以蘆覆其頂以障風熱物二以為避犯惡唯善得具足為捨衆煩惱心勤尊師教三十一劫往昔名高謂火天大力具七寶出為轉輪王四四種無礙解如是尊者巴巴尼瓦利耶長老宣唱此等偈攝頌哈提達與巴那第薩奢耶伽薩尼蘭西薩提陀達拉萬塔阿康達薩尼薩毗巴巴尼瓦利十人共偈五十四

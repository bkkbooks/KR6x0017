body:
  text: 第二十達瑪羅普毘耶品一九一塔瑪拉普毘耶塔瑪拉花一八萬四千宮立柱黃金造宮殿似神杖是吾巧精建二塔瑪拉花朶執覺心清淨捧獻尸棄佛世界具緣者三依時此善業三十一劫間惡趣吾不知供佛此果報四二十劫往昔名喚月滿足大力具七寶出為轉輪王五四種無礙解如是尊者塔瑪拉普毘耶長老宣唱此等偈一九二提那山塔拉達耶迦草蓆布施一林棲有仙人為師割雜草凡來其地者集眾而右繞二吾取其草來展敷上總持草上多羅葉時亦持將來三以草作覆蓋施悉達多佛此為師人天翳遮七日間四於彼施草故九十四劫間惡趣吾不知施草此果報五六十五劫昔四人名大財大力具七寶有為轉輪王六四種無礙解如是尊者提那山塔拉達耶迦長老宣唱此等偈一九三堪達普利耶毀壞一普沙佛塔婆位於大林中時為諸象毀處其樹木生二無平為不平吾施泥灰漿三界師尊佛諸德思滿足三彼時作此業九十二劫間惡趣吾不知施泥漿果報四七十七劫昔勝軍十六人大力具七寶有為轉輪王五四種無礙解如是尊者堪達普利耶長老宣唱此等偈一九四阿輸迦普奢迦阿輸迦供養一美都低彌羅市中有王苑於彼吾守苑身為事王者二光輝自存尊稱名鉢頭摩芬陀利迦樹牟尼坐其下三阿輸迦花開美麗簇重疊吾捧此花獻最勝草供佛四依此捧供花九十四劫間惡趣吾不知供佛此果報五七十劫往昔日棄十六人大力具七寶有為轉輪王六四種無礙解如是尊者阿輸迦普奢迦長老宣唱此等偈一九五安庫拉迦一安庫拉樹花蔓展勝華鬘吾手折其花即赴佛座前二悉達多佛陀大牟尼退坐吾侍瞬時間窟中撒其花三依供樹花故九十四劫間惡趣吾不知供佛此果報四三十六劫昔一人天雷鳴大力具七寶出為轉輪王五四種無礙解如是尊者安庫拉伽長老宣唱此等偈一九六奇薩羅耶普奢伽幼芽供養一豆窪羅瓦提市中飾草花彼處有水井樹草生其處二自己恃耐力無敵悉達多佛為憐愍吾請直風路來三相應供大仙吾不見他物阿輸迦幼芽投向虛空中四由佛行路後彼芽隨佛行時見彼神通佛實真偉大五供獻此幼芽九十四劫間惡趣吾不知供佛此果報六三十七劫昔一人名一音大力具七寶出為轉輪王七四種無礙解如是尊者奇薩羅耶普奢伽長老宣唱此等偈一九七鎮頭迦達耶迦鎮頭迦布施一吾行山險路力強足疾猿鎮頭迦果熟憶起尊勝佛二採置數日後吾尋世導師清淨心內喜斷三界苦人三無上悉達多佛知吾意願漏盡等千人請來吾面前四吾手持喜果接近尊師前言說殊勝佛一切知者受五依時施果故九十四劫間吾不知惡趣施果此果報六五十七劫昔有優波難陀大力具七寶出為轉輪王七四種無礙解如是尊者鎮頭迦達耶迦長老宣唱此等偈一九八穆提普奢迦一掘供養一世間居上首須彌陀世尊勝者勵精進憐愍卑賤人二彼人震世間兩足尊王者吉利奈拉花一束捧獻佛三吾心得清淨淨根所使故三萬劫之間吾不生惡趣四二千三百劫有善無過王大力具七寶出為一人王五四種無礙解如是尊者穆提普奢迦長老宣唱此等偈一九九提堪達普毘耶提堪第花一須曼伽拉佛自存無等倫彼由斜谷出勝者入市來二乞食行巡迴牟尼由城出佛實辨所作居住森林間三提堪第花朶吾執捧獻佛清淨吾心喜大仙自存者四自捧此花供九十四劫間惡趣吾不知供佛此果報五八十六劫昔阿比羅毘耶大力具七寶出為轉輪王六四種無礙解如是尊者提堪達普毘耶長老宣唱此等偈二優提普毘耶素馨花一巴多穆塔拉受尊供物人彼由斜谷出具眼往精舍二兩手持最上此素馨之花捧獻如是人憐愍慈心佛三欣幸有多福其心清淨故十萬劫之間吾不生惡趣四五十劫往昔其名喚集喜人王有一人大力轉輪王五四種無礙解如是尊者優提普毘耶長老宣唱此等偈攝頌塔瑪利與提那山堪達普與阿輸迦安庫拉迦奇薩羅鎮頭迦與穆提普提堪達與優提迦十人共偈五十八十品攝頌比伽達巴利瓦羅世雷耶與輸毘多奢達與槃多吉瓦須波離奢利耶品拘物頭與屈塔奢達瑪羅迦第十品其偈於此為六百更有六十六偈頌比伽達品十組第二之百人畢

body:
  text: 第七薩伽質塔尼耶品六一薩伽質塔尼耶己心一響杳無煩擾山傾見叢林如仙者漫步見受尊供人二吾作砂塔婆布撒種種花所作禮塔婆如向正覺尊三具足七寶王王國之統主己業方成滿供養塔婆報四時吾供獻花九十一劫間吾不知惡趣供養塔婆果五八十劫之昔吾為轉輪王具足七種寶統為四洲王六四種無礙解如是尊者薩伽質塔尼耶長老宣唱此等偈六二阿渥普毗耶阿渥花一佛說明四諦宣示不死句由其精舍出立於經行處二尸棄佛示語尊佛使吾悟手執種種花布撒於空中三依此殊勝業人長兩足尊勝敗皆捨棄吾達不動位四彼時獻鮮花三十一劫間惡趣吾不知供花之果報五二十劫之昔剎利須彌陀大力具七寶出為轉輪王六四種無礙解如是尊者阿渥普庇耶長老宣唱此等偈六三巴奢伽瑪尼耶回歸一信度河之畔吾為郭公鳥覓食塞瓦拉慎不為諸惡二得見離塵佛風之直道來口銜娑羅花獻毗婆尸佛三如來正信其不動堅固者依彼心之淨得不墮惡趣四吾於尊佛前誠謹為善行吾為空翔鳥吾善蒔播種五彼時吾獻花九十一劫間惡趣吾不知供佛斷果報六稱名善愛見同名有八人十七劫之昔大力為輪王七四種無礙解如是尊者巴奢伽瑪尼耶長老宣唱此等偈六四帕拉帕薩達迦他起信一黃金正覺尊勝利大仙人壯牛勝雄者誰見不起信二無際如雪山難渡如大海實佛之禪定誰見不起信三大地實難量美麗為森飾實佛其淨戒誰見不起信四直風不搖道蒼空不可量實佛其智慧誰見不起信五此等四種偈世那婆羅門無敵殊勝佛讚佛悉達多六九十四劫間不生惡趣事盡多為善趣吾享無虧樂七讚世界導師九十四劫間吾不知惡趣讚佛此果報八十四劫之昔烏伽達四人大力具七寶出為轉輪王九四種無礙解如是尊者帕拉帕薩達伽長老宣唱此等偈六五比薩達耶迦蓮根布施一名稱毗舍浮諸仙中第三入於森林中人中勝者住二吾持蓮華根趨赴佛陀前清信吾合掌向佛行布施三覺者毗舍浮援手親接受吾不知安樂何處有殊勝四吾或最後來一切有結除如棲森大象善業吾蒔種五彼時依積業三十一劫間吾不知惡趣布施蓮根果六薩摩達那名十六人王出十三劫往昔大力轉輪王七四種無礙解如是尊者比薩達耶迦長老宣唱此等偈六六斯欽提陀善考一吾行山難路生為尊獅子獵殺諸獸群吾住山峽間二阿塔達西佛言說之勝者彼來殊勝山動搖吾心意三吾殺斑點鹿趨近吾將食佛恰於此時乞食行近吾四吾持最上肉將施與尊師大雄者欣喜當時吾心淨五依此淨信心走入山難路湧出喜悅心就地吾死逝六由此肉布施更依時心願千五百劫間享樂神世界七其餘劫之間吾多積善業實此肉布施更依觀想佛八三十八劫昔長壽有八人六十劫往昔二人婆留那九四種無礙解如是尊者斯欽提陀長老宣唱此等偈六七瓦塔達耶迦衣施一彼等吾為鳥迦樓金翅鳥飛往香醉山得見離塵佛二吾棄迦樓羅扮為年少者向彼兩足尊布施一件衣三世間導師佛欣然受吾衣尊師立空中為說次一偈四由此衣布施更依汝心願棄迦樓羅身享樂神世界五世間居上首阿塔達西佛讚歎衣布施指向北方去六何處吾再生衣常皆滿足蔽日覆大空施衣此果報七七人名太陽大力轉輪王三十六劫昔曾為諸人王八四種無礙解如是尊者瓦塔達耶迦長老宣唱此等偈六八菴婆達耶迦菴婆布施一阿諾瑪達西坐於山峽間心滿無執著慈心待世人二時吾為彌猴秀岩之雪山吾見阿諸瑪至心信仰佛三雪山路不遠爾時菴婆熟從樹採其果布施蜜菴婆四阿諾瑪達西佛為我預言依此蜜布施乃至菴婆施五從今五十劫享樂神世界餘劫生人天混而彼流轉六得悟機成熟放棄其惡業彼往惡趣後燒滅衆煩惱七以正法自制順從彼大仙勝敗皆捨棄達於不動地八七十七劫昔名菴婆核生大力十四人出為轉輪王九四種無礙解如是尊者菴婆達耶迦長老宣唱此等偈六九須摩那善意一吾名須摩那為作華鬘者得見離塵佛受我尊供物二鮮花心悅適兩手吾持花奉獻尸棄佛世間有緣者三由此花供養更依內心願吾不知惡趣乃供佛果報四以供鮮花故三十一劫間吾不知惡趣供佛此果報五二十六劫昔名高十四人具足七種寶出為轉輪王六四種無礙解如是尊者須摩那長老宣唱此等偈七普帕將哥提耶花籠一無畏如獅子擬似金翅鳥壯如虎牡牛生如尊獅子二非欲心無敵歸依尸棄佛比丘衆等隨最勝沙門坐三無上阿諾迦容入花籃內花籃與花束殊撒向佛陀四依吾淨信心人長兩足尊勝敗皆捨棄吾達不動位五爾時作善業三十一劫問吾不知惡趣供佛此果報六三十劫往昔持名為神現五人具七寶出為轉輪王七四種無礙解如是尊者普帕將哥提耶長老宣唱此等偈攝頌薩伽質塔阿渥普巴奢布西伽瑪那帕拉帕薩比薩達斯欽提與瓦塔達菴婆達與須摩那普帕將哥提雅得見真義共十人說偈總有七十一

body:
  text: 第三十五耶卡鉢頭密耶品三三八耶卡鉢頭密耶一蓮華一巴多穆塔拉彼通一切法說明有非有度脫衆多人二時吾為鵝王鳥類之勝者吾飛入湖中鵝鳥遊戲樂三巴多穆塔拉善逝世間解彼受尊供物時時來湖上四天中天之佛吾見世導師七葉蓮華莖截蓮心適悅五吾嘴銜蓮華淨心向導師蓮華投空上供養勝佛陀六巴多穆塔拉受尊供物佛尊師空中立向吾示謝辭七持此一蓮華更依汝心願十萬劫之間汝不往惡趣八斯語正覺尊稱最上水草稱讚吾行業如欲而離此九時吾行此業從此十萬劫惡趣吾不知供佛此果報一四種無礙解如是尊者耶卡婆多密耶長老宣唱此等偈三三九提努鉢羅摩利耶三優鉢羅華鬘一羌達巴伽河時作岸邊猿吾居山峽間吾見離塵佛二娑羅樹王花開放十方輝三十二相具八十隨形好吾見佛世尊內心甚歡喜三內喜心高揚心躍為歡喜三朵優鉢羅採而捧頭上四毗婆尸大仙吾捧三花獻深摯敬佛後指向北方去五謹以清淨心屈身此離去岩間吾墮落壽命至而終六行此善業故更依淨心願棄離此人身吾往忉利天七其後三百度吾統神世界又經五百度吾為轉輪王八供養彼花故九十一劫間惡趣吾不知供佛此果報九四種無礙解如是尊者提努鉢羅摩利耶長老宣唱此等偈三四達伽達耶迦幡布施一世間居上首帝沙佛世尊滅卻三執著見彼吾供幡二吾行此善業更依心中願棄去此人身吾趣忉利天三其後三百度統領神世界五百度之間亦做轉輪王四此量不得盡統理廣國土昔日己所為得享善業果五彼時吾作業九十二劫間惡趣吾不知施幡此果報六今日吾何欲山林茂盛共應以麻布覆吾作果報時七四種無礙解如是尊者達伽達耶迦長老宣唱此等偈三四一提尼欽伽尼伽普迦卡三欽伽尼伽供養一雪山路不遠普陀伽那山吾見樹梢上展掛糞掃衣二欽伽尼伽花吾採剪三朵雀躍內心喜供養糞掃衣三彼時行此業九十一劫間惡趣吾不知三朵花果報四四種無礙解如是尊者提尼欽伽尼伽普迦卡長老宣唱此等偈三四二那羅伽利迦蘆屋一雪山不遠處有哈利陀山其時那羅陀名謂居樹蔭二吾營造蘆屋上以草覆葺清掃經行處供施自存人三十有四劫間享樂神世界更七十四度統領神世界四更七十七度吾為轉輪王此量難得盡統御廣國土五吾居所高聳猶似因陀杖千柱無類比宮殿光輝煌六淨根所使故享二無虧樂瞿曇佛之教秉受吾出家七精進致專念心靜無執著似龍象斷縛安住得無漏八四種無礙解如是尊者那羅伽利迦長老宣唱此等偈三四三旃簸迦普毗耶旃簸迦花一雪山不遠處有佉瓦羅山須陀蘇那佛住於山峽間二吾採雪山花行空雲端上吾見離塵佛漏盡渡瀑流三七旃巴迦花頂戴於頭上吾供獻與佛大仙自存人四供養彼花故三十一劫間惡趣吾不知供佛此果報五四種無礙解如是尊者旃簸迦普毗耶長老宣唱此等偈三四四鉢頭摩普迦卡鉢頭摩供養一雪山不遠處有羅摩沙山薩婆瓦佛陀爾時住空地二吾由居所出捧鉢頭摩花持此一朵花親近彼再生三供養彼花故九十一劫間惡趣吾不知供佛此果報四四種無礙解如是尊者鉢頭摩普迦卡長老宣唱此等偈第十三誦品三四五提那穆提達耶迦草一握布施一雪山路不遠有蘭波迦山塢波底沙佛時空地經行二吾昔為獵人倣徨茂林中吾見無敵者天中天自存三內喜心清淨吾時為大仙曾為供佛坐施與草一握四供施天中天內心愈清淨禮正覺尊後指向北方去五去此不遠處獸王擋去路吾為獅所仆當場即死逝六勝佛無漏人吾為座行業善放疾速箭即往神世界七化作福業故彼樓閣輝煌千箭柄百珠飾旗黃金造八如太陽初升放射展光輝天女等圍繞衆多之愛樂九於彼神界沒淨根所使故歸來人間界遂即達漏盡一布施座席故九十四劫間惡趣吾不知草一握果報一一四種無礙解如是尊者提那穆提達耶迦長老宣唱此等偈三四六鎮頭伽波羅達耶迦鎮頭迦果布施一輝如黃花樹坐於山峽間吾見離塵佛漏盡渡瀑流二見鎮頭迦果截去有端者內喜心清淨供施毗舍浮三彼時施果故九十一劫間惡趣吾不知施樹此果報四四種無礙解如是尊者鎮頭迦波羅達耶迦長老宣唱此等偈三四七耶康迦利耶一合掌一羅摩沙佛陀爾時住河岸光輝如黃金吾見離塵佛二朅地羅炭火鍊金鍛冶爐又如月映照吾向彼合掌三謹此合掌故九十四劫間惡趣吾不知合掌此果報四四種無礙解如是尊者耶堪迦利耶長老宣唱此等偈攝頌鉢頭摩與優鉢羅達伽達欽伽尼伽那羅伽利旃簸迦鉢頭摩與穆提達鎮頭迦與耶康迦十人共偈六十六

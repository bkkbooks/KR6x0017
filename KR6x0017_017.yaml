body:
  text: 第十七須波離奢利耶一六一須波離奢利耶善崇敬一稱名鉢頭摩兩足之尊者由山傾斜出說法具眼者二大仙不遠處衆多夜叉集彼等認知佛己達所當作三聞不死教法領會佛所言心淨吾欣喜彈指以承侍四吾承侍尊師見清淨果報三萬劫之間吾不生惡趣五千九百劫昔其名喚莊嚴大力具七寶出為轉輪王六四種無礙解如是尊者須波離奢利耶長老宣唱此偈一六二迦那耶羅普毗耶迦那耶羅花一悉達多世尊善逝世間解衆多弟子隨行步來城中二吾為王守護宮中受尊敬走近樓閣上眼見世導師三迦那耶羅花撒向比丘衆更撒彼佛陀善撒於其花四吾供養花朵九十四劫間惡趣吾不知供花此果報五八十七劫昔四王大威力大力具七寶出為轉輪王六四種無礙解如是尊者迦那耶羅普毗耶長老宣唱此等偈一六三格奢伽達耶迦堅果布施一向世尊帝沙吾昔施樹果那利薊羅施堅實高貴果二帝沙佛大仙吾施彼世尊如願吾再生如想得快樂三彼時布施故九十二劫間惡趣吾不知施果此果報四十三劫往昔吾為帝似王大力具七寶出為轉輪王五四種無礙解如是尊者格奢卡伽達耶迦長老宣唱此等偈一六四提薩普奢伽處供養一阿塔達西佛世間居上首彼佛騰空去往直風路行二尊師騰空行彼大仙足停彼處吾合掌清信施供養三吾見大牟尼從此千八劫惡趣吾不知供養處果報四一千百劫昔名謂牛善生大力具七寶出為轉輪王五四種無礙解如是尊者提薩普奢伽長老宣唱此等偈一六五伽尼伽拉奢達尼耶伽尼伽拉之繖蓋一正覺毗舍浮世間居上首由白晝居所移入大森林二伽尼伽拉花採摘作繖蓋並作花鬘覆以此捧獻佛三依此獻供花三十一劫間惡趣吾不知供佛此果報四二十劫往昔八王黃金光大力具七寶出為轉輪王五四種無礙解如是尊者伽尼伽拉普毗耶長者宣唱此等偈一六六薩毗達耶迦酥布施一世尊名普沙受尊供物人雄者往行道清淨衆多人二世尊次第行近至吾邊傍吾受其鉢陀盛酥油施佛三爾時施酥故九十二劫間惡趣吾不知施酥油果報四五十六劫昔有名等水王大力具七寶出為轉輪王五四種無礙解如是尊者薩毗達耶迦長老宣唱此等偈一六七優提迦普毗耶素馨花一羌達巴伽河吾沿岸邊行迎見自存人如娑羅樹花二吾持素馨花拜見大牟尼清淨心內喜吾捧花獻佛三依此花供養九十四劫間惡趣吾不知供佛此果報四六十七劫昔一人名濟出大力具七寶出為轉輪王五四種無礙解如是尊者優提迦普毗耶長老宣唱此等偈一六八睹薩達耶迦布布施一低彌羅市盛時吾為王子吾得於供獻布施靜安人二世尊容吾意以手觸施衣佛陀納衣後騰上高空去三如是自佛去施布後追逐吾心忽清淨佛為最上人四爾時施布故九十四劫間惡趣吾不知施布此果報五六十七劫昔吾為轉輪王得名稱清淨力偉大人王六四種無礙解如是尊者睹薩達耶迦長老宣唱此等偈一六九薩瑪達巴迦訓示一盤頭摩帝市同業大聚會吾為會頭主彼等奉事吾二召集彼大衆期造增福業華鬘施僧團作無上福田三彼等然允諾遵從吾意願衆人備華鬘布施毗婆尸四依此華鬘施九十一劫間惡趣吾不知施華鬘果報五五十九劫昔出一人中主大力名花環出為轉輪王六四種無礙解如是尊者薩瑪達巴迦長老宣唱此等偈一七槃奢古利耶五指印一有佛名帝沙世尊大牟尼適香殿住居住此彼牟尼二吾持香華鬘往詣尊者前如不信正覺吾施五指印三彼時捧香故從此九二劫吾不知惡趣施五指印果四七十二劫昔有王名自照大力具七寶出為轉輪王五四種無礙解如是尊者槃古利耶長老宣唱此等偈攝頌須波離迦那耶羅格奢迦提薩普伽伽尼伽拉薩毗達優提迦普睹薩達瑪拉槃奢古利耶十人共偈五十四偈

body:
  text: 第三十九阿萬陀婆羅品三七八阿萬陀婆羅達耶迦阿萬陀果布施一薩塔蘭西佛無敵自存者孤獨正覺尊乞食而出行二適吾持樹果人中長者近吾喜心清淨供施阿萬果三吾施樹果故九十四劫間惡趣吾不知布施樹果報四吾實適其時五燃盡衆煩惱六四種無礙解如是尊者阿萬陀婆羅達耶迦長老宣唱此等偈三七九拉布迦婆羅達耶迦拉普迦果布施一盤頭摩帝城時吾為園丁得見離塵佛直風由路來二拉布迦樹果捧持施尊佛具大名聲者空中受吾果三吾受生榮華帶來現世樂更以清淨心樹果施與佛四彼時吾大喜既得最上樂此處與彼處再生亦寶貴五彼時施樹果九十一劫後惡趣吾不知布施樹果報六吾實適其時七燃盡衆煩惱八四種無礙解如是尊者拉布迦婆羅達耶迦長老宣唱此等偈三八烏曇跋羅婆羅達耶迦烏曇跋羅果布施一威那陀河岸人中尊者住吾見離塵佛安靜心顛定二滌穢煩惱者仰對吾淨意烏曇跋羅果取以供施佛三彼時施樹果九十一劫後惡趣吾不知布施樹果報四吾實適其時五燃盡衆煩惱六四種無礙解如是尊者烏曇跋羅婆羅達耶迦長老宣唱此等偈三八一毗拉伽婆羅達耶迦無花果布施一阿塔達西佛見佛在林邊吾喜心清淨供施無花果二彼時施果故一千八百劫惡趣吾不知布施樹果報三吾實適其時四燃盡衆煩惱五四種無礙解如是尊者毗拉伽婆羅達耶迦長老宣唱此等偈三八二婆魯薩婆羅達耶迦婆羅薩果布施一金色正覺尊受尊供物人走進來車道吾施婆魯薩二供施樹果已九十一劫後惡趣吾不知供樹此果報三吾實適其時四燃盡衆煩惱五四種無礙解如是尊者婆魯薩婆羅達耶迦長老宣唱此等偈三八三瓦利婆羅達耶迦蔓草之果布施一一切衆人集爾時來林中彼等乞樹果其時得樹果二吾見正覺尊無敵自存人心清淨吾喜供施蔓草果三彼時施樹果三十一劫後惡趣吾不知供樹此果報四吾實適其時五燃盡衆煩惱六四種無礙解如是尊者瓦利婆羅達耶迦長老宣唱此等偈三八四伽達莉婆羅達耶迦芭蕉一輝如黃花樹十五夜之月吾見世導師光明如燭台二吾採芭蕉果布施與尊師心清淨吾喜禮佛即離去三彼時施樹果三十一劫後惡趣吾不知布施樹果報四吾實適其時五燃盡衆煩惱六四種無礙解如是尊者加達莉婆羅達耶迦長老宣唱此等偈三八五半娜娑婆羅達耶迦半娜娑果布施一阿糾那覺者爾時住雪山彼佛具正行靜慮勝牟尼二壺大半娜娑耆婆耆婆迦置於傘蓋上供施與尊師三彼時施樹果三十一劫後惡趣吾不知布施樹果報四吾實適其時五燃盡衆煩惱六四種無礙解如是尊者半娜娑婆羅達耶迦長老宣唱此等偈三八六室縷拏俱胝頻設二十億耳一聞毗婆尸佛四方僧伽集盤頭摩帝城吾作一岩窟二岩窟地面上吾敷幾多布內喜心高揚彼時即發願三正覺尊歡喜令吾得出家吾達最上寂無上之寂滅四實吾淨根故九十劫流轉為神或為人積得福業輝五依吾殘餘業此世最後生瞻波城商主吾生為其子六彼聞吾出生滿吾父願望草億財無缺授子豫之吾七時吾兩足底生長四指毛細軟感觸良光輝無類比八既逾九十劫其上更一劫地上無敷物吾無知下足九正覺尊歡喜出家為無家寂靜成寂滅達阿羅漢位一精勤最勝者一切見者説漏盡阿羅漢六通大威力一一彼時行布施九十一劫後惡趣吾不知布施岩窟果一二吾實適其時一三燃盡衆煩惱一四四種無礙解俱胝頻設謂彼室縷拏於比丘僧團前説明所問各問題於阿耨達之大池邊如是尊者室縷拏俱胝頻設長老宣唱此等偈三八七普婆康摩毗樓提前業斷片一近阿耨達池岩地心悅愈衆寶皆輝煌林中又多香二世界導師來與大比丘衆佛於彼處坐自説衆前業三比丘聽吾説吾昔所作業僅以片布業果熟成佛位四吾昔幾多生曾為一惡人穆那利吾向辟支佛須羅比無罪陷彼罪五及至業果熟地獄永輪回數千年之間經歷中苦味六乃至殘餘業受此最後生孫陀利女故吾陷無實罪七一切勝過佛弟子名難陀為陷彼於罪地獄吾輪回八經歷一萬劫地獄長輪回今幸得人身猶陷無辜罪九及此殘餘業有名旃遮女衆多人面前以陷無辜罪一昔為婆羅門吾受尊供養五百弟子等林中説聖書一一彼處仙人群威力具五通吾見彼前來無辜陷其罪一二吾語弟子等此仙人耽愛吾説此妄語青年弟子喜一三時諸弟子等乞食往諸家衆多人皆言此仙人耽愛一四今此業既熟有五百比丘孫陀利女故諸陷無辜罪一五昔日母兄弟因財殺二人以岩石摧毀將彼投山中一六其業既已熟提婆達投石小岩石斷片摧傷吾足指一七昔吾為青年遊戲大道中吾見辟支佛陶片置道上一八吾業既成熟此世最後生提婆達多害遣凶來殺吾一九昔吾乘大象見彼辟支佛乞食彼行路驅象加危害二其業既成熟那羅祇梨象耆梨跋提市狂象加害吾二一昔為王步行以槍殺他人其業既成熟吾受地獄煮二二此業殘餘故一部為所壞不正足之皮實乃業不失二三昔在漁夫村嘗為少漁夫吾見被殺魚心中生歡喜二四其業既成熟吾見毗琉璃王殺釋迦族使吾感頭痛二五昔有普沙佛吾罵佛弟子汝等應食麥勿再食米食二六其業既成熟三月吾食麥彼時住地方招吾婆羅門二七人人為角力阻礙末羅子吾業既成熟使吾背疼痛二八昔吾為醫師令商子患痢其業既成熟吾為下痢苦二九昔吾名光護吾語迦葉佛何處剃髮者開悟最難得三其業既成熟吾嘗衆多苦拜火逾六年最後吾達悟三一吾行容易道不得大菩提吾為昔業制求經惡道行三二善惡之業消一切苦痛除無憂亦無擾無漏吾寂滅三三比丘僧團前勝者如是説阿耨達池邊佛得諸通力如是世尊自身昔日所為之前業斷片説示佛之譬喻法門攝頌阿萬陀與拉布迦烏曇跋羅毗拉伽婆魯薩瓦利婆羅伽達莉與半娜娑室縷拏俱胝頻設更有人仙之譬喻普婆康摩毗樓提十人共偈九十一

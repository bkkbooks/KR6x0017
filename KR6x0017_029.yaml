body:
  text: 第二十九般那陀耶迦品二八一般那陀耶迦葉施一吾坐樹葉庵維生食樹葉彼大仙到來來近吾居時二悉達多佛陀一切世醫師佛坐樹葉庵吾施樹之葉三彼時吾施葉九十四劫間惡趣吾不知施葉此果報四四種無礙解如是尊者般那陀耶迦長老宣唱此等偈二八二巴拉達耶迦果施一彼似須彌山亦擬撑大地佛由定中起乞食來吾前二訶梨勒果施阿摩勒菴婆閻浮毗醯勒大棗與胡桃貝拉頗留沙皆為樹之果三悉達多佛陀慈愍諸世界吾以清淨心布施諸樹果四彼時施果故九十四劫間惡趣吾不知施果此果報五五十七劫昔王名耶卡迦大力具七寶出為轉輪王六四種無礙解如是尊者巴拉達耶迦長老宣唱此等偈二八三巴秋伽瑪尼耶迎對一倣徨如林獅壯牛與駿馬光輝如雞冠人中之尊來二悉達多佛陀一切世醫師謹以清淨心吾與迎佛陀三迎對人中尊九十四劫間吾不知惡趣迎對之果報四二十七劫昔出世一君王名謂具隨衆大力轉輪王五四種無礙解如是尊者巴秋伽瑪尼耶長老宣唱此等偈二八四耶康普毗耶一花一爾時吾為鬼都城南門棲吾見離塵佛光輝如黃金二最上毗婆尸希利諸世界謹以清淨心施彼一枝花三彼時施花故九十一劫間惡趣吾不知供佛此果報四四種無礙解如是尊者耶康普毗耶長老宣唱此等偈二八五瑪伽瓦普毗耶瑪伽瓦花一耐秣陀河岸自存人無敵彼入深靜慮清淨無煩擾二正覺無敵者清信吾瞻仰吾以瑪伽瓦花供養自存者三彼時供花故九十一劫間惡趣吾不知供佛此果報四四種無礙解如是尊者瑪伽瓦普毗耶長老宣唱此等偈二八六烏巴達耶迦侍僕一步行車道來受納尊供物兩足王大護世界人中尊二悉達多大仙吾施與侍僕帝利諸世界稱名佛世尊三正覺尊納受牟尼再授吾即由其座起指向東方去四彼時施僕故九十四劫間惡趣吾不知施僕此果報五五十七劫昔有名曰強軍大力具七寶出為轉輪王六四種無礙解如是尊者烏巴達耶迦長老宣唱此等偈二八七阿巴達尼耶譬喻一吾讚佛譬喻善逝彼大仙以己手清信頭面拜佛足二吾讚佛譬喻九十二劫間惡趣吾不知讚歎此果報三四種無礙解如是尊者阿巴達尼耶長老宣唱此等偈二八八薩他哈帕巴吉陀七日出家一毗婆尸佛陀常為僧伽尊吾嘗遭不幸親族分離時二為鎮此不幸毅然吾出家希受尊師教七日吾快樂三彼時出家故九十一劫間惡趣吾不知出家此果報四六十七劫昔君王有七人人知善出離大力轉輪王五四種無礙解如是尊者薩他哈帕巴吉陀長老宣唱此等偈二八九弗多巴達耶迦佛侍僕一爾時吾之父名威坦巴利吾父執吾手導往大仙前二世間大導師定吾為侍僕清信吾審慎親手為侍役三彼時崇諸佛三十一劫間惡趣吾不知侍役此果報四二十三劫昔大力有四王名沙門侍僕出為轉輪王五四種無礙解如是尊者弗多巴達耶迦長老宣唱此等偈二九普般伽瑪尼耶先驅一其數八萬四無污者出家得最上義人吾為先驅者二有欲我執者審慎起清信清淨無煩擾親手為侍奉三漏盡滅貪瞋所作皆已辦自存無敵者彼等滿慈心四正覺者等前吾侍思慮深時吾死時至吾至天界上五彼時吾守戒九十四劫間惡趣吾不知自制此果報六四種無礙解如是尊者普般伽瑪尼耶長老宣唱此等偈攝頌般那與巴拉巴秋郁迦爾耶耶康普毗瑪伽瓦烏巴達迦阿巴達那薩他哈扳扳奢弗多巴普般伽瑪十人共偈四十八

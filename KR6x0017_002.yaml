body:
  text: 第二西哈薩那品一一西哈薩那達耶伽獅子座布施一教主兩足尊悉達多佛滅擴展佛教法教化多人知二清淨心內喜吾作獅子座獅子座作已並作置足台三降雨獅子座吾為建屋舍清淨心之故吾生兜率天四華美造宮殿十四由旬寬長達二十四吾居住其間五七千天女等常圍繞於吾美造黃金椅吾坐於宮內六具備神之車象馬各所曳轎輿高台閣隨欲可生來七摩尼椅子外有堅材座椅布施獅子座吾得此果報八黃金白銀造水晶毗琉璃吾登置足台布施之果報九彼時積業因九十四劫間吾不知惡趣福業得此果一七十三劫昔三人因陀羅七十二劫昔三人須摩那佛侍者一一今正七十劫三人婆留那轉輪王具足七種寶統領四洲王一二四種無礙解及證八解脫吾得六神通吾行佛教法如是尊者錫哈薩那達耶伽長老宣唱此等偈一二耶伽檀毗伽一柱一悉達薄伽梵擁有多數衆彼等歸命佛亦信樂如來二衆集相計議為師作華鬘然無一柱懸倣徨於森林三吾識遇林中爾時近彼衆深敬吾合掌吾問於大衆四有德優婆塞承問回答吾彼欲作香華鬘不得一懸柱五吾與爾一柱吾施與尊師吾運此一柱汝等且恬靜六彼等受吾柱信樂且歡喜由此吾回返歸來己家中七衆人去不久嗣時吾施柱最初吾建立雀躍內心喜八以此淨心故生來於天宮所居甚高聳其高為百層九衆多鼓鳴響時常吾所樂五十五劫昔耶輸陀羅王一彼處吾居所其聳為七層心質好一柱華美樓閣具一一二十一劫昔為優陀延王彼處吾住居其高亦七層一二諸神與人間吾均生入胎如斯諸享樂施一柱果報一三當時因施柱九十四劫間吾不知惡趣施柱之果報一四四種無礙解及證八解脫吾得六神通吾行佛教法如是尊者耶伽檀毗伽長老宣唱此等偈一三難陀有喜一巴多穆塔拉為世之上首自存佛大仙吾施最上衣二最勝水中草佛為吾授記依此布施衣爾色將為白三善根所迫使享二無虧樂於彼瞿曇佛汝將為其弟四浸欲而好樂諸愛汝執著為佛所化迫由是汝出家五彼處汝出家善根迫使故諸漏皆正知無漏證涅槃六七萬劫往昔有四人衣王六萬劫往昔有近衣四人七五萬劫往昔有稱四人衣具足七種寶為四洲之主八四種無礙解及證八解脫吾得六神通吾行佛教法如是尊者難陀長老宣唱此等偈一四周羅槃陀小路一巴多穆塔拉殊勝受供者隨衆為近侍時住於雪山二爾時吾亦住雪山之仙處大雄來不久吾近世導師三手執花傘蓋親近人中長佛浸於靜慮吾暫為妨礙四雙手執傘蓋吾向佛布施世尊大牟尼請受吾供養五諸神皆內喜來至彼雪山稱謝具眼者彼等齊喝彩六諸神語此後彼等近至人最上蓮華傘為之支空中七手執蓮華傘布施吾行者吾將稱其人傾耳聽吾言八二十五劫間彼將統神國三十四度中彼為轉輪王九諸神與人間轉生任何胎彼立戶外時蓮華傘遮蓋一十萬劫之後出生甘蔗族稱為瞿曇姓出世為尊師一一佛宣此言時彼己在人間造作如意身彼為最上者一二二人之兄弟共稱槃陀名身諦最上義光輝佛教法一三至十八歲時出家為無家釋迦聖子教吾未見異相一四吾素愚行程嘗受人蔑視吾兄閉吾出使去己家中一五於伽藍門樓被閉吾不出盼望成沙門絶意立彼處一六尊師來其處撫摩吾之頭以腕提抱吾入於伽藍中一七尊師憐愍吾賜吾拭足布如斯立片邊使吾得清淨一八佛執吾之手蓮華吾想起立即心解脫位達阿羅漢一九如意作吾身一切得究竟諸漏皆正知吾住於無漏二四種無礙解及證八解脫吾得六神通吾行佛教法如是周羅槃陀長老宣唱此等偈一五畢鄰陀婆蹉一救主人中尊須彌陀寂滅內心喜清淨吾供養塔婆二威力具六通漏盡諸人衆群集於彼處吾作僧團食三爾時須彌陀隨居有侍者稱名須彌陀內心抱喜悅四以此淨心故得生於天宮天女八萬四使吾為享樂五唯吾天女等一切愛相隨凌駕他諸天此福業果報六二十五劫昔婆留那剎利施我清淨食時吾為輪王七人人不種植亦不用鋤耕不耕有米實人人自得食八彼處統國後吾再往天界爾時吾再生有幸斯富財九親友與非友不害生物吾我愛一切物具如斯果報一彼時為布施三萬劫之間吾不知惡趣塗香泥業果一一今此賢劫時吾為轉輪王大力大威力出為一人王一二爾時數多衆皆令守五戒唯使至善趣吾愛生諸天一三四種無礙解及證八解脫吾得六神通吾行佛教法如是尊者畢鄰陀婆蹉長老宣唱此等偈一六羅睺羅覆障一世間居上首人中之長者為造七層殿吾亦施座席二漏盡千弟子圍繞大牟尼兩足之尊者彼來此香殿三彼為天中天香殿耀光輝比丘衆中立説示如次偈四美如磨光鏡有此光輝人吾稱讚於彼吾言傾耳聽五黃金與白銀乃至琉璃造不問何所嬉一切生虛空六六十四度間神王統神界千度為輪王其國無涯際七二十一劫後毗摩羅剎利夷平四方際彼為轉輪王八雷努瓦底都美麗磚瓦成三百由旬長堅固四角形九須陀蘇那宮毗首羯摩造具華美樓閣七寶為裝飾一具有十種聲持明人群居如彼天上都須陀蘇那市一一如旭日升時四射放光輝周圍八由旬遍處常照明一二十萬劫之後出生甘蔗族稱為瞿曇姓出世為尊師一三由兜率天沒淨根所迫故於彼佛瞿曇為彼親生子一四若彼住在家可為轉輪王如斯彼住家享樂無是處一五彼由家出去為人敬虔者稱名羅睺羅成就阿羅漢一六如牝雞守卵如犛牛護尾賢明且有德彼守大牟尼一七吾此了解法觀喜佛教法諸漏皆正知吾住於無漏一八四種無礙解及得八解脫吾得六神通吾行佛教法如是尊者羅睺羅長老宣唱此等偈一七優婆斯那婆檀提子近軍一世上穴中尊巴多穆搭拉端坐山窟中吾近最上尊二羯尼迦樹花吾手折其枝飾著其傘蓋以此捧獻佛三美味最上食吾供施此食供食八沙門至佛為第九四人尊自存者喜彼大覺雄傘蓋之布施施此為最勝五依清淨心故彼享無虧樂神王三十度統領神世界六二十一度間身為轉輪王統領諸國土此量不得盡七人稱須彌陀博識復宏智十萬劫之後彼將當成佛八彼生於人間光輝彼教時為彼師弟子名優波斯那九逮至最後生除去諸有結服魔羅乘象吾保最後身一四種無礙解及證八解脫吾得六神通吾行佛教法如是尊者優婆斯那婆檀提子長老宣唱此等偈第三誦品一八羅吒波羅護國一世上人中尊巴多穆塔拉吾施優良象強牙如鋤大二象醫與象師飾以白傘蓋彼等之評價皆以建伽藍三吾建諸殿堂五萬又四千吾作多種食捧與彼大仙四人中自存者歡喜彼大雄佛笑向諸人説示不死道五最勝水中草佛為吾受記比丘衆中坐宣示如次偈六五萬四千殿為吾所建者吾將稱其果傾耳聽吾説七彼造有樓閣其數一萬八樓閣黃金造最上宮內生八神王五十度統領神世界五十度之間彼為轉輪王九十萬劫之後出生甘蔗族稱為瞿曇姓出世為尊師一彼由天上沒淨根所迫故生於富豪家爾時藏大富一一淨根所使故其後彼出家名羅吒波羅彼為師弟子一二勤奮彼專念心靜無執著諸漏皆正知無漏證涅槃一三出離吾樹立棄去財富幸其富如啖塊吾無愛執心一四精進吾調牛運行安穩處等正覺教法吾保最後身一五四種無礙解及證八解脫吾得六神通吾行佛教法如是尊者羅吒波羅長者宣唱此等偈一九蘇巴伽一峻秀高山上清掃山洞窟吾來親近佛其名悉達多二世間之最上如是佛世尊見彼佛來近吾施花座席三吾為設席座導師悉達多彼知吾趣處宣説無常性四諸行實無常是為生滅法生而又歸滅以寂滅為樂五世間之最上一切知者語雄者之騰空如鵝王騰空六吾棄己異見修持無常想吾修習一日遂死逝彼處七淨根迫使故享二無虧樂吾至最後生寄宿屠犬胎八吾由家出去出作無家者生年僅七歲吾成阿羅漢九意堅精力勝諸戒心安靜吾得具足戒滿足大龍象一爾時因積業九十四劫間吾不知惡趣施花之果報一一爾時因修想九十四劫間吾修無常想遂達至漏盡一二四種無礙解及證八解脫吾得六神通吾行佛教法如是尊者蘇巴伽長老宣唱此等偈二蘇曼伽拉善瑞祥一吾為尊供祭備辦諸美食捧獻婆羅門立於廣圓地二吾見正覺者比亞達西佛世間嚮導者人中自存者三光輝佛如來弟子隨其後普照如太陽入來車道中四深敬吾合掌己心為淨化善來大牟尼招請於心中五無上彼世尊深知吾意圖漏盡千弟子皆來吾門前六吾南無貴尊最尊吾歸依請登吾樓閣坐於獅子座七制己隨衆制自渡為渡人最尊登殿上坐於尊座上八家中吾備辦盡獻美味食獻佛以己手吾以淨心施九吾喜心清淨合掌信心生南無彼聖佛尊佛實偉大一八人漏盡者圍繞皆進食唯此偉大者吾願歸命爾一一世之最上者比亞達西佛比丘衆中坐宣示如次偈一二安靜心無曲施食與僧伽覺者如來食吾言傾耳聽一三二十七度間統領神世界自己所業滿享樂神世界一四而十與八度為世轉輪王統御五百國住於此地上一五吾入森林中叢林虎交馳精勤吾專念滅盡諸煩惱一六彼時為布施一千八百劫吾不知惡趣布施食果報一七四種無礙解及證八解脫亦得六神通吾行佛教法如是尊者蘇曼伽拉長老宣唱此等偈攝頌西哈薩那支耶伽檀比伽難陀周槃陀鄰陀羅睺羅彼婆檀提子及羅吒波羅蘇巴伽伽羅十人第二品百三十七偈皆集於此説

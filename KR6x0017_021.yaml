body:
  text: 第二十一伽尼伽拉普毗耶品二一伽尼伽拉普毗耶伽尼伽拉花一伽尼伽拉花爾時吾採來供彼帝沙佛是渡瀑流人二吾供養花故九十二劫間惡趣吾不知供佛此果報三三十五劫昔名高喚日護大力具七寶出為轉輪王四四種無礙解如是尊者伽尼伽拉普毗耶長老宣唱此等偈二二義內拉普毗耶義內拉花一黃金色世尊光滿如太陽慈心尸棄佛上彼經行處二清淨吾心喜禮無上慧者義內拉花取吾捧彼佛陀三吾供養花故三十一劫間惡趣吾不知供佛此果報四二十九劫昔名喚極濃雲大力具七寶出為轉輪王五四種無礙解如是尊者義內拉普毗耶長老宣唱此等偈二三欽伽尼伽普毗耶欽伽尼伽花一體形值黃金世間大導師浸入水美湖尊師於水浴二採得欽尼花捧獻毗婆尸兩足尊王者吾喜心踊躍三供養此鮮花九十一偈間惡趣吾不知供佛此果報四七十七劫昔比瑪拉陀王大力具七寶出為轉輪王五四種無礙解如是尊者欽伽尼伽普毗耶長老宣唱此等偈二四塔拉尼耶渡濟一兩足尊王者阿塔達西佛弟子等隨從來至恆河岸二水滿烏得飲恆伽涉彼側吾渡兩足尊乃至諸僧衆三爾時為此業一千八百劫惡趣吾不知濟渡此果報四千三百劫昔名喚有財者大力具七寶出為轉輪王五四種無礙解如是尊者塔拉尼耶長老宣唱此偈二五尼軍第普毗耶尼軍第花一毗婆尸佛陀彼時吾守苑採軍第樹花捧獻供佛陀二供養彼花故九十一劫間惡趣吾不知供佛此果報三三十五劫昔出得一人王名喚大光輝大力轉輪王四四種無礙解如是尊者尼第普毗耶長者宣唱此等偈二六烏達伽達耶迦水施一清淨無煩擾見沙門乞食吾手持水甕施悉達多佛二今此吾無穢疑盡亦無垢不論再生處其果於吾現三彼時吾施水九十四劫間惡趣吾不知施水此果報四六十一劫昔一王毗摩羅大力具七寶出為轉輪王五四種無礙解如是尊者烏達伽達耶迦長老宣唱此等偈二七薩拉拉瑪利耶薩拉拉花鬘一光如黃花樹坐於山峽間悉達多佛陀光輝照諸方二彼時吾備弓以箭搭其弓射採彼花莖捧花供獻佛三供養鮮花故九十四劫間惡趣吾不知供佛此果報四五十一劫昔一人名持輝大力具七寶出為轉輪王五四種無礙解如是尊者薩拉拉瑪利耶長老宣唱此等偈二八庫蘭達普毗耶達蘭達花一粧飾以輪寶遙見蹈來足蹈蹈來大仙毗婆尸佛陀二採庫蘭達花連根作供養吾喜心雀躍禮拜最上足三供養庫蘭花九十一劫間惡趣吾不知供養此果報四五十七劫昔一人名離垢大力具七寶出為轉輪王五四種無礙解如是尊者哥蘭達普毗耶長老宣唱此等偈二九阿達拉達耶迦臺布施一世間緣尸棄吾布施鉢臺一切諸大地吾保諸大地二燃盡衆煩惱除去諸有結等正覺教法得保最後身三二十七劫昔四人王大力名謂薩曼陀有為轉輪王四四種無礙解如是尊者阿達拉達耶迦宣唱此等偈二一瓦達達巴尼瓦利耶抑風熱一帝沙稱佛陀是人天中天吾以清淨心一傘施彼佛二吾抑諸般惡唯善行具足空中有傘翳前業所果報三時至最後身除一切有結等正覺教法得保最後身四時施傘供養九十二劫間惡趣吾不知施傘此果報五七十二劫昔諸王有八人其名稱大因有為轉輪王六四種無礙解如是尊者瓦達達巴尼瓦利耶長老宣唱此等偈攝頌伽尼伽拉義內拉欽伽尼塔拉尼耶尼軍第烏達伽達薩拉拉哥蘭達普阿達拉達瓦達達巴十人共偈四十八

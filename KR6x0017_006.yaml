body:
  text: 第六維伽尼品五一維多帕那達耶伽扇施一巴多穆塔拉世間居上首兩足之尊者吾以扇施與二合掌於頭上己心為淨化禮敬正覺尊起立向北去三彼執扇在手世間最尊師比丘衆中坐為說如次偈四依此扇布施乃由心所願十萬劫之間彼不墮惡趣五力勝意志堅集中心之德吾生為七歲達阿羅漢位六六萬劫中間人稱名扇意大力十六人出為轉輪王七四種無礙解如是尊者維多帕那達耶伽長老宣唱此等偈五二薩塔藍西伽百光一攀登高岩上人中勝者坐其山不遠住吠陀婆羅門二人中稱長者天中天大雄頭上吾合掌讚歎世尊師三此佛為大雄說示勝法人常隨比丘衆如火團光輝四宴靜如大海難渡如急流無怖如獸王示法具眼者五巴多穆塔拉識知吾心意比丘衆中立為說如次偈六謹此示合掌禮讚殊勝佛三萬劫之間統領神世界七十萬劫之後央祈羅娑名正覺除覆蓋爾時示現世八法子由法生彼師法後嗣名薩塔藍西彼成阿羅漢九生年僅七歲出家成無家名薩塔藍西燦放吾光輝一樹蔭曼陀婆禪思浸禪樂等正覺者教吾保最後身一一七萬劫往昔稱四人羅瑪大力具七寶出為轉輪王一二四種無礙解如是尊者薩塔藍西伽長老宣唱此等偈五三薩耶那達耶伽褥施一巴多穆塔拉憐愍諸世界吾以清淨心施彼以座褥二依此褥布施蒔種於善田於吾生富財褥施之果報三吾牀臥於空吾支此大地吾為有情主施褥此果報四五萬劫往昔大雄有八人三千四百劫大力有四人五四種無礙解如是尊者薩耶那達耶伽宣唱此等偈五四康豆達伽香水一巴多穆塔拉有菩提樹祭爾時執美瓶吾施與香水二洗菩提樹時沛然大雨降忽作威爆雷發有大音響三雷火奔迅速於彼吾死去遂立天世界吾唱次一偈四諸佛與諸法尊師皆成滿吾此身體仆今享樂天界五吾住高峻處聳立有百層萬人之天女常行圍繞吾六吾未見疾病內心亦無憂苦熱皆不見福業此果報七二千八百劫山瓦西塔王大力具七寶出為轉輪王八四種無礙解如是尊者康豆達伽長老宣唱此等偈五五歐帕威哈好適乘一巴多穆塔拉吾施以駿馬吾獻正覺尊而自家去己二名喚戴瓦拉第一師弟子勝法彼後嗣來至吾面前三彼尊持鉢來駿馬不相應知曉汝意欲具眼者接納四馬馳如疾風評為印度産布施此駿馬吾獻正覺尊五投生任何胎常在任何處力行如疾風於吾之心生六人得具足戒得戒為容易若佛住此世吾等所推崇七二十八度間為大力士王夷平四方際出長閻浮提八此是最後生至最後生時勝敗皆捨棄吾達不動位九三萬四千劫剎利大威力大力具七寶出為轉輪王一四種無礙解如是尊者歐帕威哈長老宣唱此等偈五六薩波利瓦拉薩那有隨衆座一巴多穆塔拉吾施與團食摩利花圍繞吾往彼食場二此世尊導師彼處座上坐安詳且端莊讚吾施團食三僅此吉祥田蒔下一粒種適時以順雨熟實耕者喜四團食如其實汝今蒔善田生生如其生結實汝心喜五最勝水中草正覺如斯語讚美其團食指向北方去六依彼之戒本自制於五根耽湎於孤獨吾住成無漏七四種無礙解如是尊者薩波利瓦拉薩那長老宣唱如是等偈五七潘奢底毗伽五燈明一憐愍諸生物巴多穆塔佛吾有此直見確立其善法二圍繞菩提樹吾布施燈明爾時吾具信造作多燈明三諸神與人間投生任何胎空中有炬火施燈明果報四過岩逾城壁又越山上行四方百由旬吾眼均得見五於吾殘業中已於達漏盡具二足尊教吾保最後身六三千四百劫薩達洽庫名大力大威力出為轉輪王七四種無礙解如是尊者潘奢府底毗伽長老宣唱此等偈五八達伽達耶迦幡施一巴多穆塔拉美道樹下坐雀躍心內喜於彼吾載幡二手執樹落葉投棄於他處內外皆清淨解脫盡諸漏禮拜菩提樹如向正覺尊三善逝世間解受吾尊供人比丘衆中立師說如次偈四依此幡布施更依此奉事十萬劫之間彼不墮惡趣五幾百度為王彼在於王位稱名嗢羯吒為世轉輪王六彼享無虧樂淨根所使故彼向瞿曇佛樂於受其教七專念勤精進心靜無執著等正覺者教吾保最後身八五萬一千劫有王嗢羯吒五百萬劫昔有王名美佳九四種無礙解如是尊者達伽達耶伽長老宣唱此等偈五九鉢頭摩蓮一佛說四諦法殊勝轉法輪慈降不死雨請淨衆多人二吾執著蓮幡立於小屋間目送牟尼喜投幡至空中三爾時稀有事其蓮復再返佛知吾心意受吾蓮華幡四佛慈援手執水生無上花比丘衆中立宣說如次偈五彼向無漏者投擲此蓮華吾將讚其人傾耳聽吾說六神王三十劫統領神世界來住於地上統治七百國七於彼手執鉢將為轉輪王由空降花雨當時恰降來八十萬劫之後出生甘蔗族稱為瞿曇姓出世為尊師九彼為法後嗣由法生法子諸漏皆正知無漏證涅槃一吾從胎出生思慮致意深生年僅五歲已達羅漢位一一四種無礙解如是尊者鉢頭摩長老宣唱此等偈六阿薩那菩提耶阿薩那菩提樹一生年僅七歲即見世導師清淨吾心喜親近人中尊二世間居上首人間帝沙佛雀躍心喜植無上菩提樹三命名阿薩那達拉尼爾哈無上菩提樹五株吾奉事四見彼樹開花體毛即豎立吾近尊佛前宣己稀有業五爾時自存者名為帝沙佛比丘衆中坐為說如次偈六植菩提樹者向佛盡供養吾將讚其人傾耳聽吾說七天界三十劫統領神世界六十四度間彼為轉輪王八從兜率天沒淨根所使故享二無虧樂樂趣為彼人九專念勤精進心靜無執著諸漏皆正知無漏證涅槃一吾樂於孤獨心淨無執著如象斷其縛吾住成無漏一一時植菩提樹九十一劫間惡趣吾不知植菩提樹報一二七十四劫昔杖軍名聲高具足七種寶吾為轉輪王一三七十三劫昔大王七人出名稱為全輪吾為轉輪王一四二十五劫後剎利名充滿大力具七寶出為轉輪王一五四種無礙解如是尊者阿薩那菩提耶長老宣唱此等偈攝頌維多帕那達耶伽薩塔藍西薩耶那烏達齊與瓦西耶薩波利瓦拉薩那潘迦底毗達伽鉢頭摩與第十菩提樹以上長老為十品偈共九十二

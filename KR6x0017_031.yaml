body:
  text: 第三十一鉢頭摩啓薩利耶品三一鉢頭摩啓薩利耶鉢頭摩花絲一吾昔為大象仙人衆團中撒鉢頭摩花浴大仙光輝二辟支佛等勝祛除諸貪欲令吾心清淨在天享一劫三彼時撒花絲九十一劫間惡趣吾不知供花此果報四四種無礙解如是尊者鉢頭摩啓薩利耶長老宣唱此等偈三二薩巴康提耶一切香一毗婆尸佛陀端直最上人吾施香花鬘及憍賒耶衣二昔施花衣故九十一劫間惡趣吾不知香施此果報三十五劫之昔有王名良衣大力具七寶出為轉輪王四四種無礙解如是尊者薩巴康提耶長老宣唱此等偈三三婆羅曼那達耶迦最上食布施一輝如黃花樹如陽光初升吾見毗婆尸世界人中尊二虔敬吾合掌引佛入己家正覺尊到來供施最上食三時施上食故九十一劫間惡趣吾不知施食此果報四四種無礙解如是尊者婆羅曼那達耶迦長老宣唱此等偈三四達摩薩尼耶迦法想一毗婆尸佛陀祭大菩提樹樹下正覺者世界人中尊二爾時彼佛陀比丘僧團隨為説四諦法宣説滿威嚴三或為簡潔説或為詳細説正覺除覆蓋令衆人清淨四聆聞佛教法如是上首人吾禮尊師足指向北方去五彼時聽法故九十一劫間惡趣吾不知法施之果報六三十三劫昔出世一君王呼稱通聖學出為轉輪王七四種無礙解如是尊者達摩薩尼耶迦長老宣唱此等偈三五婆羅達耶迦果施一巴基拉西河彼岸有仙處吾得樹之果以赴仙居處二毗婆尸佛陀光輝如黃金吾手捧諸果布施與尊師三時施樹果故九十一劫間惡趣吾不知施果此果報四四種無礙解如是尊者婆羅達耶迦長老宣唱此等偈三六薩婆薩達迦清信一爾稱南無佛何處皆解脫怎能有災禍尊佛吾歸依二此世無比者悉達多佛説僧團同大海難量更無上三彼是離塵田與無限果報僧伽心清淨蒔植樂之種四世間居上首一切遍知者垂示此教法即騰高空上五人中智慧者尚未遠去時吾死時到來再生兜率天六離塵勝福田無限之果報清心向僧伽吾樂天一劫七彼時得清信九十四劫間惡趣吾不知清信此果報八四種無礙解如是尊者薩婆薩達迦長老宣唱此等偈三七阿拉瑪達耶迦苑施一吾為悉達多苑中吾植樹濃蔭樹遮日諸鳥交飛時二吾見離塵佛納受尊供人世間人中尊引佛入苑中三吾心喜雀躍供施花樹果如斯湧清信布施吾回向四更以清淨心布施於此佛不論再生處吾將生其果五彼時布施故九十四劫間惡趣吾不知苑施此果報六三十七劫昔七人名軟冷大力具七寶出為轉輪王七四種無礙解如是尊者阿拉瑪達耶迦長老宣唱此等偈三八阿努雷婆達耶迦塗膏布施一阿塔達西佛吾見其弟子為彼修復業將身近其境二修復之業終吾布施塗膏心清淨內喜植無上福田三彼時行此業一千八百劫惡趣吾不知塗膏此果報四四種無礙解如是尊者阿努雷婆達耶迦長老宣唱此等偈三九弗陀薩尼耶迦佛想一如朝日東升光輝似黃金世尊大牟尼來至森林間二夢見悉達多世間大導師當場心清淨善趣吾再生三當時吾得想九十四劫間惡趣吾不知得佛想果報四四種無礙解如是尊者弗陀薩尼耶迦長老宣唱此等偈三一婆巴拉達耶迦洞窟布施一毗耶達西佛淨住洞窟中供奉一小瓶作為彼資具二世尊大牟尼佛為如斯説百球千箭柄飾旗黃金作三衆多之樓閣諸寶為彼生吾施斯洞窟在天享一劫四三十二劫昔有名極淨王大力具七寶出為轉輪王五四種無礙解如是尊者婆巴拉達耶迦長老宣唱此等偈攝頌鉢頭摩薩巴康提婆羅曼與達摩薩婆羅薩婆達薩迦阿拉瑪阿努雷婆弗陀薩與婆巴拉十人共偈四十九

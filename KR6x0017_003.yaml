body:
  text: 第三須菩提品二一須菩提善現一雪山路不遠有山名尼婆巧作吾仙處優美造葉庵二吾名拘私夜行者螺髻仙唯一無第二爾時住尼婆三樹實樹根葉爾時吾不食吾取黃色葉其為吾度日四吾雖棄生命不擾吾生活己心為滿足避免不當事五有伴貪心念當吾生起時自己為省察抑制吾安靜六汝貪生貪者汝瞋生瞋者汝癡生癡者汝由林出去七淨人等住居行者等無穢勿害此清淨汝由林出去八汝為在家者欲得相應物勿失此二者汝由林出去九燒尸柴堆燼村莊或森林不視為柴木未盡薪柴用一汝似彼餘燼村人不認得村林放逐汝汝今出林去一一爾將如是思此事誰了知此吾富怠惰斷送信重荷一二在家賢者等厭汝之不淨仙者拖曳汝常對爾迫促一三賢者等語汝汝疏於求教共住實不適如何得善生一四年逾六十象發情三徵候如近此強象群象追逐彼一五彼由群象逃不見安居處心塞倍嘗苦煩惱彼突進一六螺髻實如彼追爾愚癡人汝由彼等逃不得安居處一七無晝亦無夜悲之箭訶射如為群象追燃燒苦熱故一八似山頂黃金不得進何處如汝棄捨戒亦無得進處一九假令汝住家如何得善生父母雙方財汝未積蓄財二己勉勵從事身體常流汗如是家生活善人所不喜二一於彼諸煩惱吾抑墮行意示種種法語吾抑得惡心二二如斯吾住居所住無懈怠三萬年歲月行過山傾斜二三吾索最上義喜吾見精勤巴多穆塔拉尊佛來吾前二四鎮頭迦果色無雙不知量佛顏似金像爾時經行空二五娑羅樹王花雷雲閃電光智慧無雙佛爾時經行空二六無畏如獅王驕傲如象王如虎自樂處爾時經行空二七輝耀黃金色炭火朅地羅驕地拉薩珠爾時經行空二八蓋拉薩山青亦如望滿月如中天懸日爾時經行空二九吾見經行空爾時吾思惟此為如何神此者或為人三地上有斯人未聞亦未見聖書之言語此為世尊師三一吾如斯思惟己心為淨化種種花香料當時吾集來三二設置花産席心正情悅愈彼向馭人者吾說如次言三三吾設此座席雄者最適應吾心含笑意請坐此花座三四佛坐於彼處無畏如獅子終日與終夜花座七日間三五先後歷七日吾立稱南無無上彼尊師由定中起立三六吾續宣吾業語作如次言歷最上修習善修隨念佛三七修習此隨念汝意將滿足三萬劫年月汝樂於天界三八神王八十度統領神世界百度汝輪王君臨其王國三九此量不得盡統領廣國土此等汝皆享隨念佛果報四生生汝流轉將獲數多富汝其富無缺隨念佛果報四一十萬劫之後出生甘蔗族稱為瞿曇姓出世為尊師四二捨棄衆婢傭八十俱胝財從佛瞿曇法受教汝出家四三釋族長正覺瞿曇方欣喜名喚須菩提為尊師弟子四四可施比丘衆佛坐正當中置汝最上住如實與無諍四五最勝水中草正覺導師云之雄者行空騰空如鵝王四六世界救主教吾歸命如來無上佛隨念吾喜常修習四七為此之善業依吾心之願棄去此人身吾往忉利天四八神王八十度統領神世界百度為王者吾做轉輪王四九此量難得盡統治廣國土享受無虧樂隨念佛果報五生生吾流轉獲得多種富其富吾無缺隨念佛果報五一彼時所積業十萬劫之間吾不知惡趣隨念佛果報五二四種無礙解及證八解脫亦得六神通吾行佛教法如是須菩提長老宣唱此等偈二二優婆摩那白淨一巴多穆塔拉通達一切法光輝如大火正覺尊涅槃二衆多諸人集供養彼如來壯觀積柴木載佛之身軀三佛之荼毗竟收集其骨骸如斯諸人天建造佛塔婆四一層黃金造二層為摩尼三層白銀造四層為水晶五五層為水晶以及紅玉造六層貓眼石再上皆寶石六基臺摩尼作欄楯寶石成其塔皆黃金高達一由旬七衆神集彼處爾時共思慮世間之救主為彼造塔婆八如是其骨骸荼毗己無存唯此佛塔上為其作籠蓋九諸神以七寶增廣一由旬塔高二由旬驅散世黑暗一諸龍亦來集爾時共思慮人間與諸神為佛建塔婆一一吾等有神力吾等勿懈怠為世之救主吾等建塔婆一二青寶帝釋青驕提拉薩珠此等來共集覆於佛塔上一三如是佛支提一切摩尼造聳立三由旬爾時光輝耀一四鳩槃荼來集爾時共思慮人間神與龍為佛建塔婆一五吾等有神力吾等勿懈怠為世之救主吾等建塔婆一六塔之籠蓋上皆以摩尼造支提之長度增廣一由旬一七其聳四由旬佛塔耀光輝輝耀四方位放出百光線一八夜叉等來集爾時共思慮人間與諸神龍與金翅鳥一九各為尊勝佛造無上塔婆吾等有神力吾等勿懈怠二為世之救主建造佛塔婆其支提長度覆之以水晶二一於支提之長增廣一由旬其高五由旬塔婆映照光二二乾闥婆來集爾時共思慮人間神與龍密迹鳩槃荼二三皆為佛作塔吾等尚未作為世之救主吾等作塔婆二四七重欄楯成一切基臺作爾時黃金塔乾闥婆等作二五其高七由旬塔婆映照光晝夜無分別常輝照四方二六光明超日月凌駕諸星光四周百由旬實如映明燈二七諸人向佛塔不問誰供養無人登塔上供物投上空二八依神置守護阿比桑瑪達投幡與花束飄揚於塔上二九人不見夜叉往見彼持幡見斯彼等去一切往善趣三清淨於佛語信樂佛之教欲續見奇蹟人人供養塔三一漢薩瓦底市爾時有樂人注目欣喜人吾為如是思三二偉大之世尊如是舍利家此為大衆喜盡力奉事佛三三世間救世主吾為盡承事吾將於未來為佛說法嗣三四善於洗布者善洗吾外衣結縛竹竿上作幡投於空三五密迹金剛使持幡行於空見幡為風靡益使吾發笑三六立即心信樂吾親近沙門問訊彼比丘訊以幡果報三七就此為吾說愈悅吾歡喜施幡其得果受享不論時三八象馬與車兵更有徒步兵四軍常圍繞施幡其果報三九六萬之樂器更有美飾鼓常圍繞爾傍施幡其果報四八萬六千女美飾婦人等美衣美飾具摩尼結耳環四一長眉口微笑美臀且細腰常圍繞爾傍施幡其果報四二三萬劫之間享樂神世界神王八十度統領神世界四三百度爾為王汝做轉輪王難得盡其量統治廣國土四四十萬劫之後出生甘蔗族稱為瞿曇姓出世為尊師四五天上之沒時淨根所使故為福業所縛生為婆羅門四六捨衆多奴婢八十俱胝財從佛瞿曇教受教汝出家四七釋族長正覺為汝之尊師受彼瞿曇寵名優婆摩那四八十萬劫業果彼為吾宣示如善放速箭吾滅諸煩惱四九吾為轉輪王君臨統四洲四周三由旬諸人常見幡五彼時因積業十萬劫之間吾不知惡趣施幡所得報五一四種無礙解及證八解脫得六神通吾行佛教法如是尊者優波摩那長老宣唱此等偈二三提尼薩拉那伽瑪尼耶三歸依一羌達瓦底市吾奉事雙親吾父母目盲當時吾扶養二吾但獨自坐爾時吾思量吾扶養父母出家不適宜三夜晚暗幕闔盛燃三惡火如是生恐怖無作嚮導者四佛出於此世光輝勝者教自多為福業由人得脫離五執持三歸依吾守其成滿依做善業故吾免生惡趣六尼婆之沙門佛弟子第一吾近彼之前執持三歸依七爾時人壽命長達一萬歲三歸依時久吾守其成滿八最後時到來憶持三歸依以此善業故吾趣忉利天九吾專修福業至於神世界不論生何處八事吾常得一吾崇四方所持具鋭智慧諸神皆隨來吾具無量富一一到處黃金色吾已得復歸對友不動念吾名聲高揚一二神王八十度統領神世界吾為天女敬享樂於天界一三七十五度間吾為轉輪王難得其盡量統治廣國土一四吾至最後生專心修福業舍衛之都城生於富豪家一五吾好青年人吾由市中出素習千遊戲吾近至伽藍一六解脫無執著吾見彼沙門彼為吾說法與吾以歸依一七吾此聞歸依心念嘗想起吾坐於一座達阿羅漢位一八生年僅七歲吾為阿羅漢正覺具眼者知德使受具一九無量劫往昔吾守三歸依如斯積善業於此示其果二吾善守歸依善向此意圖享受諸榮譽吾達不動道二一如有願聞者傾耳聽吾說吾善修自觀真實語汝等二二佛出於此世彼行勝者教鳴打不死鼓除去憂悲箭二三無上之福田依持己之力爾等盡奉事如是得靜安二四把握三歸依應守持五戒向佛心信樂終至滅諸苦二五為吾以為例汝等守諸戒為期將不遠終達羅漢位二六三明與神足他心通殊勝大雄汝弟子歸依禮尊師二七向佛吾歸依從此無量劫吾不知惡趣歸依佛果報二八四種無礙解及證八解脫吾得六神通吾行佛教法如是尊者提尼薩拉那伽瑪尼耶長老宣唱此等偈二四潘闍西拉薩瑪達尼耶執持五戒一羌達瓦底市時吾為傭人為人業務縛未遂出家意二夜之暗幕閉三惡火燃熾將依何方術吾脫此有結三吾無布施物可憐為傭人吾願守五戒持守達滿分四阿諾瑪達西尼婆大弟子吾來近彼前執持五戒法五爾時人壽命長達一萬歲常久持五戒持守達滿分六死期到來時諸神齊慰吾馬車千頭擊為汝作備置七臨終用心時猶憶持五戒以其善業故吾趣忉利天八神王三十度統領神世界吾為天女敬享樂於天界九七十五度間吾為轉輪王其量難得盡統治廣國土一吾由天沒逝淨根所使故都城毗舍離生大豪富家一一爾時兩安居勝教光輝時吾與父母等至誠持五戒一二吾自聞得戒經常念五戒五坐於一座達阿羅漢位一三生年僅五歲吾得阿羅漢彼佛具眼者德知授吾戒一四此吾五戒法守持皆滿分自此無量劫吾不往惡趣一五為此等五戒吾得享榮譽宣說幾億劫可稱一法語一六吾守五戒法得享三種果長壽並多富兼得鋭智慧一七明宣一切衆尤其向人述生生吾流轉得趣此等處一八諸戒不知量勝弟子堅守設若貪諸有其果將如何一九傭人具此觀吾善守五戒今以守戒故打破諸束縛二吾守五戒法從此無量劫吾不知惡趣乃守戒果報二一四種無礙解及證八解脫吾得六神通吾行佛教法如是尊者潘闍西拉薩瑪達尼耶長老宣唱此等偈二五安那山薩瓦迦食聲聞一彼佛黃金色彼尊來市場容姿值黃金三十二相具二難量不可喻照世悉達多制己顯光輝見得無上喜三南無正覺尊獻供大牟尼爾時吾致謝慈愛彼世尊四偉大慈愛佛賜無上氣息吾心得淨化永樂生天上五彼時因吾施得九十四劫吾不知惡趣施聖食果報六四種無礙解及證八解脫吾得六神通吾行佛教法如是尊者安那山薩瓦迦長老宣唱此等偈二六多巴達雅伽香施一世之最上人悉達多佛陀吾以信樂心馨香為寶施二諸神與人間吾生任何胎慈愛一切者香施之果報三彼時因施香九十四劫間吾不知惡趣香施之果報四四種無礙解及證八解脫吾得六神通吾行佛教法如是尊者多巴達雅伽長老宣唱此等偈二七普利那普伽卡砂供養一殊勝道樹下毗婆尸佛悟古昔捨砂粒淨砂吾所撒二因吾施砂粒九十一劫間吾不知惡趣施砂之果報三五十三劫間古昔統人王人稱大砂粒輪王具大力四四種無礙解及證八解脫吾得六神通吾行佛教法如是尊者普利那普伽卡長者宣唱此等偈二八鬱低迦一羌達巴迦河其時吾為鰐只為索餌食赴河之渡頭二人中之勝者悉達多佛陀其時欲渡河來至此渡頭三彼佛之來時恰吾亦來到趨身近佛前吾發如次語四吾請載大雄吾為佛擺渡父母所在地大牟尼憐愍五佛聞乞喊聲大牟尼來乘吾喜心雀躍乘渡世導師六悉達多佛陀立於河彼岸佛於彼慰吾可至不死道七由此畜身沒吾赴神世界為天女所敬得享天界樂八百度為神王統領神世界三度為輪王君臨大地上九蟄居而孤獨賢善以自制於等正覺教得保最後身一渡人中之長九十四劫間吾不知惡趣乃渡佛果報一一四種無礙解及證八解脫吾得六神通吾行佛教法如是尊者鬱低迦長老宣唱此等偈二九耶堪伽利迦一合掌一彼佛黃金色毗婆尸來市優勝隊商長人中嚮導雄二是人制不制牟尼大論師見已心信樂吾喜一合掌三彼時吾合掌九十一劫間得不知惡趣合掌所果報四四種無礙解及證八解脫亦得六神通吾行佛教法如是尊者耶堪伽利迦長老宣唱此等偈三冠瑪達雅伽亞麻衣施一槃頭摩帝市時吾為商人扶養妻子等播蒔幸福種二毗婆尸佛陀步行來車道吾以亞麻衣施豫大導師三施亞衣善業得九十一劫不知惡所趣乃施衣果報四二十七劫昔興度馬車乘具足七種寶四洲吾君臨五四種無礙解及證八解脫吾得六神通吾行佛教法如是尊者寇瑪達雅伽長老宣唱此等偈攝頌須菩提優婆摩那薩拉那與錫拉伽哈迦安那山與多巴達布利那與鬱低迦安伽利與寇瑪達此第三品共十人說偈一百八十五於在此為一群第四誦品
